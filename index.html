<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIZ-OMICS</title>
<style>
:root{
  --ff-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --ff-mono:'SFMono-Regular','SF Mono',Consolas,'Liberation Mono',monospace;
  --bg:#0a0e1a;
  --surface:#111827;
  --surface2:#0d1526;
  --amber:#f59e0b;
  --blue:#3b82f6;--blue2:#60a5fa;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --border:rgba(255,255,255,0.08);
}
[data-theme="light"]{
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;
  --text:#0f172a;--muted:#64748b;--border:rgba(0,0,0,0.09);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:var(--ff-sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  transition:background 0.2s,color 0.2s;
}

/* ── HEADER ── */
header{
  padding:1.1rem 2.5rem;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;
  background:rgba(10,14,26,0.96);
  backdrop-filter:blur(16px);
  z-index:200;
}
[data-theme="light"] header{background:rgba(248,250,252,0.96);}
.logo-wrap{ display:flex; align-items:center; gap:0.75rem; text-decoration:none; color:var(--text); }
.logo-img{ height:36px; width:auto; border-radius:6px; }
.logo-text{ font-size:1.35rem;font-weight:900;letter-spacing:-0.02em; }
.logo-text span{color:var(--amber);}
.theme-toggle{
  padding:0.35rem 0.55rem;border-radius:100px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;font-size:0.8rem;
  line-height:1;transition:all 0.18s;
}
.theme-toggle:hover{color:var(--text);}

/* ── LAYOUT ── */
main{max-width:860px;margin:0 auto;padding:4rem 2rem 5rem;}

/* ── HERO ── */
.hero{margin-bottom:3.5rem;}
.hero-eyebrow{
  font-family:var(--ff-mono);font-size:0.66rem;
  color:var(--amber);letter-spacing:0.22em;
  text-transform:uppercase;margin-bottom:1.1rem;
}
.hero h1{
  font-size:clamp(2rem,4.5vw,3.2rem);
  font-weight:900;line-height:1.08;
  letter-spacing:-0.025em;margin-bottom:0.6rem;
}
.hero h1 em{font-style:normal;color:var(--amber);}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:1.1rem;
}

/* ── BASE CARD ── */
.card{
  position:relative;border-radius:14px;
  background:var(--surface2);
  border:1px solid var(--border);
  overflow:hidden;
  text-decoration:none;color:inherit;
  display:flex;flex-direction:column;
  padding:2rem 2rem 1.8rem;
  min-height:260px;
  transition:border-color 0.2s,transform 0.2s,box-shadow 0.2s;
  cursor:pointer;
}
[data-theme="light"] .card{background:#ffffff;}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}

/* Economics card */
.card-economics::before{background:linear-gradient(90deg,var(--amber),rgba(245,158,11,0.3));}
.card-economics:hover{
  transform:translateY(-3px);
  border-color:rgba(245,158,11,0.28);
  box-shadow:0 16px 48px rgba(245,158,11,0.07);
}

/* Business card */
.card-business{cursor:default;opacity:0.5;}
.card-business::before{background:linear-gradient(90deg,var(--blue),rgba(59,130,246,0.3));}

/* ── CARD INTERNALS ── */
.c-label{
  font-family:var(--ff-mono);font-size:0.58rem;
  letter-spacing:0.16em;text-transform:uppercase;
  font-weight:600;margin-bottom:0.85rem;
}
.card-economics .c-label{color:var(--amber);}
.card-business  .c-label{color:var(--blue2);}

.c-title{
  font-size:2rem;font-weight:900;
  letter-spacing:-0.022em;line-height:1.1;
  margin-bottom:0.6rem;
}

.c-desc{font-size:0.82rem;color:var(--muted);line-height:1.65;flex:1;}

.c-btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  font-size:0.78rem;font-weight:700;
  padding:0.55rem 1.1rem;border-radius:8px;
  border:none;cursor:pointer;
  font-family:var(--ff-sans);
  align-self:flex-start;margin-top:1.2rem;
}
.card-economics .c-btn{background:var(--amber);color:#000;}
.card-business  .c-btn{
  background:transparent;color:var(--muted);
  border:1px solid var(--border);cursor:default;
}

/* ── FOOTER ── */
footer{
  text-align:center;padding:2rem;
  border-top:1px solid var(--border);
  font-family:var(--ff-mono);font-size:0.68rem;
  color:var(--muted);opacity:0.35;margin-top:2rem;
}

/* ── RESPONSIVE ── */
@media(max-width:580px){
  header{padding:0.9rem 1.25rem;}
  main{padding:2.5rem 1rem 4rem;}
  .grid{grid-template-columns:1fr;}
  .hero h1{font-size:1.9rem;}
}
</style>
</head>
<body>

<header>
  <a class="logo-wrap" href="index.html">
    <img src="BIZ-OMICS_Final_LOGO.png" alt="BIZ-OMICS" class="logo-img">
    <span class="logo-text">BIZ-<span>OMICS</span></span>
  </a>
  <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">☀</button>
</header>

<main>

  <div class="hero">
    <p class="hero-eyebrow">// choose your subject</p>
    <h1>Where do you want<br>to <em>study today?</em></h1>
  </div>

  <div class="grid">

    <a href="economics/index.html" class="card card-economics">
      <div class="c-label">Economics</div>
      <div class="c-title">Economics</div>
      <p class="c-desc">Interactive tools, diagram games, glossaries and revision resources.</p>
      <button class="c-btn">Enter → </button>
    </a>

    <div class="card card-business">
      <div class="c-label">Coming Soon</div>
      <div class="c-title">Business</div>
      <p class="c-desc">Business Studies resources are currently in development.</p>
      <button class="c-btn">Coming Soon</button>
    </div>

  </div>

</main>

<footer>BIZ-OMICS &nbsp;·&nbsp; Revision Resources</footer>

<script>
function toggleTheme(){
  const t = document.body.dataset.theme === 'light' ? '' : 'light';
  document.body.dataset.theme = t;
  document.getElementById('theme-btn').textContent = t === 'light' ? '🌙' : '☀';
}
</script>

</body>
</html>
