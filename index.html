<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIZ-OMICS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a227;
      --gold2: #e8bb35;
      --bg: #0d1526;
      --surface: #131f38;
      --surface2: #1a2a45;
      --text: #f0f4ff;
      --text-muted: #8a9bc0;
      --border: #243558;
      --ff-head: 'Playfair Display', Georgia, serif;
      --ff-body: 'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ff-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 3rem;
      text-align: center;
    }

    .logo-img {
      height: 110px;
      width: auto;
      border-radius: 12px;
    }

    /* ── Cards ── */
    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 1.5rem;
    }

    .card {
      width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .card-title {
      font-family: var(--ff-head);
      font-size: 1.5rem;
      font-weight: 900;
    }

    .card.economics:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    /* Coming Soon badge */
    .badge-soon {
      display: block;
      margin-top: 0.8rem;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card.business {
      cursor: default;
      opacity: 0.5;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .cards { flex-direction: column; align-items: center; }
      .card { width: 100%; max-width: 280px; }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="BIZ-OMICS_Final_LOGO.png" alt="BIZ-OMICS" class="logo-img">
  </div>

  <div class="cards">

    <a href="economics/index.html" class="card economics">
      <div class="card-title">Economics</div>
    </a>

    <div class="card business">
      <div class="card-title">Business</div>
      <span class="badge-soon">Coming Soon</span>
    </div>

  </div>

</body>
</html>
