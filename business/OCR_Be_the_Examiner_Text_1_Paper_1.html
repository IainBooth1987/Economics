<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Be the Examiner — Text 1: Nina's Knitting Supplies</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0f1e;--surface:#111827;--surface2:#1a2640;--border:rgba(255,255,255,0.08);
  --text:#e8edf5;--muted:rgba(232,237,245,0.55);--dim:rgba(232,237,245,0.28);
  --gold:#f59e0b;--blue:#3b82f6;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --ao1a:#3b82f6;--ao1b:#10b981;--ao2:#f59e0b;--ao3a:#8b5cf6;--ao3b:#ef4444;
  --accent:var(--blue);
}
[data-theme="light"]{
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--border:rgba(15,23,42,0.10);
  --text:#0f172a;--muted:rgba(15,23,42,0.60);--dim:rgba(15,23,42,0.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(59,130,246,0.06) 0%,transparent 55%),radial-gradient(ellipse at 80% 100%,rgba(139,92,246,0.05) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:100;background:rgba(10,15,30,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;gap:12px;}
[data-theme="light"] .hdr{background:rgba(248,250,252,0.92);}
.logo{font-family:'Fraunces',serif;font-size:16px;font-weight:900;color:var(--text);}
.logo span{color:var(--gold);}
.hdr-sep{width:1px;height:20px;background:var(--border);}
.hdr-title{font-size:13px;font-weight:600;color:var(--muted);}
.spacer{flex:1;}
.hdr-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:.18s;text-decoration:none;}
.hdr-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s;}
.theme-btn:hover{color:var(--text);border-color:var(--gold);}

/* ── Progress bar ── */
.prog-bar-wrap{position:sticky;top:58px;z-index:99;background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;}
.prog-tabs{display:flex;gap:0;overflow-x:auto;}
.prog-tab{flex:1;min-width:fit-content;padding:12px 18px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:.18s;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:7px;}
.prog-tab:hover{color:var(--text);background:rgba(255,255,255,0.03);}
.prog-tab.active{color:var(--text);border-bottom-color:var(--blue);}
.prog-tab .tab-status{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.prog-tab .tab-status.done{background:var(--green);border-color:var(--green);color:#fff;}
.prog-tab .tab-status.partial{background:var(--amber);border-color:var(--amber);color:#fff;}

/* ── Main layout ── */
.main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 28px 60px;}

/* ── Tab content ── */
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ── Standardisation banner ── */
.std-banner{background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(139,92,246,0.08));border:1px solid rgba(59,130,246,0.2);border-radius:14px;padding:18px 22px;margin-bottom:22px;display:flex;gap:14px;align-items:flex-start;}
.std-icon{font-size:22px;flex-shrink:0;margin-top:2px;}
.std-body h3{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text);}
.std-body p{font-size:13px;color:var(--muted);line-height:1.55;}

/* ── Two-col layout ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px;}
@media(max-width:760px){.two-col{grid-template-columns:1fr;}}

/* ── Panels ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.panel-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.panel-hdr-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.panel-hdr-icon.blue{background:rgba(59,130,246,0.15);}
.panel-hdr-icon.amber{background:rgba(245,158,11,0.12);}
.panel-hdr-icon.purple{background:rgba(139,92,246,0.12);}
.panel-hdr-title{font-size:13px;font-weight:700;}
.panel-body{padding:18px;}
.panel-body p,.panel-body li{font-size:13.5px;line-height:1.65;color:var(--muted);}
.panel-body p+p{margin-top:10px;}
.panel-body ul,.panel-body ol{margin-left:18px;margin-top:8px;}
.panel-body li{margin-bottom:4px;}
.panel-body strong{color:var(--text);}

/* Question header */
.q-hdr{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:18px;}
.q-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:6px;}
.q-text{font-size:15px;font-weight:700;color:var(--text);line-height:1.5;}
.q-meta{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.q-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;}
.q-badge.marks{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:#fbbf24;}
.q-badge.ao{font-size:10px;}
.q-badge.ao1a-bg{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#60a5fa;}
.q-badge.ao1b-bg{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#34d399;}
.q-badge.ao2-bg{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);color:#fbbf24;}
.q-badge.ao3a-bg{background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.2);color:#a78bfa;}
.q-badge.ao3b-bg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}

/* ── AO guide ── */
.ao-guide{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.ao-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;}
.ao-chip.ao1a{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:#60a5fa;}
.ao-chip.ao1b{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:#34d399;}
.ao-chip.ao2{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);color:#fbbf24;}
.ao-chip.ao3a{background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.2);color:#a78bfa;}
.ao-chip.ao3b{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;}
.ao-chip-label{font-weight:800;font-size:11px;}
.ao-chip-desc{font-size:11px;opacity:.85;}

/* ── Response card ── */
.response-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:20px;overflow:hidden;}
.rc-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.rc-title{font-size:13px;font-weight:700;}
.rc-subtitle{font-size:11px;color:var(--dim);}
.rc-body{padding:18px;}

/* Stamp bar */
.stamp-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.stamp-btn{padding:7px 14px;border:1.5px solid var(--border);background:transparent;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:.18s;color:var(--muted);}
.stamp-btn:hover{transform:translateY(-1px);}
.stamp-btn.ao1a{color:#60a5fa;border-color:rgba(59,130,246,0.3);}
.stamp-btn.ao1b{color:#34d399;border-color:rgba(16,185,129,0.3);}
.stamp-btn.ao2{color:#fbbf24;border-color:rgba(245,158,11,0.3);}
.stamp-btn.ao3a{color:#a78bfa;border-color:rgba(139,92,246,0.3);}
.stamp-btn.ao3b{color:#fca5a5;border-color:rgba(239,68,68,0.3);}
.stamp-btn.selected.ao1a{background:rgba(59,130,246,0.18);border-color:#3b82f6;color:#93c5fd;box-shadow:0 0 0 2px rgba(59,130,246,0.2);}
.stamp-btn.selected.ao1b{background:rgba(16,185,129,0.18);border-color:#10b981;color:#6ee7b7;box-shadow:0 0 0 2px rgba(16,185,129,0.2);}
.stamp-btn.selected.ao2{background:rgba(245,158,11,0.18);border-color:#f59e0b;color:#fcd34d;box-shadow:0 0 0 2px rgba(245,158,11,0.2);}
.stamp-btn.selected.ao3a{background:rgba(139,92,246,0.18);border-color:#8b5cf6;color:#c4b5fd;box-shadow:0 0 0 2px rgba(139,92,246,0.2);}
.stamp-btn.selected.ao3b{background:rgba(239,68,68,0.18);border-color:#ef4444;color:#fca5a5;box-shadow:0 0 0 2px rgba(239,68,68,0.2);}

/* Response text area */
.response-text{position:relative;background:var(--surface2);border:1.5px dashed var(--border);border-radius:10px;padding:16px;margin-bottom:14px;line-height:1.75;font-size:14px;color:var(--muted);min-height:90px;cursor:crosshair;user-select:none;}
.response-text:hover{border-color:rgba(255,255,255,0.15);}

/* Stamp overlays */
.stamp-overlay{position:absolute;padding:3px 7px;border-radius:5px;font-weight:900;font-size:10px;pointer-events:none;transform:rotate(-10deg);user-select:none;z-index:10;letter-spacing:.5px;}
.stamp-overlay.ao1a{background:#3b82f6;color:#fff;}
.stamp-overlay.ao1b{background:#10b981;color:#fff;}
.stamp-overlay.ao2{background:#f59e0b;color:#fff;}
.stamp-overlay.ao3a{background:#8b5cf6;color:#fff;}
.stamp-overlay.ao3b{background:#ef4444;color:#fff;}

/* Mark input */
.mark-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.mark-label{font-size:12px;font-weight:700;color:var(--muted);}
.mark-input{width:70px;padding:8px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;text-align:center;}
.mark-input:focus{outline:none;border-color:var(--blue);}
.mark-max{font-size:12px;color:var(--dim);}

/* Controls */
.rc-controls{display:flex;gap:8px;flex-wrap:wrap;}
.btn-mark{padding:9px 20px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.18s;}
.btn-mark:hover{background:#2563eb;transform:translateY(-1px);}
.btn-clear{padding:9px 16px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.18s;}
.btn-clear:hover{background:rgba(255,255,255,0.04);color:var(--text);}

/* Feedback */
.feedback{margin-top:14px;border-radius:12px;overflow:hidden;display:none;}
.fb-inner{padding:16px 18px;}
.feedback.correct .fb-inner{background:rgba(16,185,129,0.1);border:1.5px solid rgba(16,185,129,0.3);}
.feedback.incorrect .fb-inner{background:rgba(239,68,68,0.08);border:1.5px solid rgba(239,68,68,0.25);}
.fb-result{font-size:15px;font-weight:800;margin-bottom:10px;}
.feedback.correct .fb-result{color:#34d399;}
.feedback.incorrect .fb-result{color:#fca5a5;}
.fb-mark{font-size:22px;font-weight:900;margin-bottom:10px;}
.feedback.correct .fb-mark{color:#34d399;}
.feedback.incorrect .fb-mark{color:#fca5a5;}
.fb-ao-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.fb-ao-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:700;}
.fb-ao-chip.ok{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:#34d399;}
.fb-ao-chip.miss{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;}
.fb-rationale{font-size:13px;color:var(--muted);line-height:1.55;padding-top:10px;border-top:1px solid var(--border);margin-top:10px;}
.fb-rationale strong{color:var(--text);}

/* Mark scheme (teacher only) */
.ms-panel{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:14px;margin-bottom:20px;overflow:hidden;}
.ms-hdr{padding:12px 18px;border-bottom:1px solid rgba(239,68,68,0.15);display:flex;align-items:center;justify-content:space-between;}
.ms-hdr-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#fca5a5;}
.ms-body{padding:16px 18px;display:none;}
.ms-body.open{display:block;}
.ms-body p,.ms-body li{font-size:13px;color:var(--muted);line-height:1.6;}
.ms-body p+p{margin-top:8px;}
.ms-body ul,.ms-body ol{margin-left:16px;margin-top:6px;}
.ms-body strong{color:var(--text);}
.ms-unlock-btn{padding:6px 14px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.18s;}
.ms-unlock-btn:hover{background:rgba(239,68,68,0.2);}

/* Score summary */
.score-summary{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-top:8px;text-align:center;}
.score-summary h3{font-family:'Fraunces',serif;font-size:20px;font-weight:700;margin-bottom:8px;}
.score-big{font-family:'Fraunces',serif;font-size:52px;font-weight:900;color:var(--gold);line-height:1;}
.score-sub{font-size:14px;color:var(--muted);margin-top:8px;}
.score-breakdown{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px;}
.score-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;}
.score-item strong{display:block;font-size:18px;font-weight:800;margin-bottom:2px;}
.score-item.correct strong{color:var(--green);}
.score-item.incorrect strong{color:var(--red);}
.btn-hub{display:inline-flex;align-items:center;gap:8px;margin-top:20px;padding:11px 22px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:.18s;}
.btn-hub:hover{background:#2563eb;}

/* Strict mode toggle */
.strict-row{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;}
.strict-toggle{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;cursor:pointer;border:none;transition:.2s;flex-shrink:0;}
.strict-toggle.on{background:var(--blue);}
.strict-toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:white;transition:.2s;}
.strict-toggle.on::after{left:19px;}
.strict-label{font-size:12px;color:var(--muted);}
.strict-label strong{color:var(--text);}

@media(max-width:680px){.main{padding:20px 14px 60px;}.two-col{grid-template-columns:1fr;}}

/* Print */
@media print{
  .hdr,.prog-bar-wrap,.stamp-bar,.rc-controls,.ms-panel,.strict-row,.theme-btn,.hdr-btn{display:none!important;}
  body{background:#fff;color:#000;}
  .response-text{border:1px solid #ccc;background:#f9f9f9;}
  .feedback{display:block!important;}
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════
const TEXT = {
  title: "Text 1 — Nina's Knitting Supplies",
  company: "Nina's Knitting Supplies",
  caseStudy: `<p><strong>Nina's Knitting Supplies</strong> — Nina runs a successful business selling knitting wool and sewing products. She opened her first shop 15 years ago. The business has grown organically and now sells products from 10 shops and a website. Nina uses market segmentation to target customers. Nina employs 80 people. She works hard to meet the shared objectives of her employees, as well as external stakeholder groups such as customers, suppliers, lenders and the local community.</p>
  <p>Nina produces a weekly update that is sent by email to all employees every Friday. The updates contain information about the future development of the business, plus other stories of interest to employees. Recent stories include congratulating an employee on the birth of a child and the charity fundraising activities of one shop.</p>
  <p>Nina plans to develop the business further over the next five years, especially as knitting is becoming an increasingly popular pastime. This has led to more competitors entering the market.</p>`,
  questions: [
    {
      code: "Q1", label: "Market Segmentation", marks: 2,
      text: "Explain one way that a business can segment its market. [2]",
      aos: ["ao1a","ao1b"],
      aoGuide: [
        {key:"ao1a", desc:"Identifies a valid method of segmentation"},
        {key:"ao1b", desc:"Explains / gives an example of that method"}
      ],
      stdNote: "This question does NOT require application to Nina — any business context is acceptable. Watch for responses that confuse segmentation basis with research method.",
      markScheme: `<p><strong>Knowledge (AO1A)</strong>: Age · Gender / Sex · Income · Location · Lifestyle</p>
        <p><strong>Understanding examples (AO1B)</strong>: Age (young/old/babies/teenagers/50+) · Gender (male/female) · Income (affluent/high earners/low-paid) · Location (locals/regional/national) · Lifestyle (healthy/sport/outdoor/hobbies)</p>
        <p><em>Answers do not need to relate to Nina's Knitting Supplies.</em></p>`,
      responses: [
        {
          title: "Response A", grade: "0/2",
          text: "They can segment via primary market research, such as interviewing potential customers.",
          scheme: {ao1a:false, ao1b:false, mark:0, rationale:"No credit — confuses a segmentation basis with a research method. No valid basis identified."}
        },
        {
          title: "Response B", grade: "2/2",
          text: "Age — such as targeting their products at selling to children.",
          scheme: {ao1a:true, ao1b:true, mark:2, rationale:"Full marks — valid basis (age) with a simple but sufficient example (children)."}
        },
        {
          title: "Response C", grade: "2/2",
          text: "They could segment via income. For example, targeting higher income customers when selling luxury goods at premium prices.",
          scheme: {ao1a:true, ao1b:true, mark:2, rationale:"Full marks — valid basis (income) with a clear illustrative example."}
        }
      ]
    },
    {
      code: "Q2", label: "External Stakeholders", marks: 6,
      text: "Explain how the objectives of three external stakeholder groups can be satisfied by Nina's Knitting Supplies. [6]",
      aos: ["ao1b","ao2"],
      aoGuide: [
        {key:"ao1b", desc:"Explains the objective of an external stakeholder group"},
        {key:"ao2", desc:"Links that objective to Nina's specific context"}
      ],
      stdNote: "Key marking rule: EXTERNAL stakeholders only — shareholders/employees = no credit. Naming a stakeholder alone = no credit; must explain how their objectives are satisfied by the business. Each valid stakeholder with explanation + application = 2 marks.",
      markScheme: `<p><strong>Understanding may include</strong>: Customers (range/quality/price/service/hours/access/delivery) · Suppliers (paid on time/large & repeat orders/loyalty) · Lenders (repayment on time/high interest) · Government (taxes/timely payment/jobs/sustainability) · Local community (environmental/social responsibility, minimise nuisances, provide jobs, boost local economy)</p>
        <p><strong>Application may include</strong>: 10 shops & website · 15 years trading · organic growth · knitting popularity · successful business</p>
        <ul><li>External stakeholders only.</li><li>No reward for naming the stakeholder group alone — must explain how their objectives are satisfied.</li></ul>`,
      responses: [
        {
          title: "Response A", grade: "0/6",
          text: "1: Shareholders — as the business is successful and expanding with more shops, helping to increase sales so meaning they'll achieve dividends from higher profits.<br>2: Customers — as more shops means a larger customer base, so greater turnover.<br>3: Suppliers — as more shops will need more output, meaning more stock needed. But this could give Nina more power to negotiate lower prices.",
          scheme: {ao1b:false, ao2:true, mark:0, rationale:"Zero — application present but objectives are not explained for each external stakeholder. Shareholders is an internal stakeholder so gets no credit regardless."}
        },
        {
          title: "Response B", grade: "6/6",
          text: "1: An objective for customers would be high quality products and Nina's success suggests she can offer such quality.<br>2: Suppliers would have an objective of large orders and as Nina is expanding, already having 10 shops, it suggests she will need more stock and therefore order more from suppliers.<br>3: Government would want tax revenue and as Nina sells knitting wool and sewing products, she would be charged VAT on these.",
          scheme: {ao1b:true, ao2:true, mark:6, rationale:"Full marks — three valid external stakeholders, each with a clear objective explained and a linked application to Nina's context."}
        }
      ]
    },
    {
      code: "Q3", label: "Organic Growth (Evaluate)", marks: 7,
      text: "Evaluate whether or not Nina's Knitting Supplies should continue to grow organically. [7]",
      aos: ["ao2","ao3a","ao3b"],
      aoGuide: [
        {key:"ao2", desc:"Uses Nina's specific business context"},
        {key:"ao3a", desc:"Analytical chain — because / so / therefore / which means"},
        {key:"ao3b", desc:"Balanced evaluation with a justified conclusion"}
      ],
      stdNote: "Both organic and external growth can be argued — either conclusion is acceptable provided it is justified. Watch for responses that are one-sided (no balance = cannot reach AO3B). A preliminary judgement with analysis but no balance = 3 marks max.",
      markScheme: `<p><strong>Application may include</strong>: 10 shops & website · 15 years trading · grown organically · knitting more popular · new competitors entering</p>
        <p><strong>Analysis may include</strong>: impacts on control, strategy, reputation, costs, profit, cash flow, expansion pace, market share, competitive advantage</p>
        <p><strong>Evaluation</strong>: Candidate may justify either continuing organic growth OR switching to external growth — both are valid.</p>
        <p><strong>Organic arguments</strong>: keeps control · less costly · builds expertise · sustainable pace<br><strong>External growth arguments</strong>: faster · immediate market share · removes a competitor · high upfront cost · loss of control</p>`,
      responses: [
        {
          title: "Response A", grade: "3/7",
          text: "Yes they should continue to grow organically. External growth is risky, whilst organic growth is more controlled. She has owned the business for 15 years and has grown at the speed she has wanted to. This therefore helps her to set her own objectives and continue to pursue them without interference.",
          scheme: {ao2:true, ao3a:true, ao3b:false, mark:3, rationale:"3/7 — applied judgement and analysis present, but no genuine balance. The response never seriously considers the alternative, so AO3B cannot be awarded."}
        },
        {
          title: "Response B", grade: "7/7",
          text: "One reason why external growth should be chosen over organic growth is that it will help the speed of growth. Knitting is becoming increasingly popular, meaning the market will become more competitive. By acquiring another company, they would remove a competitor and gain their market share.<br><br>One reason why organic growth should continue is to ensure that control remains with Nina. She has traded for 15 years and is successful — she does not have to share decision-making or profits and can continue to set her own objectives.<br><br>To evaluate, I would choose external growth as it is likely to support her 5-year plan by growing faster than continuing organically. With new competitors entering the market, it would be more strategic to externally grow by removing at least one rival.",
          scheme: {ao2:true, ao3a:true, ao3b:true, mark:7, rationale:"Full marks — balanced, applied, analytical with a well-reasoned justified conclusion. Both sides are genuinely considered before a supported decision is made."}
        }
      ]
    }
  ]
};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let strictMode = false;
let sessionResults = {}; // qi -> { ri -> {mark, correct} }
let stampCounts = {};    // qi -> { ri -> { ao: count } }
let selectedStamp = {};  // qi -> { ri -> aoKey }
let msUnlocked = {};     // qi -> bool

// ═══════════════════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════════════════
function build() {
  buildProgressTabs();
  buildQuestions();
  activateTab(0);
}

function buildProgressTabs() {
  const el = document.getElementById('progTabs');
  el.innerHTML = '';
  TEXT.questions.forEach((q, qi) => {
    const btn = document.createElement('button');
    btn.className = 'prog-tab';
    btn.id = `ptab-${qi}`;
    btn.innerHTML = `<span class="tab-status" id="pstatus-${qi}"></span>${q.code}: ${q.label} <span style="color:var(--dim);font-size:11px;">(${q.marks})</span>`;
    btn.onclick = () => activateTab(qi);
    el.appendChild(btn);
  });
  // Summary tab
  const sum = document.createElement('button');
  sum.className = 'prog-tab';
  sum.id = 'ptab-summary';
  sum.innerHTML = `<span class="tab-status" id="pstatus-summary"></span>📊 Summary`;
  sum.onclick = () => activateTab('summary');
  el.appendChild(sum);
}

function buildQuestions() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  // Strict mode toggle
  const strictDiv = document.createElement('div');
  strictDiv.className = 'strict-row';
  strictDiv.innerHTML = `
    <button class="strict-toggle" id="strictToggle" onclick="toggleStrict()"></button>
    <span class="strict-label"><strong>Strict AO mode:</strong> When ON, your mark AND your AO annotations must both match the mark scheme.</span>`;
  main.appendChild(strictDiv);

  TEXT.questions.forEach((q, qi) => {
    stampCounts[qi] = {};
    selectedStamp[qi] = {};
    sessionResults[qi] = {};

    const section = document.createElement('div');
    section.className = 'tab-content';
    section.id = `tab-${qi}`;

    // Standardisation note
    section.innerHTML += `
      <div class="std-banner">
        <div class="std-icon">📋</div>
        <div class="std-body">
          <h3>Examiner Standardisation — ${q.code}</h3>
          <p>${q.stdNote}</p>
        </div>
      </div>`;

    // Two-col: case study + question
    section.innerHTML += `
      <div class="two-col">
        <div class="panel">
          <div class="panel-hdr"><div class="panel-hdr-icon blue">📄</div><div class="panel-hdr-title">Case Study — ${TEXT.company}</div></div>
          <div class="panel-body">${TEXT.caseStudy}</div>
        </div>
        <div>
          <div class="q-hdr">
            <div class="q-label">Question ${q.code} · ${q.marks} marks</div>
            <div class="q-text">${q.text}</div>
            <div class="q-meta">
              <span class="q-badge marks">/${q.marks}</span>
              ${q.aos.map(a=>`<span class="q-badge ao ${a}-bg">${a.toUpperCase()}</span>`).join('')}
            </div>
          </div>
          <div class="panel">
            <div class="panel-hdr"><div class="panel-hdr-icon amber">🎯</div><div class="panel-hdr-title">What are examiners looking for?</div></div>
            <div class="panel-body">
              <div class="ao-guide">
                ${q.aoGuide.map(g=>`<div class="ao-chip ${g.key}"><span class="ao-chip-label">${g.key.toUpperCase()}</span><span class="ao-chip-desc">${g.desc}</span></div>`).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>`;

    // Mark scheme (teacher locked)
    const msId = `ms-${qi}`;
    section.innerHTML += `
      <div class="ms-panel">
        <div class="ms-hdr">
          <div class="ms-hdr-title">🔑 Mark Scheme</div>
          <button class="ms-unlock-btn" onclick="unlockMS(${qi})">Unlock (Teacher)</button>
        </div>
        <div class="ms-body" id="${msId}">${q.markScheme}</div>
      </div>`;

    main.appendChild(section);

    // Build response cards
    q.responses.forEach((r, ri) => {
      stampCounts[qi][ri] = {};
      selectedStamp[qi][ri] = null;
      q.aos.forEach(a => { stampCounts[qi][ri][a] = 0; });

      const card = document.createElement('div');
      card.className = 'response-card';
      card.innerHTML = `
        <div class="rc-header">
          <div class="rc-title">${r.title}</div>
          <div class="rc-subtitle">Award a mark · Use stamps to annotate AOs</div>
        </div>
        <div class="rc-body">
          <div class="stamp-bar" id="sb-${qi}-${ri}">
            ${q.aos.map(a=>`<button class="stamp-btn ${a}" id="sbtn-${qi}-${ri}-${a}" onclick="selectStamp(${qi},${ri},'${a}')">${a.toUpperCase()}</button>`).join('')}
          </div>
          <div class="response-text" id="rt-${qi}-${ri}" onclick="placeStamp(event,${qi},${ri})">${r.text}</div>
          <div class="mark-row">
            <span class="mark-label">Your mark:</span>
            <input type="number" class="mark-input" id="mi-${qi}-${ri}" min="0" max="${q.marks}" placeholder="0"/>
            <span class="mark-max">/ ${q.marks}</span>
          </div>
          <div class="rc-controls">
            <button class="btn-mark" onclick="checkMark(${qi},${ri})">Submit Mark</button>
            <button class="btn-clear" onclick="clearStamps(${qi},${ri})">Clear</button>
          </div>
          <div class="feedback" id="fb-${qi}-${ri}"></div>
        </div>`;
      section.appendChild(card);
    });
  });

  // Summary tab
  const sumSection = document.createElement('div');
  sumSection.className = 'tab-content';
  sumSection.id = 'tab-summary';
  sumSection.innerHTML = buildSummaryHTML();
  main.appendChild(sumSection);
}

function buildSummaryHTML() {
  return `
    <div class="score-summary" id="summaryPanel">
      <h3>Session Summary</h3>
      <div id="summaryContent" style="color:var(--muted);font-size:14px;margin-top:12px;">Complete some responses to see your results here.</div>
      <a href="OCR_Be_the_Examiner_Paper1_Hub.html" class="btn-hub" style="margin-top:20px;">← Back to Paper 1 Hub</a>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════
function activateTab(qi) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.prog-tab').forEach(t => t.classList.remove('active'));
  const id = qi === 'summary' ? 'tab-summary' : `tab-${qi}`;
  const pid = qi === 'summary' ? 'ptab-summary' : `ptab-${qi}`;
  document.getElementById(id)?.classList.add('active');
  document.getElementById(pid)?.classList.add('active');
  if (qi === 'summary') updateSummary();
}

function selectStamp(qi, ri, ao) {
  selectedStamp[qi][ri] = ao;
  const q = TEXT.questions[qi];
  q.aos.forEach(a => {
    document.getElementById(`sbtn-${qi}-${ri}-${a}`)?.classList.toggle('selected', a === ao);
  });
}

function placeStamp(evt, qi, ri) {
  const ao = selectedStamp[qi][ri];
  if (!ao) { alert('Select an AO stamp first, then click on the response.'); return; }
  const box = document.getElementById(`rt-${qi}-${ri}`);
  const rect = box.getBoundingClientRect();
  const x = evt.clientX - rect.left;
  const y = evt.clientY - rect.top;
  const s = document.createElement('div');
  s.className = `stamp-overlay ${ao}`;
  s.textContent = ao.toUpperCase();
  s.style.left = (x - 16) + 'px';
  s.style.top = (y - 10) + 'px';
  box.appendChild(s);
  stampCounts[qi][ri][ao] = (stampCounts[qi][ri][ao] || 0) + 1;
}

function clearStamps(qi, ri) {
  const box = document.getElementById(`rt-${qi}-${ri}`);
  box.querySelectorAll('.stamp-overlay').forEach(s => s.remove());
  const q = TEXT.questions[qi];
  q.aos.forEach(a => { stampCounts[qi][ri][a] = 0; });
  selectedStamp[qi][ri] = null;
  q.aos.forEach(a => document.getElementById(`sbtn-${qi}-${ri}-${a}`)?.classList.remove('selected'));
  document.getElementById(`mi-${qi}-${ri}`).value = '';
  const fb = document.getElementById(`fb-${qi}-${ri}`);
  fb.style.display = 'none';
  // Remove from results
  if (sessionResults[qi]) delete sessionResults[qi][ri];
  updateTabStatus(qi);
}

function checkMark(qi, ri) {
  const q = TEXT.questions[qi];
  const r = q.responses[ri];
  const c = r.scheme;
  const markEl = document.getElementById(`mi-${qi}-${ri}`);
  const entered = parseInt(markEl.value);
  if (isNaN(entered)) { alert('Please enter a mark before submitting.'); return; }

  const sc = stampCounts[qi][ri];
  const markCorrect = entered === c.mark;

  // AO checks
  const aoChecks = {};
  q.aos.forEach(a => {
    const expected = c[a];
    if (expected === undefined || expected === null) { aoChecks[a] = {pass:true, expected:null}; return; }
    const placed = (sc[a] || 0) >= 1;
    const expectBool = typeof expected === 'number' ? expected > 0 : !!expected;
    aoChecks[a] = { pass: placed === expectBool, expected: expectBool, placed };
  });
  const aosOk = Object.values(aoChecks).every(x => x.pass);
  const isCorrect = strictMode ? (markCorrect && aosOk) : markCorrect;

  sessionResults[qi][ri] = { entered, correct: isCorrect, actual: c.mark, max: q.marks };
  updateTabStatus(qi);

  // Build feedback
  const fb = document.getElementById(`fb-${qi}-${ri}`);
  fb.style.display = 'block';
  fb.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;

  let aoRow = '<div class="fb-ao-row">';
  q.aos.forEach(a => {
    const ch = aoChecks[a];
    if (ch.expected === null) return;
    const label = ch.expected ? `${a.toUpperCase()} ✓ expected` : `${a.toUpperCase()} ✗ not expected`;
    aoRow += `<div class="fb-ao-chip ${ch.pass ? 'ok' : 'miss'}">${label}${!ch.pass ? ` (you: ${ch.placed ? 'placed' : 'not placed'})` : ''}</div>`;
  });
  aoRow += '</div>';

  fb.innerHTML = `<div class="fb-inner">
    <div class="fb-result">${isCorrect ? '✓ Correct mark!' : '✗ Not quite right'}</div>
    <div class="fb-mark">${c.mark} / ${q.marks}</div>
    ${aoRow}
    <div class="fb-rationale"><strong>Examiner rationale:</strong> ${c.rationale}</div>
  </div>`;

  if (!isCorrect && strictMode && markCorrect) {
    fb.querySelector('.fb-inner').insertAdjacentHTML('beforeend',
      `<div style="margin-top:10px;padding:10px 12px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);border-radius:8px;font-size:12px;color:#fbbf24;">Your mark was right but your AO annotations didn't match — strict mode requires both. Try re-annotating.</div>`);
  }
}

function unlockMS(qi) {
  if (msUnlocked[qi]) {
    document.getElementById(`ms-${qi}`)?.classList.toggle('open');
    return;
  }
  const pw = prompt('Enter teacher password to view mark scheme:');
  if (pw && pw.toUpperCase() === 'BIZANSWERS') {
    msUnlocked[qi] = true;
    document.getElementById(`ms-${qi}`)?.classList.add('open');
  } else if (pw !== null) {
    alert('Incorrect password.');
  }
}

function toggleStrict() {
  strictMode = !strictMode;
  const btn = document.getElementById('strictToggle');
  btn.classList.toggle('on', strictMode);
}

function updateTabStatus(qi) {
  const results = sessionResults[qi] || {};
  const total = TEXT.questions[qi].responses.length;
  const done = Object.keys(results).length;
  const correct = Object.values(results).filter(r => r.correct).length;
  const statusEl = document.getElementById(`pstatus-${qi}`);
  if (!statusEl) return;
  statusEl.className = 'tab-status';
  if (done === 0) { statusEl.textContent = ''; return; }
  if (correct === done) { statusEl.classList.add('done'); statusEl.textContent = '✓'; }
  else { statusEl.classList.add('partial'); statusEl.textContent = done; }
}

function updateSummary() {
  const el = document.getElementById('summaryContent');
  let total = 0, attempted = 0, correct = 0;
  const rows = [];

  TEXT.questions.forEach((q, qi) => {
    const results = sessionResults[qi] || {};
    q.responses.forEach((r, ri) => {
      total++;
      if (results[ri] !== undefined) {
        attempted++;
        if (results[ri].correct) correct++;
        rows.push(`<div class="score-item ${results[ri].correct ? 'correct' : 'incorrect'}">
          <strong>${results[ri].correct ? '✓' : '✗'}</strong>
          ${q.code} ${r.title} — You: ${results[ri].entered}/${q.marks} · Actual: ${results[ri].actual}/${q.marks}
        </div>`);
      }
    });
  });

  if (attempted === 0) {
    el.innerHTML = '<p style="color:var(--muted)">Complete some responses to see your results here.</p>';
    return;
  }

  const pct = Math.round((correct / attempted) * 100);
  el.innerHTML = `
    <div class="score-big">${correct}<span style="font-size:28px;color:var(--muted)">/${attempted}</span></div>
    <div class="score-sub">responses marked correctly (${pct}%)</div>
    <div class="score-breakdown">${rows.join('')}</div>`;
}

// ═══════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════
(function(){
  var t = localStorage.getItem('biz-omics-theme') || 'dark';
  document.body.setAttribute('data-theme', t);
})();
function toggleTheme(){
  var cur = document.body.getAttribute('data-theme') || 'dark';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', next);
  localStorage.setItem('biz-omics-theme', next);
  document.getElementById('themeBtn').textContent = next === 'light' ? '🌙' : '☀';
}
(function(){
  var btn = document.getElementById('themeBtn');
  var t = localStorage.getItem('biz-omics-theme') || 'dark';
  if(btn) btn.textContent = t === 'light' ? '🌙' : '☀';
})();

build();
</script>
</body>
</html>
