<script>
const TEXT = {
  title: "Text 2 — Clarks Footwear",
  company: "C & J Clark International Ltd (Clarks)",
  caseStudy: `<p><strong>C & J Clark International Ltd (Clarks)</strong> is a successful UK footwear brand with ranges for children, women, and men. Their market is very competitive. Clarks employs specialist designers who create new shoe styles in response to fast-changing fashion trends. The designers interpret quantitative data carefully when planning new shoe styles. The designers work closely with employees from other functional areas of the business, such as marketing, finance, and retail, to ensure that the new shoe styles meet customers' needs profitably.</p>
  <p>Clarks works hard to retain its team of designers, as they are central to its success. However, Clarks sometimes needs to recruit new designers and uses several selection methods to help find the best person available to fill the vacancy.</p>`,
  questions: [
    {
      code:"Q1", label:"Quantitative Data", marks:3,
      text:"Analyse one advantage for Clarks of interpreting quantitative data when designing new products. [3]",
      aos:["ao1b","ao2","ao3a"],
      aoGuide:[
        {key:"ao1b", desc:"Understands what quantitative data is and how it helps"},
        {key:"ao2", desc:"Links to Clarks' designers / competitive market"},
        {key:"ao3a", desc:"Analytical chain showing the impact"}
      ],
      stdNote:"Watch for responses that confuse quantitative (numerical) with qualitative (opinion-based) data. AO1B requires understanding of quantitative data — not just naming it. Full marks requires all three AOs to be present.",
      markScheme:`<p><strong>AO1B</strong>: Quantitative data is numerical, allows trends to be identified, can be analysed statistically, comparable over time</p>
        <p><strong>AO2</strong>: Clarks designers / competitive market / fast-changing fashion trends / meeting customer needs profitably</p>
        <p><strong>AO3A</strong>: Because the data is numerical, Clarks can compare results → identify what customers want → design better products → gain competitive advantage</p>`,
      responses:[
        {title:"Response A", grade:"0/3",
         text:"One advantage for Clarks of interpreting quantitative data when designing new products is that it will provide detailed and in-depth opinions. This then allows for Clarks to gain greater understanding of customer needs, which they can then meet.",
         scheme:{ao1b:false, ao2:false, ao3a:false, mark:0, rationale:"Zero — confuses quantitative data (numerical) with qualitative data (opinions/in-depth). No credit can be awarded as the foundation of the answer is incorrect."}},
        {title:"Response B", grade:"1/3",
         text:"One advantage is that quantitative research data would allow for a large volume of data to be collected, which means that Clarks can sort, to help identify trends and therefore analyse the data to determine decisions on possible products to launch.",
         scheme:{ao1b:true, ao2:false, ao3a:false, mark:1, rationale:"1/3 — AO1B present (large volume, identify trends) but no application to Clarks' specific context and the analytical chain is incomplete."}},
        {title:"Response C", grade:"3/3",
         text:"One advantage for Clarks is that due to the very competitive market they operate in, and the fast-changing fashion trends, it is essential that designs meet the needs of customers. Quantitative data allows for trends to be identified, due to the numerical nature of the research, helping to compare results and make conclusions on what designs to launch and enhance competitive advantage.",
         scheme:{ao1b:true, ao2:true, ao3a:true, mark:3, rationale:"Full marks — AO1B (numerical, identify trends, compare results), AO2 (competitive market, fast-changing fashion), AO3A (therefore can make conclusions on designs, enhance competitive advantage)."}}
      ]
    },
    {
      code:"Q2", label:"Employee Retention", marks:6,
      text:"Explain three reasons why employee retention is important for Clarks. [6]",
      aos:["ao1b","ao2"],
      aoGuide:[
        {key:"ao1b", desc:"Explains a genuine benefit of retention (1 mark per reason)"},
        {key:"ao2", desc:"Links that benefit to Clarks' specific context (1 mark per link)"}
      ],
      stdNote:"This is a 2+2+2 structure — each reason earns 1 mark for knowledge/understanding and 1 additional mark for application to Clarks. Three reasons maximum. Watch for responses where all three reasons are essentially the same point reworded.",
      markScheme:`<p><strong>Reasons may include</strong>: reduces recruitment/training costs · retains specialist knowledge/skills · maintains productivity · avoids skills gaps · improves morale · preserves customer relationships · protects competitive position</p>
        <p><strong>Application to Clarks</strong>: specialist designers central to success · very competitive market · designers work across functional areas · fast-changing fashion trends</p>
        <p><em>2 marks per valid reason (AO1B + AO2). Maximum 3 reasons assessed.</em></p>`,
      responses:[
        {title:"Response A", grade:"2/6",
         text:"1. Makes staff feel highly valued — if there is high staff retention, specialist designers do not want to leave due to the job satisfaction they receive from working at the company.<br><br>2. Lower costs — as the company does not need to recruit, that means more profit for the business.<br><br>3. Quality of workers — as they are not losing key staff such as specialist designers, they will retain such skills, which can provide competitiveness, in what is a competitive market.",
         scheme:{ao1b:true, ao2:false, mark:2, rationale:"2/6 — Reason 1 describes job satisfaction but not a business benefit. Reason 2 gets AO1B only (lower costs) — no Clarks application. Reason 3 gets AO1B + AO2 (specialist designers, competitive market) = 2 marks. Total 2 marks."}},
        {title:"Response B", grade:"6/6",
         text:"1. Size of the workforce — retention avoids skills gaps, which may slow down labour productivity, hurting competitiveness in what is a very competitive market.<br><br>2. Quality of the workforce — Clarks has specialist designers and their skill is crucial to the products they develop. By retaining such talent, it ensures the quality of the workforce.<br><br>3. Reduces HR costs — avoids the need to recruit or train new employees, which adds cost to the company. By retaining staff, they do not need to allocate funds for this.",
         scheme:{ao1b:true, ao2:true, mark:6, rationale:"Full marks — all three reasons earn both AO1B and AO2. Each is a distinct benefit with a clear link to Clarks' context (competitive market, specialist designers, cost management)."}},
        {title:"Response C", grade:"3/6",
         text:"1. Reduced need for recruitment — high retention means they do not need to recruit replacements, which avoids the cost of advertising such roles.<br><br>2. High motivation — high retention signals job satisfaction, which then supports labour productivity.<br><br>3. Retains knowledge — this means that Clarks will keep their most experienced workers.",
         scheme:{ao1b:true, ao2:false, mark:3, rationale:"3/6 — All three reasons earn AO1B (valid business benefits). However, none includes specific application to Clarks' context (no mention of specialist designers, competitive market, fashion trends). AO2 not awarded for any reason."}}
      ]
    },
    {
      code:"Q3", label:"Interviews", marks:3,
      text:"Analyse one advantage for Clarks of using interviews to select new designers. [3]",
      aos:["ao1b","ao2","ao3a"],
      aoGuide:[
        {key:"ao1b", desc:"Explains what interviews allow an employer to assess"},
        {key:"ao2", desc:"Links to Clarks — designers, competitive market, skill requirement"},
        {key:"ao3a", desc:"Shows the chain: interview advantage → business outcome"}
      ],
      stdNote:"Interviews are a selection tool — responses must be about the advantage of the interview process, not about market research or other business activities. A common error is confusing interviews with surveys/focus groups.",
      markScheme:`<p><strong>AO1B</strong>: Interviews allow employer to directly observe/assess the candidate · ask specific questions · compare applicants · assess communication/soft skills · verify information from CV</p>
        <p><strong>AO2</strong>: Designers are central to Clarks' success · competitive market · need specialist skills · work across functional areas</p>
        <p><strong>AO3A</strong>: Therefore Clarks can identify the best designer → improve product quality → maintain competitive advantage</p>`,
      responses:[
        {title:"Response A", grade:"3/3",
         text:"One advantage of using interviews is that it allows for the business to observe how the applicant responds under pressure by the questions they ask. As they operate in a very competitive market, it is crucial to recruit the most highly skilled designers who can perform under competitive pressure. This therefore means the right recruitment will enhance labour productivity.",
         scheme:{ao1b:true, ao2:true, ao3a:true, mark:3, rationale:"Full marks — AO1B (observe how applicant responds), AO2 (very competitive market, highly skilled designers), AO3A (therefore right recruitment → enhanced productivity)."}},
        {title:"Response B", grade:"0/3",
         text:"One advantage of using interviews is that they can gather good market research. This therefore means the staff member will use the data to achieve the needs of the customer.",
         scheme:{ao1b:false, ao2:false, ao3a:false, mark:0, rationale:"Zero — fundamentally confuses interviews (a selection method) with market research. The response is not about what an interview achieves in the context of selection. No credit."}},
        {title:"Response C", grade:"3/3",
         text:"One advantage of using interviews is that they can ask questions to all applicants and compare the responses given. This allows the business to rank the applicants who give the strongest responses to all questions, allowing the best person to be hired. As designers are central to the success of Clarks, by recruiting the best worker, it can give them an advantage over competitors with reference to better decisions being made.",
         scheme:{ao1b:true, ao2:true, ao3a:true, mark:3, rationale:"Full marks — AO1B (compare responses, rank applicants), AO2 (designers central to success of Clarks), AO3A (best worker hired → advantage over competitors)."}}
      ]
    },
    {
      code:"Q4", label:"References", marks:3,
      text:"Analyse one advantage for Clarks of using references to select new designers. [3]",
      aos:["ao1b","ao2","ao3a"],
      aoGuide:[
        {key:"ao1b", desc:"Explains what references provide as a selection method"},
        {key:"ao2", desc:"Links to Clarks — designers, specialism, team working"},
        {key:"ao3a", desc:"Analytical chain from reference → business benefit"}
      ],
      stdNote:"References are third-party verification — they are distinct from interviews. Watch for responses that simply restate that a reference is from a past employer without explaining what it adds to selection. AO3A requires a clear 'therefore' moment.",
      markScheme:`<p><strong>AO1B</strong>: References verify information provided by the applicant · provide third-party evidence · give insight into suitability · confirm past performance · provide additional perspective</p>
        <p><strong>AO2</strong>: Specialist designers · competitive market · designers work with other functional areas · need to avoid a costly wrong appointment</p>
        <p><strong>AO3A</strong>: Therefore Clarks can be more confident the appointed designer has the right skills → reduces risk of poor hiring decision → protects competitive position</p>`,
      responses:[
        {title:"Response A", grade:"3/3",
         text:"A reference can verify information which has been provided by the applicant to ensure accuracy. The market is very competitive, so it is crucially important that they are not misled in hiring the wrong person, as this may hurt labour productivity.",
         scheme:{ao1b:true, ao2:true, ao3a:true, mark:3, rationale:"Full marks — AO1B (verify information, ensure accuracy), AO2 (very competitive market), AO3A (not misled → hiring wrong person → hurts labour productivity)."}},
        {title:"Response B", grade:"3/3",
         text:"The reference can offer additional information from a past employer, which might provide a greater overall picture of the applicant. Such references may provide insight into how they fitted within the team, which is essential as designers need to work alongside other functional areas. Therefore, such a reference can enhance teamwork.",
         scheme:{ao1b:true, ao2:true, ao3a:true, mark:3, rationale:"Full marks — AO1B (additional information, greater picture), AO2 (designers need to work alongside other functional areas — a specific Clarks detail), AO3A (therefore can enhance teamwork)."}},
        {title:"Response C", grade:"3/3",
         text:"As the reference is provided by a third party such as a past employer, it offers additional insight into their specialism. As the employer has witnessed the applicant's performance, they can confirm their suitability to the role. As they are seeking specialists to support Clarks with their objective of higher market share, it is essential the designers can add to their competitiveness.",
         scheme:{ao1b:true, ao2:true, ao3a:true, mark:3, rationale:"Full marks — AO1B (third-party, confirms suitability, insight into specialism), AO2 (objective of market share, Clarks seeking specialists), AO3A (essential to add to competitiveness)."}}
      ]
    },
    {
      code:"Q5", label:"Recommend Selection Method", marks:3,
      text:"Recommend whether using interviews or references is likely to be more effective for selecting new designers. Give a reason for your answer. [3]",
      aos:["ao3b"],
      aoGuide:[
        {key:"ao3b", desc:"Justified recommendation: 1 = decision only · 2 = decision + justification · 3 = decision + comparison + context"}
      ],
      stdNote:"Either interviews OR references can be recommended — the quality of the justification earns the marks, not which option is chosen. Mark on a 3-level scale: 1 mark (decision only), 2 marks (decision with justification, no comparison), 3 marks (comparative justification with Clarks context). This is pure AO3B.",
      markScheme:`<p><strong>1 mark</strong>: Decision only — names either interviews or references</p>
        <p><strong>2 marks</strong>: Decision + justification of chosen method (but no comparison to the alternative)</p>
        <p><strong>3 marks</strong>: Decision + comparative justification (explains why chosen method is better than the alternative) + reference to Clarks' context</p>`,
      responses:[
        {title:"Response A", grade:"1/3",
         text:"I think they should choose an interview to select new designers.",
         scheme:{ao3b:true, mark:1, rationale:"1/3 — Decision only. No reason, no justification, no comparison. Examiner can only award 1 mark."}},
        {title:"Response B", grade:"2/3",
         text:"I think they should choose an interview as it allows them to make an assessment via their own observations. Which is so important due to the risk of hiring the wrong employee with the market being so competitive and rivals hiring applicants we turned down.",
         scheme:{ao3b:true, mark:2, rationale:"2/3 — Decision with contextual justification (competitive market, risk of wrong hire). However there is no comparison to references — why is an interview better than a reference? That comparison is needed for 3 marks."}},
        {title:"Response C", grade:"3/3",
         text:"I think an interview is better for selection. I believe it to be more effective than a reference as a reference is only the point of view of a third party, but an interview allows Clarks to observe the applicant under certain circumstances. This might prove to be more effective for what they are looking for, which is essential as they do not want to make a mistake in appointment with the market being so competitive and rivals also possibly recruiting.",
         scheme:{ao3b:true, mark:3, rationale:"Full marks — clear decision (interview), genuine comparison (a reference is only third-party vs an interview allows direct observation), Clarks context (competitive market, rivals recruiting). All three level criteria met."}}
      ]
    }
  ]
};

let strictMode=false,sessionResults={},stampCounts={},selectedStamp={},msUnlocked={};

function build(){buildProgressTabs();buildQuestions();activateTab(0);}
function buildProgressTabs(){
  const el=document.getElementById('progTabs');el.innerHTML='';
  TEXT.questions.forEach((q,qi)=>{
    const btn=document.createElement('button');btn.className='prog-tab';btn.id=`ptab-${qi}`;
    btn.innerHTML=`<span class="tab-status" id="pstatus-${qi}"></span>${q.code}: ${q.label} <span style="color:var(--dim);font-size:11px;">(${q.marks})</span>`;
    btn.onclick=()=>activateTab(qi);el.appendChild(btn);
  });
  const sum=document.createElement('button');sum.className='prog-tab';sum.id='ptab-summary';
  sum.innerHTML=`<span class="tab-status" id="pstatus-summary"></span>📊 Summary`;
  sum.onclick=()=>activateTab('summary');el.appendChild(sum);
}
function buildQuestions(){
  const main=document.getElementById('mainContent');main.innerHTML='';
  const strictDiv=document.createElement('div');strictDiv.className='strict-row';
  strictDiv.innerHTML=`<button class="strict-toggle" id="strictToggle" onclick="toggleStrict()"></button><span class="strict-label"><strong>Strict AO mode:</strong> When ON, your mark AND your AO annotations must both match the mark scheme.</span>`;
  main.appendChild(strictDiv);
  TEXT.questions.forEach((q,qi)=>{
    stampCounts[qi]={};selectedStamp[qi]={};sessionResults[qi]={};
    const section=document.createElement('div');section.className='tab-content';section.id=`tab-${qi}`;
    section.innerHTML+=`<div class="std-banner"><div class="std-icon">📋</div><div class="std-body"><h3>Examiner Standardisation — ${q.code}</h3><p>${q.stdNote}</p></div></div>`;
    section.innerHTML+=`<div class="two-col"><div class="panel"><div class="panel-hdr"><div class="panel-hdr-icon blue">📄</div><div class="panel-hdr-title">Case Study — ${TEXT.company}</div></div><div class="panel-body">${TEXT.caseStudy}</div></div><div><div class="q-hdr"><div class="q-label">Question ${q.code} · ${q.marks} marks</div><div class="q-text">${q.text}</div><div class="q-meta"><span class="q-badge marks">/${q.marks}</span>${q.aos.map(a=>`<span class="q-badge ao ${a}-bg">${a.toUpperCase()}</span>`).join('')}</div></div><div class="panel"><div class="panel-hdr"><div class="panel-hdr-icon amber">🎯</div><div class="panel-hdr-title">What are examiners looking for?</div></div><div class="panel-body"><div class="ao-guide">${q.aoGuide.map(g=>`<div class="ao-chip ${g.key}"><span class="ao-chip-label">${g.key.toUpperCase()}</span><span class="ao-chip-desc">${g.desc}</span></div>`).join('')}</div></div></div></div></div>`;
    section.innerHTML+=`<div class="ms-panel"><div class="ms-hdr"><div class="ms-hdr-title">🔑 Mark Scheme</div><button class="ms-unlock-btn" onclick="unlockMS(${qi})">Unlock (Teacher)</button></div><div class="ms-body" id="ms-${qi}">${q.markScheme}</div></div>`;
    main.appendChild(section);
    q.responses.forEach((r,ri)=>{
      stampCounts[qi][ri]={};selectedStamp[qi][ri]=null;
      q.aos.forEach(a=>{stampCounts[qi][ri][a]=0;});
      const card=document.createElement('div');card.className='response-card';
      card.innerHTML=`<div class="rc-header"><div class="rc-title">${r.title}</div><div class="rc-subtitle">Award a mark · Annotate with AO stamps</div></div><div class="rc-body"><div class="stamp-bar" id="sb-${qi}-${ri}">${q.aos.map(a=>`<button class="stamp-btn ${a}" id="sbtn-${qi}-${ri}-${a}" onclick="selectStamp(${qi},${ri},'${a}')">${a.toUpperCase()}</button>`).join('')}</div><div class="response-text" id="rt-${qi}-${ri}" onclick="placeStamp(event,${qi},${ri})">${r.text}</div><div class="mark-row"><span class="mark-label">Your mark:</span><input type="number" class="mark-input" id="mi-${qi}-${ri}" min="0" max="${q.marks}" placeholder="0"/><span class="mark-max">/ ${q.marks}</span></div><div class="rc-controls"><button class="btn-mark" onclick="checkMark(${qi},${ri})">Submit Mark</button><button class="btn-clear" onclick="clearStamps(${qi},${ri})">Clear</button></div><div class="feedback" id="fb-${qi}-${ri}"></div></div>`;
      section.appendChild(card);
    });
  });
  const sumSection=document.createElement('div');sumSection.className='tab-content';sumSection.id='tab-summary';
  sumSection.innerHTML=`<div class="score-summary" id="summaryPanel"><h3>Session Summary</h3><div id="summaryContent" style="color:var(--muted);font-size:14px;margin-top:12px;">Complete some responses to see your results here.</div><a href="OCR_Be_the_Examiner_Paper1_Hub.html" class="btn-hub" style="margin-top:20px;">← Back to Paper 1 Hub</a></div>`;
  main.appendChild(sumSection);
}
function activateTab(qi){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.prog-tab').forEach(t=>t.classList.remove('active'));
  const id=qi==='summary'?'tab-summary':`tab-${qi}`;
  const pid=qi==='summary'?'ptab-summary':`ptab-${qi}`;
  document.getElementById(id)?.classList.add('active');
  document.getElementById(pid)?.classList.add('active');
  if(qi==='summary')updateSummary();
}
function selectStamp(qi,ri,ao){
  selectedStamp[qi][ri]=ao;
  TEXT.questions[qi].aos.forEach(a=>document.getElementById(`sbtn-${qi}-${ri}-${a}`)?.classList.toggle('selected',a===ao));
}
function placeStamp(evt,qi,ri){
  const ao=selectedStamp[qi][ri];
  if(!ao){alert('Select an AO stamp first, then click on the response.');return;}
  const box=document.getElementById(`rt-${qi}-${ri}`);
  const rect=box.getBoundingClientRect();
  const s=document.createElement('div');s.className=`stamp-overlay ${ao}`;s.textContent=ao.toUpperCase();
  s.style.left=(evt.clientX-rect.left-16)+'px';s.style.top=(evt.clientY-rect.top-10)+'px';
  box.appendChild(s);stampCounts[qi][ri][ao]=(stampCounts[qi][ri][ao]||0)+1;
}
function clearStamps(qi,ri){
  document.getElementById(`rt-${qi}-${ri}`)?.querySelectorAll('.stamp-overlay').forEach(s=>s.remove());
  TEXT.questions[qi].aos.forEach(a=>{stampCounts[qi][ri][a]=0;document.getElementById(`sbtn-${qi}-${ri}-${a}`)?.classList.remove('selected');});
  selectedStamp[qi][ri]=null;
  document.getElementById(`mi-${qi}-${ri}`).value='';
  document.getElementById(`fb-${qi}-${ri}`).style.display='none';
  if(sessionResults[qi])delete sessionResults[qi][ri];
  updateTabStatus(qi);
}
function checkMark(qi,ri){
  const q=TEXT.questions[qi];const r=q.responses[ri];const c=r.scheme;
  const entered=parseInt(document.getElementById(`mi-${qi}-${ri}`).value);
  if(isNaN(entered)){alert('Please enter a mark before submitting.');return;}
  const sc=stampCounts[qi][ri];const markCorrect=entered===c.mark;
  const aoChecks={};
  q.aos.forEach(a=>{
    const exp=c[a];if(exp===undefined||exp===null){aoChecks[a]={pass:true,expected:null};return;}
    const placed=(sc[a]||0)>=1;const expectBool=typeof exp==='number'?exp>0:!!exp;
    aoChecks[a]={pass:placed===expectBool,expected:expectBool,placed};
  });
  const aosOk=Object.values(aoChecks).every(x=>x.pass);
  const isCorrect=strictMode?(markCorrect&&aosOk):markCorrect;
  sessionResults[qi][ri]={entered,correct:isCorrect,actual:c.mark,max:q.marks};
  updateTabStatus(qi);
  const fb=document.getElementById(`fb-${qi}-${ri}`);fb.style.display='block';fb.className=`feedback ${isCorrect?'correct':'incorrect'}`;
  let aoRow='<div class="fb-ao-row">';
  q.aos.forEach(a=>{const ch=aoChecks[a];if(ch.expected===null)return;const label=ch.expected?`${a.toUpperCase()} ✓ expected`:`${a.toUpperCase()} ✗ not expected`;aoRow+=`<div class="fb-ao-chip ${ch.pass?'ok':'miss'}">${label}${!ch.pass?` (you: ${ch.placed?'placed':'not placed'})`:''}</div>`;});
  aoRow+='</div>';
  fb.innerHTML=`<div class="fb-inner"><div class="fb-result">${isCorrect?'✓ Correct mark!':'✗ Not quite right'}</div><div class="fb-mark">${c.mark} / ${q.marks}</div>${aoRow}<div class="fb-rationale"><strong>Examiner rationale:</strong> ${c.rationale}</div></div>`;
}
function unlockMS(qi){
  if(msUnlocked[qi]){document.getElementById(`ms-${qi}`)?.classList.toggle('open');return;}
  const pw=prompt('Enter teacher password:');
  if(pw&&pw.toUpperCase()==='BIZANSWERS'){msUnlocked[qi]=true;document.getElementById(`ms-${qi}`)?.classList.add('open');}
  else if(pw!==null)alert('Incorrect password.');
}
function toggleStrict(){strictMode=!strictMode;document.getElementById('strictToggle').classList.toggle('on',strictMode);}
function updateTabStatus(qi){
  const results=sessionResults[qi]||{};const done=Object.keys(results).length;const correct=Object.values(results).filter(r=>r.correct).length;
  const el=document.getElementById(`pstatus-${qi}`);if(!el)return;el.className='tab-status';
  if(done===0){el.textContent='';return;}
  if(correct===done){el.classList.add('done');el.textContent='✓';}else{el.classList.add('partial');el.textContent=done;}
}
function updateSummary(){
  const el=document.getElementById('summaryContent');let attempted=0,correct=0;const rows=[];
  TEXT.questions.forEach((q,qi)=>{const results=sessionResults[qi]||{};q.responses.forEach((r,ri)=>{if(results[ri]!==undefined){attempted++;if(results[ri].correct)correct++;rows.push(`<div class="score-item ${results[ri].correct?'correct':'incorrect'}"><strong>${results[ri].correct?'✓':'✗'}</strong>${q.code} ${r.title} — You: ${results[ri].entered}/${q.marks} · Actual: ${results[ri].actual}/${q.marks}</div>`);}});});
  if(attempted===0){el.innerHTML='<p style="color:var(--muted)">Complete some responses to see your results here.</p>';return;}
  const pct=Math.round((correct/attempted)*100);
  el.innerHTML=`<div class="score-big">${correct}<span style="font-size:28px;color:var(--muted)">/${attempted}</span></div><div class="score-sub">responses marked correctly (${pct}%)</div><div class="score-breakdown">${rows.join('')}</div>`;
}
(function(){var t=localStorage.getItem('biz-omics-theme')||'dark';document.body.setAttribute('data-theme',t);var btn=document.getElementById('themeBtn');if(btn)btn.textContent=t==='light'?'🌙':'☀';})();
function toggleTheme(){var cur=document.body.getAttribute('data-theme')||'dark';var next=cur==='dark'?'light':'dark';document.body.setAttribute('data-theme',next);localStorage.setItem('biz-omics-theme',next);document.getElementById('themeBtn').textContent=next==='light'?'🌙':'☀';}
build();
</script>
