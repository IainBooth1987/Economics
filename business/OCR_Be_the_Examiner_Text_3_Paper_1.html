<script>
const TEXT = {
  title: "Text 3 — Walkers Snack Foods",
  company: "Walkers Snack Foods Ltd",
  caseStudy: `<p><strong>Walkers Snack Foods Ltd (Walkers)</strong> manufactures well-known snacks, including Walkers crisps, Quavers and Wotsits. The company has a market share of more than 50% of the UK potato snack market. The company aims to maintain its market share and to increase profitability. Flavours are regularly added to Walkers' range of crisps, often trialling new flavours before launching them. Recent examples have included 'fish & chips' and 'chicken burrito' flavours.</p>
  <p>Walkers have responded to concerns about healthy eating by adapting its product range, including: recipe changes to reduce added salt by 25% and saturated fats by up to 70%; a reduction in bag size; multipacks now containing 22 bags rather than 24, with no change in price.</p>
  <p>An independent market research company arranged focus groups in both 2017 and 2022 to look at healthy eating trends. It found that: 46% of people were concerned about healthy eating in 2017, compared with 60% in 2022; in 2022, 36% of people considered whether a snack was healthy before buying it; in 2017, 26% of people thought that snack companies were trying to produce more healthy products — by 2022 this figure had increased to 29%.</p>`,
  questions: [
    {
      code:"Q1", label:"Trialling New Products", marks:6,
      text:"Analyse two advantages for Walkers of trialling new products before launching them. [6]",
      aos:["ao1b","ao2","ao3a"],
      aoGuide:[
        {key:"ao1b", desc:"Explains a genuine advantage of trialling (per advantage)"},
        {key:"ao2", desc:"Links that advantage to Walkers' specific context"},
        {key:"ao3a", desc:"Analytical chain showing the business impact"}
      ],
      stdNote:"This is a 3+3 structure — two separate advantages, each worth up to 3 marks (AO1B + AO2 + AO3A). Both advantages must be distinct — the same point made twice cannot earn marks twice. Watch for responses that reference the wrong product (e.g. Wotsits for crisps question — brand confusion is common).",
      markScheme:`<p><strong>AO1B per advantage</strong>: Identifies demand / tests customer reaction / reduces risk of failure / gathers feedback / avoids wasted investment in full launch</p>
        <p><strong>AO2</strong>: Walkers / new flavours (fish & chips, chicken burrito) / brand image (Quavers, Wotsits) / aim to maintain market share / objective of profitability</p>
        <p><strong>AO3A</strong>: Because they can test first → they understand customer reaction → reduce the risk of a costly failed launch → protect brand image / market share</p>
        <p><em>Maximum 3 marks per advantage. Two distinct advantages required.</em></p>`,
      responses:[
        {title:"Response A", grade:"2/6",
         text:"1: Trialling helps to avoid the expense of a full product launch of Wotsits. This can reduce risk to the brand image of being associated with an unsuccessful product, ensuring reputation remains high.<br><br>2: It helps to avoid risk of negative reviews as if the Wotsits are not liked, there might be negative word of mouth.",
         scheme:{ao1b:true, ao2:false, ao3a:true, mark:2, rationale:"2/6 — AO1B present in both points (avoid expense, avoid negative reviews). AO3A present in advantage 1 (reduce risk to brand image). However, AO2 is not awarded for either point — 'Wotsits' is a Walkers product but the question is about new crisp flavours. Advantage 2 repeats essentially the same point as advantage 1 (reputational risk) so cannot be counted as a second distinct advantage."}},
        {title:"Response B", grade:"6/6",
         text:"1: Identifies if there is demand for the product, providing insight into potential sales. As they aim to ensure market share and increase profitability, by having such data, it supports decision making as to whether it is justified to then mass launch the new flavour.<br><br>2: Reduces risk of an unsuccessful launch. As there is recent concern about healthy eating, understanding how customers may react to such new recipes is important and if they just mass launched the new flavours, it might be a flop, tarnishing their brand image.",
         scheme:{ao1b:true, ao2:true, ao3a:true, mark:6, rationale:"Full marks — Advantage 1: AO1B (identifies demand, insight into potential sales), AO2 (aim to maintain market share and increase profitability), AO3A (supports decision making on whether to mass launch). Advantage 2: AO1B (reduces risk), AO2 (healthy eating concern — a specific context detail), AO3A (if mass launched it might flop, tarnishing brand image). Two distinct, fully supported advantages."}}
      ]
    },
    {
      code:"Q2", label:"Promotion Methods", marks:6,
      text:"(i) Analyse one advantage for Walkers of advertising in national newspapers for a four-week period. [3]\n(ii) Analyse one advantage for Walkers of running a prize competition. [3]",
      aos:["ao1b","ao2","ao3a"],
      aoGuide:[
        {key:"ao1b", desc:"Explains the advantage of that specific promotion method"},
        {key:"ao2", desc:"Links to Walkers — Quavers brand, market share, customer base"},
        {key:"ao3a", desc:"Shows the chain from promotion → business outcome"}
      ],
      stdNote:"This is a 3+3 question covering two different methods. Each part must be answered separately. Watch for responses that mix up the analysis (e.g. applying newspaper advantages to the prize competition). AO2 should reference Walkers/Quavers specifically.",
      markScheme:`<p><strong>Newspapers (i) — AO1B</strong>: reaches a mass audience · builds brand awareness · repeated exposure over four weeks · credible/established medium</p>
        <p><strong>Newspapers (i) — AO2</strong>: Walkers/Quavers brand · mass market snack product · 50%+ market share · aim to maintain market share</p>
        <p><strong>Prize competition (ii) — AO1B</strong>: engages existing customers · incentivises repeat purchase · generates excitement/buzz · cost-effective reach</p>
        <p><strong>Prize competition (ii) — AO2</strong>: Quavers brand · existing customer base · market share objective · profitability</p>`,
      responses:[
        {title:"Response A", grade:"4/6",
         text:"i: Advertising can include visual components, such as colourful pictures of the crisps. This is beneficial for younger customers who might be attracted by such visuals.<br><br>ii: Prize competition engages current customers to repeatedly buy the crisps in order to win. This will increase their turnover and strengthen their market share, which already represents over 50%.",
         scheme:{ao1b:true, ao2:true, ao3a:false, mark:4, rationale:"4/6 — Part (i): AO1B (visual advertising) + AO2 (younger customers) but no analytical chain showing the business outcome = 2 marks. Part (ii): AO1B (engages customers, repeat purchase) + AO2 (market share over 50%) but AO3A is missing — the link stops at 'increase turnover' without showing the consequence = 2 marks. Total 4/6."}},
        {title:"Response B", grade:"6/6",
         text:"i: National newspaper advertising provides Walkers with the opportunity to reach a wide range of customers across the UK. As Quavers is a mass-market product and Walkers already holds over 50% market share, a four-week campaign can build sustained brand awareness, reminding customers to choose Quavers over rival snack brands, thereby protecting their dominant market position.<br><br>ii: Running a prize competition incentivises customers to purchase Quavers repeatedly during the competition period. This directly supports Walkers' objective of increasing profitability through higher sales volume, whilst generating excitement around the brand that could attract new customers beyond the existing loyal base.",
         scheme:{ao1b:true, ao2:true, ao3a:true, mark:6, rationale:"Full marks — Part (i): AO1B (reach wide range, sustained brand awareness), AO2 (Quavers, mass-market, 50%+ share), AO3A (reminding customers → protect dominant market position). Part (ii): AO1B (incentivises repeat purchase), AO2 (Walkers' objective of increasing profitability), AO3A (higher sales volume + attract new customers)."}}
      ]
    },
    {
      code:"Q3", label:"Recommend Promotion Method", marks:3,
      text:"Recommend which promotion method Walkers should choose. Give a reason for your answer. [3]",
      aos:["ao3b"],
      aoGuide:[
        {key:"ao3b", desc:"1 mark: decision only · 2 marks: decision + justification · 3 marks: comparative justification with Walkers context"}
      ],
      stdNote:"Either method can be recommended — marks are for quality of justification not which option is chosen. To reach 3 marks, the student must explain why their chosen method is better than the alternative AND relate it to Walkers. 'I think X is better' without comparison = maximum 2 marks.",
      markScheme:`<p><strong>1 mark</strong>: Names either national newspapers or prize competition as recommendation</p>
        <p><strong>2 marks</strong>: Decision + justification of the chosen method (but no comparison to the alternative)</p>
        <p><strong>3 marks</strong>: Decision + comparative justification (explains what the chosen method offers that the alternative does not) + Walkers context</p>`,
      responses:[
        {title:"Response A", grade:"1/3",
         text:"I believe they should choose the prize competition as it is more exciting.",
         scheme:{ao3b:true, mark:1, rationale:"1/3 — Decision only. 'More exciting' is not a justified business reason. No comparison, no Walkers context."}},
        {title:"Response B", grade:"3/3",
         text:"I believe they should choose national newspapers as I believe it targets a greater range of customers compared to a prize competition. A prize competition might not be seen by customers who don't usually buy Walkers, whilst an advertisement could entice new customers to look for Walkers whilst shopping. This would then help to tempt customers to switch from rivals benefiting their market share objective.",
         scheme:{ao3b:true, mark:3, rationale:"Full marks — Decision (newspapers), comparison (prize competition only reaches existing customers vs newspaper reaches new customers), Walkers context (market share objective, switching from rivals). All three level criteria clearly met."}}
      ]
    },
    {
      code:"Q4", label:"Evaluate Healthier Products", marks:9,
      text:"Evaluate, with reference to the data in Text 3, whether Walkers' marketing department should consider introducing healthier products. [9]",
      aos:["ao1a","ao1b","ao2","ao3a","ao3b"],
      aoGuide:[
        {key:"ao1a", desc:"Knowledge of marketing department role"},
        {key:"ao1b", desc:"Understanding of advantages and/or disadvantages"},
        {key:"ao2", desc:"Uses the quantitative data from the text — percentages, figures"},
        {key:"ao3a", desc:"Analytical chain showing business impact"},
        {key:"ao3b", desc:"Balanced evaluation with a justified conclusion"}
      ],
      stdNote:"This is the highest-tariff question and specifically requires data use ('with reference to the data'). AO2 marks require the student to use actual figures from the text — not just general reference to 'research showed'. AO3B requires a genuine balance (both sides argued) before a supported conclusion. A one-sided response cannot earn AO3B regardless of how well-argued it is.",
      markScheme:`<p><strong>AO1A</strong>: Role of marketing — identify, anticipate and meet customer needs profitably</p>
        <p><strong>AO1B</strong>: Advantages of healthier products (enhanced reputation, meet changing trends, protect market share, attract health-conscious consumers) OR disadvantages (R&D costs, may alienate existing customers, risk of diluting brand, recipe changes may affect taste)</p>
        <p><strong>AO2 (requires data use)</strong>: 60% concerned about healthy eating (up from 46%); 36% consider health before buying; only 29% think companies are trying to be healthier; Walkers already has 50%+ market share; recipe already changed (salt –25%, fats –70%)</p>
        <p><strong>AO3A</strong>: Because concern is rising → if Walkers doesn't respond → risk losing sales → competitors may take market share → threatens profitability</p>
        <p><strong>AO3B</strong>: However, 64% don't consider health when purchasing → existing loyal base may not require healthier products → R&D costs may outweigh benefit → but risk of inaction if trend continues</p>`,
      responses:[
        {title:"Response A", grade:"7/9",
         text:"The role of the marketing department is to identify, anticipate and meet customer needs profitably.<br><br>As there are concerns over healthy eating, it would be advantageous to develop new products. This would avoid public scrutiny over unhealthy products and show they are listening to social concerns. This would enhance reputation, improving their brand image and increasing sales.<br><br>I do not think they should introduce healthy eating as research and development will be required to develop new recipes. This adds to total costs, which is unnecessary when they already have 50% market share and have the objective of profitability.<br><br>Regardless of the possible risk, I think they should. I believe the cost is justified with changing preferences. Even if they have high market share at 50%, this still needs to be protected and if they do not follow such concerns and competitors do, they may lose sales.",
         scheme:{ao1a:true, ao1b:true, ao2:true, ao3a:true, ao3b:true, mark:7, rationale:"7/9 — Sound knowledge (AO1A: marketing role), understanding (AO1B: R&D costs, reputation), some data use (50% market share — AO2), analysis (loss of sales if competitors act — AO3A), balanced evaluation with a supported conclusion (AO3B). Mark is 7 not 9 because the data use is limited — only market share is cited; the percentage figures on healthy eating concern are not used, meaning AO2 is present but not fully developed."}},
        {title:"Response B", grade:"5/9",
         text:"I think the Walkers marketing department should introduce healthier products.<br><br>More than half of people are now concerned with healthy eating with those concerned increasing by 14 percentage points. This therefore means that if they do not react to such concern, they may lose sales and market share.<br><br>However, 64% of people do not consider whether a snack is healthy when purchasing the product.",
         scheme:{ao1a:false, ao1b:true, ao2:true, ao3a:true, ao3b:true, mark:5, rationale:"5/9 — Good data use (14 percentage point increase, 64% not considering health — genuine AO2). AO3A present (if they don't react → lose sales and market share). AO3B present (acknowledges the 64% counter-argument). However: AO1A not present (no mention of marketing department role), and the analysis and evaluation are underdeveloped — the response is short and doesn't fully explore both sides. AO1B awarded for basic understanding of the advantage."}}
      ]
    }
  ]
};

let strictMode=false,sessionResults={},stampCounts={},selectedStamp={},msUnlocked={};

function build(){buildProgressTabs();buildQuestions();activateTab(0);}
function buildProgressTabs(){
  const el=document.getElementById('progTabs');el.innerHTML='';
  TEXT.questions.forEach((q,qi)=>{
    const btn=document.createElement('button');btn.className='prog-tab';btn.id=`ptab-${qi}`;
    btn.innerHTML=`<span class="tab-status" id="pstatus-${qi}"></span>${q.code}: ${q.label} <span style="color:var(--dim);font-size:11px;">(${q.marks})</span>`;
    btn.onclick=()=>activateTab(qi);el.appendChild(btn);
  });
  const sum=document.createElement('button');sum.className='prog-tab';sum.id='ptab-summary';
  sum.innerHTML=`<span class="tab-status" id="pstatus-summary"></span>📊 Summary`;
  sum.onclick=()=>activateTab('summary');el.appendChild(sum);
}
function buildQuestions(){
  const main=document.getElementById('mainContent');main.innerHTML='';
  const strictDiv=document.createElement('div');strictDiv.className='strict-row';
  strictDiv.innerHTML=`<button class="strict-toggle" id="strictToggle" onclick="toggleStrict()"></button><span class="strict-label"><strong>Strict AO mode:</strong> When ON, your mark AND your AO annotations must both match the mark scheme.</span>`;
  main.appendChild(strictDiv);
  TEXT.questions.forEach((q,qi)=>{
    stampCounts[qi]={};selectedStamp[qi]={};sessionResults[qi]={};
    const section=document.createElement('div');section.className='tab-content';section.id=`tab-${qi}`;
    const qTextFormatted=q.text.replace(/\n/g,'<br>');
    section.innerHTML+=`<div class="std-banner"><div class="std-icon">📋</div><div class="std-body"><h3>Examiner Standardisation — ${q.code}</h3><p>${q.stdNote}</p></div></div>`;
    section.innerHTML+=`<div class="two-col"><div class="panel"><div class="panel-hdr"><div class="panel-hdr-icon blue">📄</div><div class="panel-hdr-title">Case Study — ${TEXT.company}</div></div><div class="panel-body">${TEXT.caseStudy}</div></div><div><div class="q-hdr"><div class="q-label">Question ${q.code} · ${q.marks} marks</div><div class="q-text">${qTextFormatted}</div><div class="q-meta"><span class="q-badge marks">/${q.marks}</span>${q.aos.map(a=>`<span class="q-badge ao ${a}-bg">${a.toUpperCase()}</span>`).join('')}</div></div><div class="panel"><div class="panel-hdr"><div class="panel-hdr-icon amber">🎯</div><div class="panel-hdr-title">What are examiners looking for?</div></div><div class="panel-body"><div class="ao-guide">${q.aoGuide.map(g=>`<div class="ao-chip ${g.key}"><span class="ao-chip-label">${g.key.toUpperCase()}</span><span class="ao-chip-desc">${g.desc}</span></div>`).join('')}</div></div></div></div></div>`;
    section.innerHTML+=`<div class="ms-panel"><div class="ms-hdr"><div class="ms-hdr-title">🔑 Mark Scheme</div><button class="ms-unlock-btn" onclick="unlockMS(${qi})">Unlock (Teacher)</button></div><div class="ms-body" id="ms-${qi}">${q.markScheme}</div></div>`;
    main.appendChild(section);
    q.responses.forEach((r,ri)=>{
      stampCounts[qi][ri]={};selectedStamp[qi][ri]=null;q.aos.forEach(a=>{stampCounts[qi][ri][a]=0;});
      const card=document.createElement('div');card.className='response-card';
      card.innerHTML=`<div class="rc-header"><div class="rc-title">${r.title}</div><div class="rc-subtitle">Award a mark · Annotate with AO stamps</div></div><div class="rc-body"><div class="stamp-bar" id="sb-${qi}-${ri}">${q.aos.map(a=>`<button class="stamp-btn ${a}" id="sbtn-${qi}-${ri}-${a}" onclick="selectStamp(${qi},${ri},'${a}')">${a.toUpperCase()}</button>`).join('')}</div><div class="response-text" id="rt-${qi}-${ri}" onclick="placeStamp(event,${qi},${ri})">${r.text}</div><div class="mark-row"><span class="mark-label">Your mark:</span><input type="number" class="mark-input" id="mi-${qi}-${ri}" min="0" max="${q.marks}" placeholder="0"/><span class="mark-max">/ ${q.marks}</span></div><div class="rc-controls"><button class="btn-mark" onclick="checkMark(${qi},${ri})">Submit Mark</button><button class="btn-clear" onclick="clearStamps(${qi},${ri})">Clear</button></div><div class="feedback" id="fb-${qi}-${ri}"></div></div>`;
      section.appendChild(card);
    });
  });
  const sumSection=document.createElement('div');sumSection.className='tab-content';sumSection.id='tab-summary';
  sumSection.innerHTML=`<div class="score-summary" id="summaryPanel"><h3>Session Summary</h3><div id="summaryContent" style="color:var(--muted);font-size:14px;margin-top:12px;">Complete some responses to see your results here.</div><a href="OCR_Be_the_Examiner_Paper1_Hub.html" class="btn-hub" style="margin-top:20px;">← Back to Paper 1 Hub</a></div>`;
  main.appendChild(sumSection);
}
function activateTab(qi){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.prog-tab').forEach(t=>t.classList.remove('active'));
  const id=qi==='summary'?'tab-summary':`tab-${qi}`;
  const pid=qi==='summary'?'ptab-summary':`ptab-${qi}`;
  document.getElementById(id)?.classList.add('active');
  document.getElementById(pid)?.classList.add('active');
  if(qi==='summary')updateSummary();
}
function selectStamp(qi,ri,ao){
  selectedStamp[qi][ri]=ao;
  TEXT.questions[qi].aos.forEach(a=>document.getElementById(`sbtn-${qi}-${ri}-${a}`)?.classList.toggle('selected',a===ao));
}
function placeStamp(evt,qi,ri){
  const ao=selectedStamp[qi][ri];
  if(!ao){alert('Select an AO stamp first, then click on the response.');return;}
  const box=document.getElementById(`rt-${qi}-${ri}`);const rect=box.getBoundingClientRect();
  const s=document.createElement('div');s.className=`stamp-overlay ${ao}`;s.textContent=ao.toUpperCase();
  s.style.left=(evt.clientX-rect.left-16)+'px';s.style.top=(evt.clientY-rect.top-10)+'px';
  box.appendChild(s);stampCounts[qi][ri][ao]=(stampCounts[qi][ri][ao]||0)+1;
}
function clearStamps(qi,ri){
  document.getElementById(`rt-${qi}-${ri}`)?.querySelectorAll('.stamp-overlay').forEach(s=>s.remove());
  TEXT.questions[qi].aos.forEach(a=>{stampCounts[qi][ri][a]=0;document.getElementById(`sbtn-${qi}-${ri}-${a}`)?.classList.remove('selected');});
  selectedStamp[qi][ri]=null;document.getElementById(`mi-${qi}-${ri}`).value='';
  document.getElementById(`fb-${qi}-${ri}`).style.display='none';
  if(sessionResults[qi])delete sessionResults[qi][ri];updateTabStatus(qi);
}
function checkMark(qi,ri){
  const q=TEXT.questions[qi];const r=q.responses[ri];const c=r.scheme;
  const entered=parseInt(document.getElementById(`mi-${qi}-${ri}`).value);
  if(isNaN(entered)){alert('Please enter a mark before submitting.');return;}
  const sc=stampCounts[qi][ri];const markCorrect=entered===c.mark;
  const aoChecks={};
  q.aos.forEach(a=>{
    const exp=c[a];if(exp===undefined||exp===null){aoChecks[a]={pass:true,expected:null};return;}
    const placed=(sc[a]||0)>=1;const expectBool=typeof exp==='number'?exp>0:!!exp;
    aoChecks[a]={pass:placed===expectBool,expected:expectBool,placed};
  });
  const aosOk=Object.values(aoChecks).every(x=>x.pass);
  const isCorrect=strictMode?(markCorrect&&aosOk):markCorrect;
  sessionResults[qi][ri]={entered,correct:isCorrect,actual:c.mark,max:q.marks};updateTabStatus(qi);
  const fb=document.getElementById(`fb-${qi}-${ri}`);fb.style.display='block';fb.className=`feedback ${isCorrect?'correct':'incorrect'}`;
  let aoRow='<div class="fb-ao-row">';
  q.aos.forEach(a=>{const ch=aoChecks[a];if(ch.expected===null)return;const label=ch.expected?`${a.toUpperCase()} ✓ expected`:`${a.toUpperCase()} ✗ not expected`;aoRow+=`<div class="fb-ao-chip ${ch.pass?'ok':'miss'}">${label}${!ch.pass?` (you: ${ch.placed?'placed':'not placed'})`:''}</div>`;});
  aoRow+='</div>';
  fb.innerHTML=`<div class="fb-inner"><div class="fb-result">${isCorrect?'✓ Correct mark!':'✗ Not quite right'}</div><div class="fb-mark">${c.mark} / ${q.marks}</div>${aoRow}<div class="fb-rationale"><strong>Examiner rationale:</strong> ${c.rationale}</div></div>`;
}
function unlockMS(qi){
  if(msUnlocked[qi]){document.getElementById(`ms-${qi}`)?.classList.toggle('open');return;}
  const pw=prompt('Enter teacher password:');
  if(pw&&pw.toUpperCase()==='BIZANSWERS'){msUnlocked[qi]=true;document.getElementById(`ms-${qi}`)?.classList.add('open');}
  else if(pw!==null)alert('Incorrect password.');
}
function toggleStrict(){strictMode=!strictMode;document.getElementById('strictToggle').classList.toggle('on',strictMode);}
function updateTabStatus(qi){
  const results=sessionResults[qi]||{};const done=Object.keys(results).length;const correct=Object.values(results).filter(r=>r.correct).length;
  const el=document.getElementById(`pstatus-${qi}`);if(!el)return;el.className='tab-status';
  if(done===0){el.textContent='';return;}
  if(correct===done){el.classList.add('done');el.textContent='✓';}else{el.classList.add('partial');el.textContent=done;}
}
function updateSummary(){
  const el=document.getElementById('summaryContent');let attempted=0,correct=0;const rows=[];
  TEXT.questions.forEach((q,qi)=>{const results=sessionResults[qi]||{};q.responses.forEach((r,ri)=>{if(results[ri]!==undefined){attempted++;if(results[ri].correct)correct++;rows.push(`<div class="score-item ${results[ri].correct?'correct':'incorrect'}"><strong>${results[ri].correct?'✓':'✗'}</strong>${q.code} ${r.title} — You: ${results[ri].entered}/${q.marks} · Actual: ${results[ri].actual}/${q.marks}</div>`);}});});
  if(attempted===0){el.innerHTML='<p style="color:var(--muted)">Complete some responses to see your results here.</p>';return;}
  const pct=Math.round((correct/attempted)*100);
  el.innerHTML=`<div class="score-big">${correct}<span style="font-size:28px;color:var(--muted)">/${attempted}</span></div><div class="score-sub">responses marked correctly (${pct}%)</div><div class="score-breakdown">${rows.join('')}</div>`;
}
(function(){var t=localStorage.getItem('biz-omics-theme')||'dark';document.body.setAttribute('data-theme',t);var btn=document.getElementById('themeBtn');if(btn)btn.textContent=t==='light'?'🌙':'☀';})();
function toggleTheme(){var cur=document.body.getAttribute('data-theme')||'dark';var next=cur==='dark'?'light':'dark';document.body.setAttribute('data-theme',next);localStorage.setItem('biz-omics-theme',next);document.getElementById('themeBtn').textContent=next==='light'?'🌙':'☀';}
build();
</script>
</body>
</html>
