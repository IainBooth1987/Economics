<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIZ-OMICS — Reading, Listening & Watching</title>
<style>
:root{
  --ff-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --ff-mono:'SFMono-Regular','SF Mono',Consolas,'Liberation Mono',monospace;
  --bg:#0a0e1a;--surface:#111827;--surface2:#0d1526;
  --amber:#f59e0b;--amber2:#fbbf24;
  --purple:#8b5cf6;--purple2:#a78bfa;
  --blue:#3b82f6;--blue2:#60a5fa;
  --green:#10b981;--green2:#34d399;
  --red:#ef4444;--red2:#f87171;
  --text:#f1f5f9;--muted:#94a3b8;
  --border:rgba(255,255,255,0.08);
  --radius:14px;
}
[data-theme="light"]{
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;
  --text:#0f172a;--muted:#64748b;--border:rgba(0,0,0,0.09);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--ff-sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.2s,color 0.2s;}

/* ── HEADER ── */
header{
  padding:1.1rem 2.5rem;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;
  background:rgba(10,14,26,0.96);
  backdrop-filter:blur(16px);z-index:200;
}
[data-theme="light"] header{background:rgba(248,250,252,0.96);}
.logo{font-size:1.35rem;font-weight:900;letter-spacing:-0.02em;text-decoration:none;color:var(--text);}
.logo span{color:var(--amber);}
.header-right{display:flex;align-items:center;gap:0.6rem;}
.home-link{font-family:var(--ff-mono);font-size:0.68rem;color:var(--muted);text-decoration:none;padding:0.35rem 0.7rem;border-radius:100px;border:1px solid var(--border);transition:all 0.18s;}
.home-link:hover{color:var(--amber);border-color:var(--amber);}
.theme-toggle{padding:0.35rem 0.55rem;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:0.9rem;transition:all 0.18s;}
.theme-toggle:hover{color:var(--text);}

/* ── SUBNAV ── */
.subnav{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--border);background:var(--surface2);padding:0 2.5rem;overflow-x:auto;scrollbar-width:none;}
.subnav::-webkit-scrollbar{display:none;}
.snav-btn{font-family:var(--ff-mono);font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;font-weight:600;color:var(--muted);padding:0.85rem 1.4rem;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color 0.18s,border-color 0.18s;margin-bottom:-1px;}
.snav-btn:hover{color:var(--text);}
.snav-btn.active{color:var(--amber);border-bottom-color:var(--amber);}
[data-theme="light"] .subnav{background:rgba(248,250,252,0.98);}

/* ── SECTIONS ── */
.section{display:none;}
.section.active{display:block;}
.page-wrap{max-width:1060px;margin:0 auto;padding:3.5rem 2rem 5rem;}
.eyebrow{font-family:var(--ff-mono);font-size:0.66rem;color:var(--amber);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:1rem;}

/* ── RESOURCE SECTION ── */
.res-hero{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start;margin-bottom:3rem;}
.product-card{position:relative;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;padding:2rem;}
.product-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),rgba(139,92,246,0.3));}
[data-theme="light"] .product-card{background:#fff;}
.product-label{font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--purple2);margin-bottom:1rem;}
.product-title{font-size:1.75rem;font-weight:900;letter-spacing:-0.025em;line-height:1.1;margin-bottom:0.5rem;}
.product-sub{font-size:0.82rem;color:var(--muted);line-height:1.6;margin-bottom:1.5rem;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.6rem;margin-bottom:1.5rem;}
.stat-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:0.8rem 0.5rem;text-align:center;}
.stat-n{font-family:var(--ff-mono);font-size:1.4rem;font-weight:700;color:var(--amber);display:block;}
.stat-l{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;display:block;}
.pill-row{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:1.5rem;}
.pill{font-family:var(--ff-mono);font-size:0.62rem;padding:0.18rem 0.55rem;border-radius:100px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);}
.price-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;}
.price-tag{font-size:0.72rem;font-weight:700;color:#000;background:var(--amber);padding:3px 10px;border-radius:20px;}
.price-note{font-size:0.75rem;color:var(--muted);}
.buy-btn{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.82rem;font-weight:700;padding:0.6rem 1.4rem;border-radius:9px;background:var(--purple);color:#fff;border:none;cursor:pointer;text-decoration:none;transition:opacity 0.15s;font-family:var(--ff-sans);}
.buy-btn:hover{opacity:0.88;}
.pw-gate{margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border);}
.pw-gate-label{font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;display:block;}
.pw-row{display:flex;gap:6px;}
.pw-input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:0.8rem;padding:0.4rem 0.65rem;border-radius:7px;font-family:var(--ff-mono);outline:none;transition:border-color 0.15s;}
.pw-input:focus{border-color:var(--amber);}
.pw-go{padding:0.4rem 0.9rem;border-radius:7px;background:var(--amber);color:#000;font-weight:700;font-size:0.78rem;border:none;cursor:pointer;font-family:var(--ff-sans);}
.pw-msg{font-size:0.68rem;min-height:1rem;margin-top:4px;}
.res-info h2{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;letter-spacing:-0.025em;line-height:1.1;margin-bottom:1rem;}
.res-info h2 em{font-style:normal;color:var(--amber);}
.res-info p{font-size:0.88rem;color:var(--muted);line-height:1.75;margin-bottom:0.9rem;}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin:1.5rem 0;}
.topic-chip{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.75rem 1rem;position:relative;overflow:hidden;}
[data-theme="light"] .topic-chip{background:#f8fafc;}
.topic-chip::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;}
.tc-amber::before{background:var(--amber);}.tc-blue::before{background:#3b82f6;}.tc-red::before{background:#ef4444;}.tc-green::before{background:#10b981;}.tc-purple::before{background:var(--purple);}.tc-gold::before{background:var(--amber);}
.topic-chip-title{font-size:0.78rem;font-weight:700;color:var(--text);margin-bottom:3px;}
.topic-chip-sub{font-size:0.68rem;color:var(--muted);line-height:1.4;}
.topic-chip-count{font-family:var(--ff-mono);font-size:0.6rem;color:var(--muted);margin-top:4px;}
.feat-list{list-style:none;margin-top:0.5rem;}
.feat-list li{display:flex;align-items:flex-start;gap:0.6rem;padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.83rem;color:var(--muted);line-height:1.5;}
.feat-list li::before{content:'→';font-family:var(--ff-mono);font-size:0.7rem;color:var(--amber);margin-top:1px;flex-shrink:0;}
.feat-list li strong{color:var(--text);}

/* ── CALENDAR ── */
.cal-top{margin-bottom:2rem;}
.year-toggle{display:inline-flex;border:1px solid var(--border);border-radius:100px;overflow:hidden;margin-top:1.2rem;}
.yr-btn{padding:0.4rem 1.2rem;background:none;border:none;font-family:var(--ff-mono);font-size:0.72rem;letter-spacing:0.06em;color:var(--muted);cursor:pointer;transition:all 0.18s;}
.yr-btn.active{background:var(--amber);color:#000;font-weight:700;}
.cal-layout{display:grid;grid-template-columns:1fr 340px;gap:1.5rem;align-items:start;margin-top:2rem;}
.cal-months{display:grid;grid-template-columns:repeat(3,1fr);gap:0.8rem;}
.cal-month{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
[data-theme="light"] .cal-month{background:#fff;}
.month-name{padding:0.5rem 0.7rem;font-family:var(--ff-mono);font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--amber);border-bottom:1px solid var(--border);}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:0.35rem;}
.day-head{font-family:var(--ff-mono);font-size:0.55rem;text-align:center;color:var(--muted);opacity:0.5;padding:0.2rem;}
.day{aspect-ratio:1;display:grid;place-items:center;font-size:0.68rem;border-radius:6px;cursor:default;color:var(--muted);opacity:0.5;}
.day.empty{opacity:0;}
.day.has-event{background:rgba(139,92,246,0.15);color:var(--purple2);font-weight:700;cursor:pointer;opacity:1;border:1px solid rgba(139,92,246,0.3);transition:all 0.15s;}
.day.has-event:hover,.day.has-event.selected{background:var(--purple);color:#fff;transform:scale(1.12);z-index:2;}
.day.fiscal-event{background:rgba(20,184,166,0.15);color:#2dd4bf;font-weight:700;cursor:pointer;opacity:1;border:1px solid rgba(20,184,166,0.35);}
.day.fiscal-event:hover,.day.fiscal-event.selected{background:#0d9488;color:#fff;transform:scale(1.12);z-index:2;}
.event-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;position:sticky;top:80px;min-height:360px;}
[data-theme="light"] .event-panel{background:#fff;}
.ep-empty{display:flex;align-items:center;justify-content:center;height:100%;min-height:320px;font-family:var(--ff-mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);opacity:0.4;}
.ep-empty.hidden{display:none;}
.ep-content{display:none;}
.ep-content.visible{display:block;}
.ep-date{font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--amber);margin-bottom:0.5rem;}
.ep-title{font-size:1.05rem;font-weight:800;letter-spacing:-0.015em;line-height:1.25;margin-bottom:0.3rem;}
.ep-org{font-size:0.78rem;color:var(--muted);margin-bottom:0.8rem;}
.ep-badge{display:inline-block;font-family:var(--ff-mono);font-size:0.6rem;padding:2px 9px;border-radius:100px;border:1px solid;margin-bottom:1rem;}
.ep-desc{font-size:0.82rem;line-height:1.7;color:var(--muted);margin-bottom:1rem;padding-top:0.8rem;border-top:1px solid var(--border);}
.ep-deadline{font-size:0.78rem;color:var(--muted);margin-bottom:1rem;}
.ep-deadline strong{color:var(--text);}
.ep-link{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.78rem;font-weight:700;padding:0.55rem 1.1rem;border-radius:8px;background:var(--amber);color:#000;text-decoration:none;transition:opacity 0.15s;}
.ep-link:hover{opacity:0.88;}

/* ── READING HUB ── */
.hub-top{margin-bottom:2rem;}
.hub-top h2{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;letter-spacing:-0.025em;line-height:1.1;margin-bottom:0.5rem;}
.hub-top h2 em{font-style:normal;color:var(--amber);}
.hub-top p{font-size:0.85rem;color:var(--muted);}
.cat-tabs{display:flex;gap:0.4rem;margin-bottom:2rem;flex-wrap:wrap;}
.cat-tab{padding:0.45rem 1.1rem;border-radius:100px;font-size:0.78rem;font-weight:600;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:all 0.18s;font-family:var(--ff-sans);}
.cat-tab:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
.cat-tab.active{background:var(--amber);color:#000;border-color:var(--amber);}
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
.rec-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:all 0.2s;}
[data-theme="light"] .rec-card{background:#fff;}
.rec-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.rc-book::before{background:linear-gradient(90deg,#3b82f6,rgba(59,130,246,0.2));}
.rc-podcast::before{background:linear-gradient(90deg,#a855f7,rgba(168,85,247,0.2));}
.rc-magazine::before{background:linear-gradient(90deg,var(--amber),rgba(245,158,11,0.2));}
.rc-article::before{background:linear-gradient(90deg,#10b981,rgba(16,185,129,0.2));}
.rc-video::before{background:linear-gradient(90deg,#ef4444,rgba(239,68,68,0.2));}
.rc-film::before{background:linear-gradient(90deg,#ec4899,rgba(236,72,153,0.2));}
.rec-type-badge{font-family:var(--ff-mono);font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:100px;border:1px solid;}
.rb-book{color:#60a5fa;background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.25);}
.rb-podcast{color:#c084fc;background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.25);}
.rb-magazine{color:var(--amber2);background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.25);}
.rb-article{color:#34d399;background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.25);}
.rb-video{color:#f87171;background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);}
.rb-film{color:#f472b6;background:rgba(236,72,153,0.1);border-color:rgba(236,72,153,0.25);}
.rec-difficulty{font-family:var(--ff-mono);font-size:0.58rem;color:var(--muted);padding:2px 7px;border-radius:100px;border:1px solid var(--border);}
.rec-title{font-size:0.95rem;font-weight:700;letter-spacing:-0.01em;line-height:1.25;color:var(--text);margin-bottom:0.2rem;margin-top:0.5rem;}
.rec-author{font-size:0.75rem;color:var(--muted);margin-bottom:0.6rem;}
.rec-topics{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.7rem;}
.rec-topic{font-size:0.62rem;padding:1px 7px;border-radius:100px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);font-family:var(--ff-mono);}
.rec-why{font-size:0.78rem;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);padding-top:0.6rem;margin-bottom:0.7rem;flex:1;}
.rec-link{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.72rem;font-weight:600;color:var(--amber);text-decoration:none;font-family:var(--ff-mono);}
.rec-link:hover{opacity:0.75;}
.rec-empty{grid-column:1/-1;text-align:center;padding:4rem 2rem;font-family:var(--ff-mono);font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);opacity:0.4;}

/* ── MOBILE EVENT DRAWER ── */
.drawer-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(4px);
  z-index:400;
  touch-action:none;
}
.drawer-overlay.open{display:block;}
.drawer{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  padding:0 1.25rem 2rem;
  z-index:401;
  max-height:80vh;
  overflow-y:auto;
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  -webkit-overflow-scrolling:touch;
}
.drawer.open{transform:translateY(0);}
.drawer-handle{
  width:36px;height:4px;
  background:var(--border);border-radius:2px;
  margin:0.75rem auto 1.25rem;
}
.drawer-close{
  position:absolute;top:1rem;right:1rem;
  background:none;border:1px solid var(--border);
  border-radius:50%;width:28px;height:28px;
  color:var(--muted);cursor:pointer;font-size:0.8rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.drawer-close:hover{color:var(--text);border-color:var(--text);}

/* ── RANKINGS ── */
.rnk-top{margin-bottom:2rem;}
.rnk-top h2{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;letter-spacing:-0.025em;line-height:1.1;margin-bottom:0.5rem;}
.rnk-top h2 em{font-style:normal;color:var(--amber);}
.rnk-top p{font-size:0.85rem;color:var(--muted);line-height:1.6;margin-bottom:1.5rem;}
.rnk-source-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.rnk-src-btn{padding:0.5rem 1.2rem;border-radius:100px;font-size:0.8rem;font-weight:700;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:all 0.18s;font-family:var(--ff-sans);}
.rnk-src-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
.rnk-src-btn.active{background:var(--amber);color:#000;border-color:var(--amber);}
.rnk-controls{display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;margin-bottom:1.25rem;}
.rnk-search{flex:1;min-width:180px;max-width:300px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:0.8rem;padding:0.45rem 0.75rem;border-radius:8px;font-family:var(--ff-sans);outline:none;transition:border-color 0.15s;}
.rnk-search:focus{border-color:var(--amber);}
[data-theme="light"] .rnk-search{background:#f8fafc;}
.rnk-filter-label{font-family:var(--ff-mono);font-size:0.65rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-right:0.25rem;}
.rnk-group-btn{padding:0.35rem 0.8rem;border-radius:100px;font-size:0.72rem;font-weight:600;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:all 0.18s;font-family:var(--ff-mono);}
.rnk-group-btn:hover{color:var(--text);}
.rnk-group-btn.active{background:rgba(139,92,246,0.15);color:var(--purple2);border-color:rgba(139,92,246,0.35);}
.rnk-table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
.rnk-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
.rnk-table th{background:var(--surface2);font-family:var(--ff-mono);font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:0.7rem 1rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:color 0.15s;}
.rnk-table th:hover{color:var(--text);}
.rnk-table th.sorted{color:var(--amber);}
[data-theme="light"] .rnk-table th{background:#f1f5f9;}
.rnk-table td{padding:0.65rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle;}
.rnk-table tr:last-child td{border-bottom:none;}
.rnk-table tr:hover td{background:rgba(255,255,255,0.025);}
[data-theme="light"] .rnk-table tr:hover td{background:rgba(0,0,0,0.02);}
.rnk-pos{font-family:var(--ff-mono);font-size:0.75rem;font-weight:700;color:var(--amber);min-width:2rem;}
.rnk-medal{font-size:1rem;}
.rnk-name{font-weight:700;color:var(--text);line-height:1.25;}
.rnk-name-sub{font-size:0.7rem;color:var(--muted);font-weight:400;margin-top:1px;}
.rnk-rg{font-family:var(--ff-mono);font-size:0.58rem;padding:1px 6px;border-radius:100px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);color:#60a5fa;margin-left:0.4rem;vertical-align:middle;white-space:nowrap;}
.rnk-bar-cell{min-width:100px;}
.rnk-bar-wrap{display:flex;align-items:center;gap:0.5rem;}
.rnk-bar-bg{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
[data-theme="light"] .rnk-bar-bg{background:rgba(0,0,0,0.08);}
.rnk-bar-fill{height:100%;border-radius:3px;background:var(--amber);transition:width 0.4s ease;}
.rnk-bar-val{font-family:var(--ff-mono);font-size:0.68rem;color:var(--muted);white-space:nowrap;min-width:2.5rem;}
.rnk-pct{font-family:var(--ff-mono);font-size:0.75rem;color:var(--muted);}
.rnk-pct.hi{color:var(--green2);}
.rnk-pct.lo{color:var(--red2);}
.rnk-move{font-family:var(--ff-mono);font-size:0.65rem;padding:2px 6px;border-radius:4px;white-space:nowrap;}
.rnk-move.up{background:rgba(16,185,129,0.12);color:var(--green2);}
.rnk-move.dn{background:rgba(239,68,68,0.1);color:var(--red2);}
.rnk-move.eq{color:var(--muted);}
.rnk-source-badge{display:inline-flex;align-items:center;gap:0.4rem;font-family:var(--ff-mono);font-size:0.65rem;padding:0.3rem 0.8rem;border-radius:100px;border:1px solid var(--border);color:var(--muted);}
.rnk-methodology{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-top:1.5rem;}
[data-theme="light"] .rnk-methodology{background:#f8fafc;}
.rnk-method-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.75rem;margin-top:0.75rem;}
.rnk-method-item{font-size:0.78rem;color:var(--muted);line-height:1.5;padding-left:0.9rem;position:relative;}
.rnk-method-item::before{content:'◆';position:absolute;left:0;font-size:0.45rem;top:0.3rem;color:var(--amber);}
.rnk-method-item strong{color:var(--text);}
.rnk-compare-notice{background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);border-radius:10px;padding:0.9rem 1.1rem;margin-bottom:1.25rem;font-size:0.8rem;color:var(--muted);line-height:1.6;}
.rnk-compare-notice strong{color:var(--purple2);}
.rnk-empty{text-align:center;padding:3rem 2rem;font-family:var(--ff-mono);font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);opacity:0.4;}

const STARTER_RECS = [
  { id:32, type:'book', title:'How to Win a Trade War', author:'Soumaya Keynes & Chad Bown', topics:['Trade','Tariffs','Geopolitics','Policy','Protectionism','WTO'], difficulty:'Accessible', why:'Co-written by Soumaya Keynes — FT economics editor and host of The Economics Show — this is an accessible account of modern trade conflict and a practical guide for the novice negotiator on how to win, or at least cope with, today\'s hostile environment for free trade. Tim Harford calls it the best guide to the new economic order. Paul Krugman praises it as a breezy romp that never dumbs things down. Ed Conway says it is timely and essential. Diane Coyle (Bennett Professor of Public Policy, Cambridge) adds that it is, yes, genuinely funny. Essential for any interview question on protectionism, the WTO, or the US-China rivalry. Follow with Ha-Joon Chang\'s Kicking Away the Ladder for the heterodox counterpoint.', link:'https://www.goodreads.com/book/show/How-to-Win-a-Trade-War' },
  { id:1, type:'book', title:'23 Things They Don\'t Tell You About Capitalism', author:'Ha-Joon Chang', topics:['Heterodox','Markets','Development'], difficulty:'Accessible', why:'Chang dismantles 23 orthodox economic assumptions one chapter at a time. Each chapter is self-contained — ideal for building counterarguments to deploy in interviews.', link:'https://www.goodreads.com/book/show/8913542' },
  { id:2, type:'book', title:'Kicking Away the Ladder', author:'Ha-Joon Chang', topics:['Trade','Development','Industrial Policy'], difficulty:'Intermediate', why:'Rich countries used tariffs and industrial policy to develop, then demanded free trade from everyone else. Essential for interview questions on globalisation, development, and trade policy.', link:'https://www.goodreads.com/book/show/306145' },
  { id:3, type:'book', title:'Chip War', author:'Chris Miller', topics:['Trade','Geopolitics','Industrial Policy'], difficulty:'Accessible', why:'The global semiconductor industry as a geopolitical thriller. Covers US-China rivalry, supply chains, and the economics of monopoly. Genuinely gripping and rich with interview material.', link:'https://www.goodreads.com/book/show/60321977' },
  { id:4, type:'book', title:'The Deficit Myth', author:'Stephanie Kelton', topics:['Macro','Fiscal Policy','MMT'], difficulty:'Intermediate', why:'The clearest statement of Modern Monetary Theory. You don\'t have to agree — but being able to explain MMT and argue against it fluently distinguishes you in any fiscal policy discussion.', link:'https://www.goodreads.com/book/show/45731395' },
  { id:5, type:'book', title:'The Entrepreneurial State', author:'Mariana Mazzucato', topics:['Innovation','Industrial Policy','Markets'], difficulty:'Intermediate', why:'Mazzucato argues the state — not private enterprise — has driven radical innovation. A direct challenge to the market failure framing. Essential for questions on industrial policy or the role of government.', link:'https://www.goodreads.com/book/show/13059555' },
  { id:6, type:'book', title:'The Road to Serfdom', author:'F.A. Hayek', topics:['Markets','Planning','Liberty','Classical Liberal'], difficulty:'Intermediate', why:'Hayek\'s 1944 argument that economic planning erodes freedom. The most important statement of the market liberal position. Read alongside Chang or Mazzucato to understand the full ideological range.', link:'https://www.goodreads.com/book/show/299215' },
  { id:7, type:'book', title:'The Use of Knowledge in Society (essay)', author:'F.A. Hayek', topics:['Information','Markets','Price Signals'], difficulty:'Advanced', why:'Freely available online. Hayek\'s argument that prices aggregate dispersed knowledge no planner could possess. Takes an hour to read. Deploying it in an interview on market failure is a powerful differentiator.', link:'https://www.econlib.org/library/Essays/hykKnw.html' },
  { id:8, type:'book', title:'Thinking, Fast and Slow', author:'Daniel Kahneman', topics:['Behavioural','Psychology','Decision Theory'], difficulty:'Accessible', why:'The definitive introduction to System 1 vs System 2 thinking. Underpins modern behavioural economics. Interviewers frequently set questions that hinge on irrationality — this gives you the framework.', link:'https://www.goodreads.com/book/show/11468377' },
  { id:9, type:'book', title:'Crashed', author:'Adam Tooze', topics:['Financial Crisis','Macro','Banking'], difficulty:'Advanced', why:'The definitive analytical account of 2008 and its decade-long aftermath. Vastly more rigorous than Michael Lewis. If you read one demanding book for interview prep, make it this.', link:'https://www.goodreads.com/book/show/36950522' },
  { id:10, type:'book', title:'Poor Economics', author:'Banerjee & Duflo', topics:['Development','Poverty','Randomised Control Trials'], difficulty:'Intermediate', why:'Nobel Prize winners explain how randomised control trials transformed development economics. A masterclass in how economists test theories. Perfect for FCDO competition essays and development questions.', link:'https://www.goodreads.com/book/show/10245602' },
  { id:11, type:'book', title:'Why Nations Fail', author:'Acemoglu & Robinson', topics:['Development','Institutions','Growth'], difficulty:'Intermediate', why:'Institutions — not geography or culture — are the key to long-run economic development. The comparison of Nogales, Arizona and Nogales, Mexico is one of the most elegant pieces of economic reasoning in popular non-fiction.', link:'https://www.goodreads.com/book/show/12158480' },
  { id:12, type:'book', title:'Capital in the Twenty-First Century', author:'Thomas Piketty', topics:['Inequality','Macro','Wealth'], difficulty:'Advanced', why:'Piketty\'s r > g thesis has defined the inequality debate for a decade. Read the introduction and conclusion. Know the argument, engage with the empirical critiques, and consider the policy implications.', link:'https://www.goodreads.com/book/show/18736925' },
  { id:13, type:'book', title:'Global Inequality', author:'Branko Milanovic', topics:['Inequality','Globalisation','Income Distribution'], difficulty:'Intermediate', why:'Milanovic\'s elephant curve is the single most important data visualisation in the globalisation-and-inequality debate. Concise, data-driven, and full of material for essays and interviews.', link:'https://www.goodreads.com/book/show/27311082' },
  { id:33, type:'book', title:'Nudge', author:'Richard Thaler & Cass Sunstein', topics:['Behavioural','Policy','Decision Theory'], difficulty:'Accessible', why:'The book that put libertarian paternalism on the policy map. Thaler (Nobel 2017) and Sunstein show how default choices can dramatically shift behaviour without restricting freedom. Essential for any question on behavioural economics, nudge units, or the limits of rational choice theory.', link:'https://www.goodreads.com/book/show/2527900' },
  { id:34, type:'book', title:'Edible Economics', author:'Ha-Joon Chang', topics:['Development','Trade','Heterodox','Food'], difficulty:'Accessible', why:'Chang uses food — from garlic to chocolate to beef — as a lens for examining global economic inequality, trade policy, and development. Witty, wide-ranging, and full of counterintuitive arguments. Pairs beautifully with Kicking Away the Ladder for interview preparation on trade and development.', link:'https://www.goodreads.com/book/show/60149603' },
  { id:35, type:'book', title:'The Big Short', author:'Michael Lewis', topics:['Financial Crisis','Banking','Incentives'], difficulty:'Accessible', why:'Lewis tells the story of the handful of investors who saw the 2008 crash coming. Brilliant on how perverse incentives and information asymmetry caused catastrophic market failure. The most readable entry point into financial economics — follow it with Tooze\'s Crashed for the rigorous analytical account.', link:'https://www.goodreads.com/book/show/8032112' },
  { id:36, type:'book', title:'Economica: A Global History of Women, Wealth and Power', author:'Victoria Bateman', topics:['Gender','Inequality','Economic History','Labour Markets'], difficulty:'Intermediate', why:'Cambridge economist Victoria Bateman reframes economic history around the systematic exclusion of women from markets and institutions. Provocative, data-driven, and full of material for questions on inequality, labour markets, and the sources of long-run growth. A powerful counterpoint to Why Nations Fail.', link:'https://www.goodreads.com/book/show/Economica-Bateman' },
  { id:37, type:'book', title:'Eclipsing the West: China, India and the Forging of a New World', author:'Vince Cable', topics:['Development','Geopolitics','Trade','Emerging Economies'], difficulty:'Intermediate', why:'Former Business Secretary and economist Vince Cable examines the structural shift in global economic power towards Asia. Strong on the political economy of growth and the institutional differences between the Chinese and Indian development models. Essential for interview questions on emerging economies and the multipolar world order.', link:'https://www.goodreads.com/book/show/Eclipsing-the-West-Cable' },
  { id:38, type:'book', title:'Fixed: Why Personal Finance Is Broken and How to Make It Work for Everyone', author:'John Y. Campbell & Tarun Ramadorai', topics:['Personal Finance','Behavioural','Households','Policy'], difficulty:'Intermediate', why:'Two Harvard and Imperial economists dissect why households persistently make poor financial decisions — on mortgages, savings, and investment. Bridges behavioural economics and public policy in ways that connect directly to market failure and consumer welfare arguments.', link:'https://www.goodreads.com/book/show/Fixed-Campbell-Ramadorai' },
  { id:39, type:'book', title:'Money and Inflation at the Time of Covid', author:'Tim Congdon', topics:['Monetary Policy','Inflation','Macro','Quantity Theory'], difficulty:'Advanced', why:'Congdon — the UK\'s foremost monetarist — applies quantity theory of money to the inflationary surge of 2021–23. An important counterpoint to New Keynesian accounts of post-pandemic inflation. Essential for any student wanting to engage seriously with the monetary vs fiscal explanations of the inflation debate.', link:'https://www.goodreads.com/book/show/Money-Inflation-Covid-Congdon' },
  { id:40, type:'book', title:'Why Nothing Works: Who Killed Progress — and How to Bring It Back', author:'Marc J. Dunkelman', topics:['Institutions','Productivity','Growth','Policy'], difficulty:'Intermediate', why:'Dunkelman diagnoses why Western democracies have become so bad at building things — from housing to infrastructure to public services. A timely account of institutional sclerosis and regulatory failure with implications for growth theory and supply-side economics. Pairs well with Mazzucato and Abundance.', link:'https://www.goodreads.com/book/show/Why-Nothing-Works-Dunkelman' },
  { id:41, type:'book', title:'Violent Saviours: The West, the Rest, and Capitalism Without Consent', author:'William Easterly', topics:['Development','Aid','Institutions','Colonialism'], difficulty:'Intermediate', why:'Easterly — the most trenchant critic of top-down development economics — argues that Western interventions in developing economies routinely cause more harm than good. An essential counterpoint to Sachs and Collier. Read alongside Poor Economics for a complete picture of the development debate.', link:'https://www.goodreads.com/book/show/Violent-Saviours-Easterly' },
  { id:42, type:'book', title:'How Progress Ends: Technology, Innovation, and the Fate of Nations', author:'Carl Benedikt Frey', topics:['Technology','Innovation','Growth','Labour Markets'], difficulty:'Advanced', why:'Oxford economist Frey — co-author of the landmark paper on automation and job displacement — examines why technological progress may be decelerating. Deeply researched and analytically serious. Essential for interview questions on productivity, secular stagnation, and the economics of innovation.', link:'https://www.goodreads.com/book/show/How-Progress-Ends-Frey' },
  { id:43, type:'book', title:'The World at Economic War: How to Rebuild Security in a Weaponized Global Economy', author:'Rebecca Harding', topics:['Trade','Geopolitics','Security','Globalisation'], difficulty:'Intermediate', why:'Harding examines how economic tools — sanctions, export controls, investment screening — have become weapons of geopolitical conflict. Connects trade economics to international security in ways that are increasingly central to interview questions on globalisation and the future of the WTO.', link:'https://www.goodreads.com/book/show/World-at-Economic-War-Harding' },
  { id:44, type:'book', title:'A Sixth of Humanity: Independent India\'s Development Odyssey', author:'Devesh Kapur & Arvind Subramanian', topics:['Development','India','Growth','Institutions'], difficulty:'Advanced', why:'Two of the world\'s foremost authorities on the Indian economy deliver a comprehensive account of post-independence development. Outstanding on the gap between India\'s institutional promise and economic performance. Essential for any student interested in development economics or the comparison between the Asian giants.', link:'https://www.goodreads.com/book/show/Sixth-of-Humanity-Kapur-Subramanian' },
  { id:45, type:'book', title:'Abundance: How We Build a Better Future', author:'Ezra Klein & Derek Thompson', topics:['Growth','Housing','Policy','Institutions'], difficulty:'Accessible', why:'Klein and Thompson argue that progressive governance has become too attached to process and too allergic to building — and that breaking through that blockage is the key to improving living standards. Provocative on housing, energy, and public investment. Pairs naturally with Dunkelman\'s Why Nothing Works.', link:'https://www.goodreads.com/book/show/Abundance-Klein-Thompson' },
  { id:46, type:'book', title:'Can Europe Survive? The Story of a Continent in a Fractured World', author:'David Marsh', topics:['Europe','Macro','Trade','Geopolitics'], difficulty:'Intermediate', why:'A sober, data-rich assessment of the structural pressures facing the European economy — from energy dependency to demographic decline to defence spending. Strong on the political economy of the euro and the institutional limits of the EU. Timely for any interview touching on trade, the single market, or European competitiveness.', link:'https://www.goodreads.com/book/show/Can-Europe-Survive-Marsh' },
  { id:47, type:'book', title:'The Great Global Transformation: National Market Liberalism in a Multipolar World', author:'Branko Milanovic', topics:['Globalisation','Inequality','Geopolitics','Capitalism'], difficulty:'Advanced', why:'Milanovic\'s latest major work — a follow-up to Global Inequality — argues that capitalism is diverging into distinct national varieties as the unipolar liberal order fragments. The intellectual capstone to his career. Read Global Inequality first, then this for a complete account of his thinking.', link:'https://www.goodreads.com/book/show/Great-Global-Transformation-Milanovic' },
  { id:48, type:'book', title:'1929: The Inside Story of the Greatest Crash in Wall Street History', author:'Andrew Ross Sorkin', topics:['Financial Crisis','Economic History','Banking','Markets'], difficulty:'Accessible', why:'Sorkin — author of Too Big to Fail — reconstructs the 1929 crash with the narrative power of financial journalism. Rich in parallels with 2008 and essential context for any question on financial instability, contagion, or the macroeconomics of crises. Accessible but analytically serious.', link:'https://www.goodreads.com/book/show/1929-Sorkin' },
  { id:49, type:'book', title:'The Fractured Age: How the Return of Geopolitics Will Splinter the Global Economy', author:'Neil Shearing', topics:['Geopolitics','Trade','Macro','Globalisation'], difficulty:'Intermediate', why:'Chief Economist at Capital Economics, Shearing provides a rigorous account of how geopolitical fragmentation is reshaping global supply chains, capital flows, and monetary policy. One of the clearest economic frameworks for understanding deglobalisation. Essential for any interview question on the future of world trade.', link:'https://www.goodreads.com/book/show/Fractured-Age-Shearing' },
  { id:50, type:'book', title:'The Growth Story of the 21st Century: The Economics and Opportunity of Climate Action', author:'Nicholas Stern', topics:['Climate','Growth','Policy','Externalities'], difficulty:'Intermediate', why:'Lord Stern — author of the landmark 2006 Stern Review — argues that the transition to net zero is not a constraint on growth but its primary engine. Essential for interview questions on climate economics, externalities, and the trade-off between present and future consumption. The optimistic counterpoint to standard cost-benefit framings.', link:'https://www.goodreads.com/book/show/Growth-Story-Stern' },
  { id:51, type:'book', title:'Breakneck: China\'s Quest to Engineer the Future', author:'Dan Wang', topics:['China','Technology','Industrial Policy','Geopolitics'], difficulty:'Intermediate', why:'Annual letters from Gavekal Dragonomics analyst Dan Wang, brought together as a book — a unique ground-level account of Chinese industrial policy, technology strategy, and economic ambition. Essential complement to Chip War for understanding the US-China technology rivalry from the Chinese side.', link:'https://www.goodreads.com/book/show/Breakneck-Dan-Wang' },
  { id:14, type:'podcast', title:'The Economics Show with Soumaya Keynes', author:'Financial Times', topics:['Macro','Trade','Policy','Current Affairs'], difficulty:'Intermediate', why:'Weekly FT podcast — analytically serious and never dumbed down. Soumaya Keynes spent eight years at The Economist. Probably the single best podcast for Oxbridge interview preparation.', link:'https://shows.acast.com/the-economics-show-with-soumaya-keynes' },
  { id:15, type:'podcast', title:'The Rest is Money', author:'Robert Peston & Steph McGovern', topics:['Business','Finance','UK Economy'], difficulty:'Accessible', why:'Robert Peston and Steph McGovern make business and financial economics genuinely accessible. Particularly good on UK economic policy and the interface between politics and economics.', link:'https://open.spotify.com/show/69DL3DIVIJZHpbSEzXs0Kc' },
  { id:16, type:'podcast', title:'The Price of Football', author:'Kieran Maguire & Kevin Day', topics:['Sports Economics','Finance','Labour Markets'], difficulty:'Accessible', why:'University of Liverpool football finance lecturer Kieran Maguire follows the money in professional football. Transfer markets, wage structures, monopsony — rich applied microeconomics that stands out in interviews.', link:'https://priceoffootball.com' },
  { id:17, type:'podcast', title:'Economics in Ten', author:'Pete & Gav', topics:['History of Thought','Economists','Ideas'], difficulty:'Accessible', why:'Each episode explores a famous economist through ten questions — their life, their era, their key ideas and the criticisms. Invaluable for building the history of economic thought that Oxbridge interviewers look for.', link:'https://open.spotify.com/show/44pI1bcAKbrA2fLZpwJF4X' },
  { id:18, type:'podcast', title:'Planet Money', author:'NPR', topics:['Applied Economics','Trade','Everyday Economics'], difficulty:'Accessible', why:'Short, brilliantly produced episodes making economics genuinely engaging. The gold standard for accessible economics storytelling. Perfect for building a broad bank of real-world examples.', link:'https://www.npr.org/sections/money/' },
  { id:19, type:'podcast', title:'More or Less', author:'Tim Harford / BBC Radio 4', topics:['Statistics','Data Literacy','Policy'], difficulty:'Accessible', why:'Tim Harford interrogates the numbers behind the news. Teaches you to ask "but how do we measure that?" — a habit that separates good economics students from great ones.', link:'https://www.bbc.co.uk/programmes/p02nrss1' },
  { id:20, type:'podcast', title:'Freakonomics Radio', author:'Stephen Dubner', topics:['Applied Micro','Incentives','Behavioural'], difficulty:'Accessible', why:'Investigations applying economic thinking to unexpected situations. Trains you to see economic logic everywhere. Episodes on sumo wrestling, the hidden economics of drug dealing, and estate agents are all excellent.', link:'https://freakonomics.com/series/freakonomics-radio/' },
  { id:21, type:'podcast', title:'EconTalk', author:'Russ Roberts / Library of Economics and Liberty', topics:['Markets','Policy','Classical Liberal'], difficulty:'Advanced', why:'Long-form conversations with leading economists. Roberts is a committed market liberal — every episode gives a rigorous pro-market perspective to either agree with or argue against. Past guests include Kahneman, Thaler, Acemoglu.', link:'https://www.econtalk.org' },
  { id:22, type:'podcast', title:'Odd Lots', author:'Bloomberg', topics:['Finance','Macro','Markets'], difficulty:'Intermediate', why:'Bloomberg\'s flagship economics podcast — more sophisticated than Planet Money. Strong on financial economics which A-Level rarely covers in depth. Excellent for interview questions on banking and monetary policy.', link:'https://www.bloomberg.com/oddlots' },
  { id:23, type:'magazine', title:'Economics Today', author:'Economics Factory', topics:['A-Level','Applied Theory','Current Context','Specification'], difficulty:'Accessible', why:'The most directly A-Level-relevant economics magazine available. Four issues per year, written by teachers and economists for sixth-form students. Applies economic theory to current real-world contexts in exactly the way examiners reward. Roughly half the articles in any volume connect directly to A-Level examination themes.', link:'https://economicsfactory.com' },
  { id:24, type:'magazine', title:'Economic Review', author:'Philip Allan / Hodder Education', topics:['A-Level','Specification','Essay Technique','Examiner Insight'], difficulty:'Accessible', why:'Written by university lecturers and experienced sixth-form teachers. Strong on essay technique, model answers, and examiner commentary from past papers — precisely what A-Level markers reward. Your school library may already have the full digital archive.', link:'https://www.hoddereducation.com/subjects/economics' },
  { id:25, type:'magazine', title:'The Economist', author:'The Economist Group', topics:['Macro','Policy','Global','Trade'], difficulty:'Intermediate', why:'Essential weekly reading for any serious economics student. The Finance & Economics section and Leaders column are the priorities. The writing style — concise, precise, evidence-led — is exactly what Oxbridge tutors want to see in your own essays.', link:'https://www.economist.com' },
  { id:26, type:'magazine', title:'Finance & Development (IMF)', author:'International Monetary Fund', topics:['Development','Macro','Global Economy'], difficulty:'Intermediate', why:'The IMF\'s quarterly magazine. Global macroeconomics, inequality, climate and development with academic rigour but accessible prose. Free online. Outstanding for FCDO competition essays and development economics questions.', link:'https://www.imf.org/en/Publications/fandd' },
  { id:27, type:'article', title:'Economics Observatory', author:'Various UK Economists', topics:['Policy','UK Economy','Research'], difficulty:'Accessible', why:'Short briefings by leading UK economists on current policy questions. Every article is peer-reviewed but written in plain English. Free. One article a week will transform the quality of your examples in essays and interviews.', link:'https://www.economicsobservatory.com' },
  { id:28, type:'article', title:'The Use of Knowledge in Society (1945)', author:'F.A. Hayek', topics:['Markets','Information','Price Signals'], difficulty:'Advanced', why:'Freely available online. One of the most important papers in economics. Takes about an hour to read carefully. Deploying its central argument in an interview on market failure or government intervention is a powerful differentiator.', link:'https://www.econlib.org/library/Essays/hykKnw.html' },
  { id:29, type:'article', title:'VoxEU / CEPR', author:'CEPR', topics:['Research','Policy','Macro','Trade'], difficulty:'Intermediate', why:'Accessible summaries of academic research from top European economists. Each article distils a peer-reviewed paper into around 1,000 readable words. Free. Reading one article a week gives you a genuine sense of frontier economic research.', link:'https://cepr.org/voxeu' },
  { id:30, type:'video', title:'Marginal Revolution University', author:'Tyler Cowen & Alex Tabarrok', topics:['Micro','Macro','Development','Game Theory'], difficulty:'Accessible', why:'Free university-level economics video courses. The Development Economics, Game Theory, and Everyday Economics series are outstanding. Perfect for consolidating A-Level knowledge and stretching beyond the specification.', link:'https://mru.org' },
  { id:31, type:'video', title:'INET (Institute for New Economic Thinking)', author:'Institute for New Economic Thinking', topics:['Heterodox','History of Thought','Macro'], difficulty:'Advanced', why:'Lectures and conversations with economists who challenge mainstream orthodoxy. INET deliberately questions assumptions that introductory courses treat as settled. The kind of critical perspective that impresses interviewers who have heard the standard answers a thousand times.', link:'https://www.ineteconomics.org/perspectives/videos' },
  { id:52, type:'film', title:'The Big Short', author:'Adam McKay (2015)', topics:['Financial Crisis','Banking','Incentives','Information Asymmetry'], difficulty:'Accessible', why:'The most entertaining economics film ever made. McKay dramatises the handful of traders who spotted the 2008 subprime collapse coming. Celebrity cameos explain CDOs and credit default swaps mid-scene. Superb on perverse incentives, information asymmetry, and the failure of ratings agencies. Watch this, then read Crashed for the analytical rigour behind the story.', link:'https://www.imdb.com/title/tt1596363/' },
  { id:53, type:'film', title:'Inside Job', author:'Charles Ferguson (2010)', topics:['Financial Crisis','Regulation','Banking','Macro'], difficulty:'Intermediate', why:'Won the Academy Award for Best Documentary. Ferguson interviews senior economists, regulators, and bankers to trace exactly how deregulation, conflicted incentives, and reckless securitisation caused the 2008 crisis. Unusually technically rigorous for a documentary — and unusually damning of the economics profession itself. Essential viewing for any student who references 2008 in interview.', link:'https://www.imdb.com/title/tt1645089/' },
  { id:54, type:'film', title:'Dark Waters', author:'Todd Haynes (2019)', topics:['Externalities','Regulation','Corporate Power','Market Failure'], difficulty:'Accessible', why:'Mark Ruffalo plays the lawyer who took on DuPont over decades of PFAS chemical contamination. Exceptional on regulatory capture, information asymmetry between corporation and regulator, and the failure of liability law to price environmental damage. One of the most powerful applied illustrations of negative externalities you will ever see — and interviewers love a film reference that goes beyond the obvious.', link:'https://www.imdb.com/title/tt9071322/' },
  { id:55, type:'film', title:'Enron: The Smartest Guys in the Room', author:'Alex Gibney (2005)', topics:['Corporate Governance','Incentives','Information','Markets'], difficulty:'Accessible', why:'The definitive account of Enron\'s collapse — greed, mark-to-market accounting fraud, and a corporate culture that rewarded performance at any cost. Textbook principal-agent problems and asymmetric information. Still the best single case study in corporate governance failure. Gibney also made the essential Uber documentary and Dirty Money (Netflix).', link:'https://www.imdb.com/title/tt1016268/' },
  { id:56, type:'film', title:'Margin Call', author:'J.C. Chandor (2011)', topics:['Financial Crisis','Risk','Banking','Ethics'], difficulty:'Intermediate', why:'A fictional but forensically realistic 24-hour thriller set inside an investment bank on the eve of the 2008 crisis. Kevin Spacey, Jeremy Irons, Stanley Tucci. Far more analytically serious than most finance films — the board meeting scene is a masterclass in how institutions rationalise systemic risk-taking. Strong on the ethics of finance alongside the economics.', link:'https://www.imdb.com/title/tt1615147/' },
  { id:57, type:'film', title:'Too Big to Fail', author:'Curtis Hanson / HBO (2011)', topics:['Financial Crisis','Macro','Banking','Policy'], difficulty:'Intermediate', why:'HBO dramatisation of the 2008 bailout negotiations, based on Andrew Ross Sorkin\'s book. Shows the Treasury, Fed, and major banks trying to prevent systemic collapse in real time. Outstanding on moral hazard, lender of last resort theory, and the political economy of financial regulation. Watch alongside Inside Job for the journalism and this for the policy process.', link:'https://www.imdb.com/title/tt1742683/' },
  { id:58, type:'film', title:'The Corporation', author:'Mark Achbar & Jennifer Abbott (2003)', topics:['Firm Theory','Externalities','Corporate Power','Markets'], difficulty:'Intermediate', why:'Uses the legal concept of corporate personhood to ask what kind of entity the modern corporation actually is — and diagnoses it as pathological by clinical criteria. Dense with ideas from Friedman\'s shareholder theory to stakeholder critiques and the economics of corporate externalities. Dated in parts but intellectually serious and full of deployable arguments.', link:'https://www.imdb.com/title/tt0379225/' },
  { id:59, type:'film', title:'13 Bankers', author:'Based on Johnson & Kwak (2010)', topics:['Financial Crisis','Regulation','Political Economy','Banking'], difficulty:'Advanced', why:'Simon Johnson (former IMF Chief Economist) and James Kwak argue that Wall Street\'s capture of Washington directly caused 2008. The book underpins much of the academic literature on regulatory capture and too-big-to-fail. The documentary adaptation makes the political economy argument accessible. Essential if you plan to argue about financial regulation in interview.', link:'https://www.imdb.com/title/tt1766085/' },
  { id:60, type:'film', title:'An Inconvenient Truth', author:'Davis Guggenheim (2006)', topics:['Climate','Externalities','Market Failure','Policy'], difficulty:'Accessible', why:'Al Gore\'s 2006 presentation remains the clearest lay exposition of climate change as an economics problem — the largest market failure in history, in Stern\'s formulation. Watch it back-to-back with The Growth Story by Stern. Dated on some of the projections but foundational for understanding why climate economics entered the mainstream.', link:'https://www.imdb.com/title/tt0497116/' },
  { id:61, type:'film', title:'Dirty Money (Series)', author:'Alex Gibney / Netflix (2018)', topics:['Corporate Governance','Regulation','Fraud','Incentives'], difficulty:'Accessible', why:'Six documentary episodes each investigating a major corporate scandal — Volkswagen emissions fraud, payday lending, HSBC money laundering, pharmaceutical price gouging, the Trump Organisation, and Scott Tucker. Each episode is a standalone masterclass in a different dimension of market failure and regulatory inadequacy. The Valiant-Turing pharma episode is outstanding for price theory.', link:'https://www.imdb.com/title/tt7907922/' },
];

var allRecs = STARTER_RECS.slice();
var currentCat = 'all';

var TYPE_ICONS = {book:'📘', podcast:'🎙', magazine:'📰', article:'📄', video:'▶', film:'🎬'};

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderRecs();
}

function renderRecs() {
  var grid = document.getElementById('rec-grid');
  if (!grid) return;
  var filtered = currentCat === 'all' ? allRecs : allRecs.filter(function(r) { return r.type === currentCat; });
  if (!filtered.length) { grid.innerHTML = '<div class="rec-empty">No recommendations in this category yet</div>'; return; }
  var diffColor = {Accessible:'color:#34d399', Intermediate:'color:var(--amber2)', Advanced:'color:#f87171'};
  grid.innerHTML = filtered.map(function(r) {
    var topics = (r.topics||[]).map(function(t) { return '<span class="rec-topic">' + t + '</span>'; }).join('');
    var whyHtml = r.why ? '<div class="rec-why">' + r.why + '</div>' : '';
    var linkHtml = r.link ? '<a class="rec-link" href="' + r.link + '" target="_blank" rel="noopener">Visit ↗</a>' : '';
    return '<div class="rec-card rc-' + r.type + '">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<span class="rec-type-badge rb-' + r.type + '">' + (TYPE_ICONS[r.type]||'') + ' ' + r.type + '</span>' +
        '<span class="rec-difficulty" style="' + (diffColor[r.difficulty]||'') + '">' + r.difficulty + '</span>' +
      '</div>' +
      '<div class="rec-title">' + r.title + '</div>' +
      '<div class="rec-author">' + r.author + '</div>' +
      (topics ? '<div class="rec-topics">' + topics + '</div>' : '') +
      whyHtml + linkHtml +
    '</div>';
  }).join('');
}


/* INIT */
renderRecs();
</script>

</html>
