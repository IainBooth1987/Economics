<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BIZ-OMICS Economics Magazine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e1a;
  --surface:#111827;
  --surface2:#0d1526;
  --surface3:#161f35;
  --amber:#f59e0b;--amber2:#fbbf24;
  --red:#ef4444;
  --blue:#3b82f6;
  --text:#f1f5f9;--muted:#94a3b8;--muted2:#64748b;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --ff-serif:'Playfair Display',Georgia,serif;
  --ff-sans:'DM Sans',system-ui,sans-serif;
  --ff-mono:'DM Mono',monospace;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--ff-sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,14,26,0.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 1.5rem;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:var(--ff-sans);
  font-size:1rem;font-weight:800;
  letter-spacing:-0.02em;
  text-decoration:none;color:var(--text);
  display:flex;align-items:center;gap:0.15em;
}
.logo span{color:var(--amber);}
.back-btn{
  display:inline-flex;align-items:center;gap:0.4rem;
  font-size:0.78rem;font-weight:600;color:var(--muted);
  text-decoration:none;
  padding:0.35rem 0.85rem;border-radius:8px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,0.03);
  transition:all 0.18s;
}
.back-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);}
.back-btn svg{width:14px;height:14px;flex-shrink:0;}

/* ── HERO MASTHEAD ── */
.masthead{
  position:relative;
  padding:3.5rem 1.5rem 2.5rem;
  text-align:center;
  overflow:hidden;
}
.masthead::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 50% -10%, rgba(245,158,11,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(59,130,246,0.07) 0%, transparent 50%),
    radial-gradient(ellipse 40% 40% at 80% 90%, rgba(239,68,68,0.06) 0%, transparent 50%);
  pointer-events:none;
}
.masthead-rule{
  width:60px;height:2px;
  background:var(--amber);
  margin:0 auto 1.2rem;
  border-radius:1px;
}
.masthead-eyebrow{
  font-family:var(--ff-mono);
  font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--amber);margin-bottom:0.6rem;
}
.masthead-title{
  font-family:var(--ff-serif);
  font-size:clamp(2rem,6vw,3.5rem);
  font-weight:900;
  line-height:1.05;
  letter-spacing:-0.02em;
  margin-bottom:0.75rem;
}
.masthead-title em{
  font-style:italic;
  color:var(--amber);
}
.masthead-sub{
  font-size:0.9rem;color:var(--muted);
  max-width:480px;margin:0 auto;
  line-height:1.6;
}

/* ── MAIN CONTENT ── */
main{
  max-width:960px;
  margin:0 auto;
  padding:0 1.25rem 5rem;
}

/* ── SHELF HEADER ── */
.shelf-header{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:0.5rem 0 1.2rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1.5rem;
}
.shelf-label{
  font-family:var(--ff-mono);
  font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--muted2);
}
.shelf-count{
  font-family:var(--ff-mono);
  font-size:0.62rem;color:var(--muted2);
}

/* ── ISSUE SHELF ── */
#shelf-view{}
#issue-shelf{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:1.25rem;
}
.issue-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.22s cubic-bezier(.22,.68,0,1.2), border-color 0.18s, box-shadow 0.22s;
  text-align:left;
  color:inherit;
  font-family:inherit;
  padding:0;
  position:relative;
  display:block;
  width:100%;
}
.issue-card:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
}
.issue-card-cover{
  width:100%;aspect-ratio:3/4;
  object-fit:cover;object-position:top;
  display:block;
  background:var(--surface3);
}
.issue-card-cover-placeholder{
  width:100%;aspect-ratio:3/4;
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
  color:var(--muted2);
  font-family:var(--ff-mono);font-size:0.7rem;
}
.issue-card-body{
  padding:0.85rem 1rem;
  border-top:1px solid var(--border);
}
.issue-card-number{
  font-family:var(--ff-mono);
  font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;
  margin-bottom:0.25rem;
}
.issue-card-title{
  font-family:var(--ff-serif);
  font-size:0.95rem;font-weight:700;
  line-height:1.2;
  margin-bottom:0.2rem;
}
.issue-card-sub{
  font-size:0.7rem;color:var(--muted);
  line-height:1.4;
}
.issue-card-footer{
  padding:0.6rem 1rem;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.issue-card-pages{
  font-family:var(--ff-mono);
  font-size:0.58rem;color:var(--muted2);
}
.issue-card-read{
  font-size:0.68rem;font-weight:700;
  display:flex;align-items:center;gap:0.3rem;
}
.issue-badge{
  position:absolute;top:0.6rem;right:0.6rem;
  font-family:var(--ff-mono);
  font-size:0.58rem;letter-spacing:0.08em;
  padding:2px 8px;border-radius:100px;
  font-weight:700;color:#000;z-index:2;
}

/* ── READER ── */
#reader-view{display:none;}

.reader-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 0 1rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1.5rem;
  gap:1rem;
}
.reader-meta{}
.reader-issue-num{
  font-family:var(--ff-mono);
  font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--amber);margin-bottom:0.15rem;
}
.reader-issue-title{
  font-family:var(--ff-serif);
  font-size:1.1rem;font-weight:700;
}
.reader-back{
  padding:0.4rem 1rem;border-radius:8px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border2);
  color:var(--muted);font-size:0.75rem;font-weight:600;
  font-family:var(--ff-sans);cursor:pointer;
  white-space:nowrap;flex-shrink:0;
  transition:all 0.15s;
}
.reader-back:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}

/* Page image */
.mag-page-wrap{
  position:relative;
  background:var(--surface2);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 16px 60px rgba(0,0,0,0.6);
  margin-bottom:1.25rem;
}
#mag-img{
  width:100%;height:auto;
  display:block;
}
.mag-page-loading{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--surface2);
  opacity:0;pointer-events:none;
  transition:opacity 0.15s;
}
.mag-page-loading.show{opacity:1;}
.spinner{
  width:24px;height:24px;
  border:2px solid var(--border2);
  border-top-color:var(--amber);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Nav controls */
.mag-nav{
  display:flex;align-items:center;justify-content:center;
  gap:1rem;margin-bottom:1.25rem;
}
.nav-btn{
  padding:0.55rem 2rem;border-radius:9px;
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);font-weight:600;font-size:0.85rem;
  font-family:var(--ff-sans);cursor:pointer;
  transition:all 0.15s;
  display:flex;align-items:center;gap:0.5rem;
}
.nav-btn:hover:not(:disabled){
  background:var(--surface3);
  border-color:rgba(255,255,255,0.2);
}
.nav-btn:disabled{opacity:0.22;cursor:default;}
#mag-counter{
  font-family:var(--ff-mono);
  font-size:0.78rem;color:var(--muted);
  min-width:110px;text-align:center;
}

/* Thumbnail strip */
.thumb-strip-wrap{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:0.75rem;
}
.thumb-strip-label{
  font-family:var(--ff-mono);
  font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--muted2);margin-bottom:0.6rem;
}
#mag-thumbs{
  display:flex;gap:0.5rem;
  overflow-x:auto;
  padding-bottom:4px;
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
}
#mag-thumbs::-webkit-scrollbar{height:3px;}
#mag-thumbs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.mag-thumb{
  flex-shrink:0;
  width:64px;height:90px;
  object-fit:cover;object-position:top;
  border-radius:6px;
  cursor:pointer;
  border:2px solid transparent;
  transition:all 0.18s;
  opacity:0.4;
}
.mag-thumb:hover{opacity:0.75;}

/* ── COMING SOON CARD ── */
.coming-soon-card{
  background:var(--surface2);
  border:1px dashed var(--border2);
  border-radius:var(--radius);
  padding:2.5rem 1.5rem;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:0.6rem;
}
.coming-soon-icon{
  font-size:1.8rem;margin-bottom:0.2rem;opacity:0.4;
}
.coming-soon-card h3{
  font-family:var(--ff-serif);
  font-size:1rem;font-weight:700;color:var(--muted);
}
.coming-soon-card p{
  font-size:0.75rem;color:var(--muted2);max-width:220px;line-height:1.5;
}

/* ── MOBILE DRAWER ── */
.drawer-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
  z-index:300;
}
.drawer-overlay.open{display:block;}
.drawer{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  padding:0 1.25rem 2.5rem;
  z-index:301;max-height:85vh;
  overflow-y:auto;
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  -webkit-overflow-scrolling:touch;
}
.drawer.open{transform:translateY(0);}
.drawer-handle{
  width:36px;height:4px;background:var(--border2);
  border-radius:2px;margin:0.75rem auto 1.25rem;
}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .masthead{padding:2.5rem 1rem 2rem;}
  .masthead-title{font-size:1.9rem;}
  #issue-shelf{grid-template-columns:repeat(2,1fr);gap:0.85rem;}
  .issue-card-body{padding:0.65rem 0.75rem;}
  .issue-card-title{font-size:0.82rem;}
  .nav-btn{padding:0.55rem 1.2rem;font-size:0.8rem;}
  .mag-thumb{width:50px;height:70px;}
}
@media(max-width:380px){
  #issue-shelf{grid-template-columns:1fr 1fr;gap:0.65rem;}
}

/* ── PRINT ── */
@media print{
  header,.back-btn,.masthead,.shelf-header,.mag-nav,.thumb-strip-wrap{display:none!important;}
  #mag-img{box-shadow:none;border-radius:0;}
}
</style>
</head>
<body>

<header>
  <a href="#" class="logo">BIZ-<span>OMICS</span></a>
  <a href="oxbridge_hub.html" class="back-btn">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M10 3L5 8l5 5"/>
    </svg>
    Oxbridge Hub
  </a>
</header>

<div class="masthead">
  <div class="masthead-rule"></div>
  <div class="masthead-eyebrow">BIZ-OMICS Publication</div>
  <h1 class="masthead-title">Economics<br><em>Magazine</em></h1>
  <p class="masthead-sub">Comic-strip economics for Oxford, Cambridge and elite university applicants. Real events. Real analysis. Genuinely readable.</p>
</div>

<main>

  <!-- SHELF VIEW -->
  <div id="shelf-view">
    <div class="shelf-header">
      <span class="shelf-label">All Issues</span>
      <span class="shelf-count" id="shelf-count"></span>
    </div>
    <div id="issue-shelf"></div>
  </div>

  <!-- READER VIEW -->
  <div id="reader-view">
    <div class="reader-header">
      <div class="reader-meta">
        <div class="reader-issue-num" id="reader-label"></div>
        <div class="reader-issue-title" id="reader-title"></div>
      </div>
      <button class="reader-back" onclick="showShelf()">← All Issues</button>
    </div>

    <div class="mag-page-wrap">
      <img id="mag-img" src="" alt="Magazine page">
      <div class="mag-page-loading" id="page-loading">
        <div class="spinner"></div>
      </div>
    </div>

    <div class="mag-nav">
      <button id="btn-prev" class="nav-btn" onclick="magPrev()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
        Prev
      </button>
      <span id="mag-counter"></span>
      <button id="btn-next" class="nav-btn" onclick="magNext()">
        Next
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 3l5 5-5 5"/></svg>
      </button>
    </div>

    <div class="thumb-strip-wrap">
      <div class="thumb-strip-label">All Pages</div>
      <div id="mag-thumbs"></div>
    </div>
  </div>

</main>

<!-- Mobile page-detail drawer (for future use) -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="event-drawer">
  <div class="drawer-handle"></div>
  <div id="drawer-content"></div>
</div>

<script>
var MAG_ISSUES = [
  {
    id: 'financial-crisis',
    number: 'Issue 1',
    title: 'The Financial Crisis',
    subtitle: 'A Comic Strip Timeline: 2001–2007',
    color: '#ef4444',
    badge: '',
    pageCount: 15
  },
  {
    id: 'black-wednesday',
    number: 'Issue 2',
    title: 'Black Wednesday',
    subtitle: '"The Day Britain Broke the Bank"',
    color: '#3b82f6',
    badge: 'New',
    pageCount: 13
  }
];

var MAG_PAGE_PATHS = {
  'financial-crisis': Array.from({length:15}, function(_,i){ return 'magazine/financial-crisis-page-' + i + '.jpg'; }),
  'black-wednesday':  Array.from({length:13}, function(_,i){ return 'magazine/black-wednesday-page-' + i + '.jpg'; })
};

var currentIssue = null;
var currentPage  = 0;

function getPageSrc(n) {
  if (!currentIssue) return '';
  var paths = MAG_PAGE_PATHS[currentIssue.id];
  return (paths && paths[n]) ? paths[n] : '';
}

function getPageCount(iss) {
  return iss && iss.pageCount ? iss.pageCount : 0;
}

/* ── SHELF ── */
function renderShelf() {
  var shelf = document.getElementById('issue-shelf');
  var countEl = document.getElementById('shelf-count');
  if (!shelf) return;
  shelf.innerHTML = '';
  if (countEl) countEl.textContent = MAG_ISSUES.length + ' issue' + (MAG_ISSUES.length !== 1 ? 's' : '');

  MAG_ISSUES.forEach(function(iss) {
    var paths = MAG_PAGE_PATHS[iss.id];
    var coverSrc = paths && paths[0] ? paths[0] : '';

    var card = document.createElement('button');
    card.type = 'button';
    card.className = 'issue-card';
    card.style.borderColor = 'var(--border)';
    card.addEventListener('mouseenter', function(){ card.style.borderColor = iss.color; card.style.boxShadow = '0 0 0 1px ' + iss.color + '22'; });
    card.addEventListener('mouseleave', function(){ card.style.borderColor = 'var(--border)'; card.style.boxShadow = ''; });
    card.addEventListener('click', function(){ openIssue(iss.id); });

    var coverHTML = coverSrc
      ? '<img class="issue-card-cover" src="' + coverSrc + '" alt="' + iss.title + ' cover" loading="lazy">'
      : '<div class="issue-card-cover-placeholder">Cover</div>';

    var badgeHTML = iss.badge
      ? '<div class="issue-badge" style="background:' + iss.color + ';">' + iss.badge + '</div>'
      : '';

    card.innerHTML =
      badgeHTML +
      coverHTML +
      '<div class="issue-card-body">' +
        '<div class="issue-card-number" style="color:' + iss.color + ';">' + iss.number + '</div>' +
        '<div class="issue-card-title">' + iss.title + '</div>' +
        '<div class="issue-card-sub">' + iss.subtitle + '</div>' +
      '</div>' +
      '<div class="issue-card-footer">' +
        '<span class="issue-card-pages">' + iss.pageCount + ' pages</span>' +
        '<span class="issue-card-read" style="color:' + iss.color + ';">Read &rarr;</span>' +
      '</div>';

    shelf.appendChild(card);
  });

  // Coming soon card
  var soon = document.createElement('div');
  soon.className = 'coming-soon-card';
  soon.innerHTML =
    '<div class="coming-soon-icon">📰</div>' +
    '<h3>Issue 3 Coming Soon</h3>' +
    '<p>The next issue of the BIZ-OMICS Economics Magazine is in production.</p>';
  shelf.appendChild(soon);
}

/* ── READER ── */
function openIssue(id) {
  currentIssue = MAG_ISSUES.find(function(i) { return i.id === id; });
  if (!currentIssue) return;
  currentPage = 0;

  document.getElementById('shelf-view').style.display = 'none';
  document.getElementById('reader-view').style.display = 'block';
  document.getElementById('reader-label').textContent = currentIssue.number;
  document.getElementById('reader-label').style.color = currentIssue.color;
  document.getElementById('reader-title').textContent = currentIssue.title;

  buildThumbs();
  showPage(0);
  window.scrollTo({top:0, behavior:'smooth'});
}

function showShelf() {
  document.getElementById('shelf-view').style.display = 'block';
  document.getElementById('reader-view').style.display = 'none';
  currentIssue = null;
}

function showPage(n) {
  if (!currentIssue) return;
  var total = getPageCount(currentIssue);
  if (n < 0 || n >= total) return;
  currentPage = n;

  var img   = document.getElementById('mag-img');
  var loader = document.getElementById('page-loading');

  loader.classList.add('show');
  img.style.opacity = '0.4';

  var newSrc = getPageSrc(n);
  var tmp = new Image();
  tmp.onload = function() {
    img.src = newSrc;
    img.style.opacity = '1';
    loader.classList.remove('show');
  };
  tmp.onerror = function() {
    img.src = newSrc;
    img.style.opacity = '1';
    loader.classList.remove('show');
  };
  tmp.src = newSrc;

  document.getElementById('mag-counter').textContent = 'Page ' + (n+1) + ' of ' + total;
  document.getElementById('btn-prev').disabled = (n === 0);
  document.getElementById('btn-next').disabled = (n === total-1);
  document.getElementById('btn-prev').style.opacity = n === 0 ? '0.22' : '1';
  document.getElementById('btn-next').style.opacity = n === total-1 ? '0.22' : '1';

  document.querySelectorAll('.mag-thumb').forEach(function(t, i) {
    t.style.borderColor = i === n ? currentIssue.color : 'transparent';
    t.style.opacity     = i === n ? '1' : '0.4';
  });

  // Scroll active thumb into view
  var activeThumb = document.querySelectorAll('.mag-thumb')[n];
  if (activeThumb) activeThumb.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

function magPrev() {
  if (currentIssue && currentPage > 0) showPage(currentPage - 1);
}
function magNext() {
  if (currentIssue && currentPage < getPageCount(currentIssue) - 1) showPage(currentPage + 1);
}

function buildThumbs() {
  var strip = document.getElementById('mag-thumbs');
  if (!strip || !currentIssue) return;
  strip.innerHTML = '';
  for (var i = 0; i < getPageCount(currentIssue); i++) {
    var thumb = document.createElement('img');
    thumb.src = getPageSrc(i);
    thumb.alt = 'Page ' + (i+1);
    thumb.className = 'mag-thumb';
    thumb.loading = 'lazy';
    (function(pageNum) {
      thumb.addEventListener('click', function(){ showPage(pageNum); });
    })(i);
    strip.appendChild(thumb);
  }
}

/* ── SWIPE ON READER ── */
(function(){
  var startX = 0, startY = 0;
  var wrap = null;
  document.addEventListener('DOMContentLoaded', function(){
    wrap = document.getElementById('mag-img');
    wrap.addEventListener('touchstart', function(e){
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, {passive:true});
    wrap.addEventListener('touchend', function(e){
      var dx = e.changedTouches[0].clientX - startX;
      var dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        if (dx < 0) magNext();
        else magPrev();
      }
    }, {passive:true});
  });
})();

/* ── KEYBOARD ── */
document.addEventListener('keydown', function(e) {
  if (!currentIssue) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  magNext();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    magPrev();
});

/* ── DRAWER ── */
function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('event-drawer').classList.remove('open');
  document.body.style.overflow = '';
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', renderShelf);
</script>
</body>
</html>
