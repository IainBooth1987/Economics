<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT-OMICS | Economics Tutor</title>
<style>
:root{
  --ff-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --ff-mono:'SFMono-Regular','SF Mono',Consolas,'Liberation Mono',monospace;
  --bg:#0a0e1a;--surface:#111827;--surface2:#0d1526;
  --amber:#f59e0b;--amber2:#fcd34d;
  --red:#ef4444;--green:#22c55e;
  --macro2:#60a5fa;--micro2:#34d399;
  --text:#f1f5f9;--muted:#94a3b8;--border:rgba(255,255,255,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--ff-sans);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{padding:0.85rem 1.6rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,14,26,0.97);flex-shrink:0;}
.logo{font-size:1.15rem;font-weight:900;letter-spacing:-0.02em;user-select:none;}
.logo span{color:var(--amber);}
.logo-sub{font-family:var(--ff-mono);font-size:0.56rem;color:var(--muted);letter-spacing:0.16em;text-transform:uppercase;margin-left:0.55rem;opacity:0.6;}
.hdr-right{display:flex;align-items:center;gap:0.5rem;}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.hdr-label{font-family:var(--ff-mono);font-size:0.58rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
.hdr-btn{font-size:0.7rem;padding:0.28rem 0.75rem;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--ff-sans);transition:all 0.15s;}
.hdr-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.22);}
main{flex:1;display:flex;flex-direction:column;max-width:760px;width:100%;margin:0 auto;padding:0 1.1rem;min-height:0;}
#chat-window{flex:1;overflow-y:auto;padding:1.4rem 0 0.5rem;display:flex;flex-direction:column;gap:1rem;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.06) transparent;}
#chat-window::-webkit-scrollbar{width:3px;}
#chat-window::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:2px;}
.msg{display:flex;gap:0.65rem;animation:up 0.25s ease;}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.msg.student{flex-direction:row-reverse;}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:800;flex-shrink:0;margin-top:3px;}
.msg.bot .av{background:var(--amber);color:#000;font-family:var(--ff-mono);}
.msg.student .av{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--muted);}
.bubble{max-width:80%;padding:0.75rem 1rem;border-radius:12px;font-size:0.84rem;line-height:1.68;}
.msg.bot .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:3px;}
.msg.student .bubble{background:rgba(59,130,246,0.11);border:1px solid rgba(59,130,246,0.18);border-top-right-radius:3px;color:#dbeafe;}
.bubble p{margin-bottom:0.45rem;}
.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:var(--amber2);font-weight:600;}
.bubble em{color:var(--muted);font-style:normal;}
.bubble ul{margin:0.4rem 0 0.4rem 1.1rem;color:var(--muted);}
.bubble ul li{margin-bottom:0.25rem;font-size:0.8rem;line-height:1.55;}
.hint-q{padding-left:0.75rem;border-left:2px solid var(--amber);margin-bottom:0.35rem;color:var(--text);}
.hint-q:last-of-type{margin-bottom:0;}
.answer-box{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.18);border-left:3px solid var(--amber);border-radius:8px;padding:0.8rem 1rem;margin-top:0.55rem;font-size:0.82rem;line-height:1.65;}
.tag{display:inline-block;font-family:var(--ff-mono);font-size:0.55rem;letter-spacing:0.13em;text-transform:uppercase;font-weight:700;padding:0.16rem 0.5rem;border-radius:100px;margin-bottom:0.5rem;}
.tag.macro{background:rgba(59,130,246,0.12);color:var(--macro2);border:1px solid rgba(59,130,246,0.22);}
.tag.micro{background:rgba(16,185,129,0.12);color:var(--micro2);border:1px solid rgba(16,185,129,0.22);}
.tag.warn{background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.22);}
.tag.neutral{background:rgba(148,163,184,0.09);color:var(--muted);border:1px solid rgba(148,163,184,0.18);}
.tpicker{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.65rem;}
.tp{font-size:0.72rem;padding:0.25rem 0.65rem;border-radius:100px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:var(--ff-sans);}
.tp:hover{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.35);color:var(--amber2);}
.tp.m{border-color:rgba(59,130,246,0.22);color:var(--macro2);}
.tp.m:hover{background:rgba(59,130,246,0.1);}
.tp.u{border-color:rgba(16,185,129,0.22);color:var(--micro2);}
.tp.u:hover{background:rgba(16,185,129,0.1);}
.thinking{display:flex;gap:0.65rem;}
.dots{background:var(--surface);border:1px solid var(--border);border-radius:12px;border-top-left-radius:3px;padding:0.85rem 1rem;display:flex;gap:4px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--amber);animation:b 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes b{0%,80%,100%{transform:scale(0.5);opacity:0.3}40%{transform:scale(1);opacity:1}}
.input-area{padding:0.8rem 0 1rem;flex-shrink:0;}
.input-wrap{display:flex;gap:0.55rem;align-items:flex-end;background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:13px;padding:0.6rem 0.7rem;transition:border-color 0.18s;}
.input-wrap:focus-within{border-color:rgba(245,158,11,0.45);box-shadow:0 0 0 3px rgba(245,158,11,0.06);}
textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--ff-sans);font-size:0.84rem;resize:none;min-height:22px;max-height:100px;line-height:1.5;padding:1px 0;}
textarea::placeholder{color:var(--muted);}
.send-btn{width:34px;height:34px;border-radius:8px;background:var(--amber);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.16s;}
.send-btn:hover:not(:disabled){background:var(--amber2);transform:scale(1.06);}
.send-btn:disabled{background:rgba(255,255,255,0.05);cursor:not-allowed;}
.send-btn svg{width:15px;height:15px;fill:#000;}
.send-btn:disabled svg{fill:var(--muted);}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:0.42rem;padding:0 0.15rem;}
.reveal-btn{background:none;border:1px solid rgba(239,68,68,0.18);border-radius:7px;padding:0.24rem 0.65rem;font-size:0.67rem;color:rgba(239,68,68,0.5);cursor:pointer;font-family:var(--ff-sans);transition:all 0.16s;}
.reveal-btn:hover:not(:disabled){border-color:var(--red);color:#fca5a5;background:rgba(239,68,68,0.06);}
.reveal-btn:disabled{opacity:0.2;cursor:not-allowed;}
.clear-btn{background:none;border:none;font-size:0.67rem;color:rgba(148,163,184,0.45);cursor:pointer;font-family:var(--ff-sans);transition:color 0.15s;}
.clear-btn:hover{color:var(--muted);}
@media print{
  header,.input-area{display:none!important;}
  body{background:#fff;color:#000;height:auto;overflow:visible;}
  .bubble{background:#f5f5f5!important;color:#111!important;border:1px solid #ddd!important;max-width:100%!important;}
  .msg.student .bubble{background:#eff6ff!important;}
}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:baseline;gap:0.9rem;">
    <a href="/economics" style="font-size:0.67rem;color:rgba(148,163,184,0.5);text-decoration:none;font-family:var(--ff-sans);white-space:nowrap;display:flex;align-items:center;gap:0.25rem;transition:color 0.15s;" onmouseover="this.style.color='rgba(148,163,184,0.85)'" onmouseout="this.style.color='rgba(148,163,184,0.5)'">&#8592; Economics</a>
    <div style="display:flex;align-items:baseline;">
      <div class="logo">BOT-<span>OMICS</span></div>
      <span class="logo-sub">Economics Tutor</span>
    </div>
  </div>
  <div class="hdr-right">
    <div class="pulse"></div>
    <span class="hdr-label" style="margin-right:0.4rem;">Online</span>
    <button class="hdr-btn" onclick="newQuestion()">+ New question</button>
    <button class="hdr-btn" onclick="clearChat()">↺ Clear all</button>
    <button class="hdr-btn" onclick="window.print()">⎙ Print</button>
  </div>
</header>
<main>
  <div id="chat-window"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="Ask an economics question…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-footer">
      <button class="reveal-btn" id="reveal-btn" onclick="revealAnswer()" disabled>
        I've genuinely tried — show the answer
      </button>
      <button class="clear-btn" onclick="newQuestion()">+ New question</button>
      <button class="clear-btn" onclick="clearChat()">Clear all</button>
    </div>
  </div>
</main>
<script>
// ═══════════════════════════════════════════════════════════
// KNOWLEDGE BASE
// KEY RULE: keys must be SPECIFIC — no single common words
// like "vertical", "curve", "gap" that could appear in any topic.
// All micro structural keys are prefixed or paired to avoid
// false matches on general macro terms.
// ═══════════════════════════════════════════════════════════
const KB = [

  // ── MACRO: LRAS / SRAS / AS CURVES ──────────────────────
  { id:'lras', tag:'macro', tagLabel:'AD / AS — The Supply Side',
    keys:['lras','sras','long run aggregate supply','short run aggregate supply','classical lras','lras vertical','lras shifts','potential output','productive capacity','lras curve','sras curve','why lras','what shifts lras','lras rightward','lras leftward','aggregate supply curve','new classical','keynesian as','why is lras vertical','lras and growth'],
    synonyms:['why is the lras vertical','why does lras not slope','classical view of aggregate supply','what makes lras shift right','difference between sras and lras','long run supply side','why is long run as vertical','supply side and lras','lras and potential gdp','productive capacity economics'],
    hints:[
      'Start with what the LRAS represents. It is drawn at a specific level of output — not a range. What does that level of output represent for the economy, and why is it sometimes called "potential output"?',
      'In the long run, all wages and prices are fully flexible. If aggregate demand rises, firms initially produce more and prices rise. But what happens to workers when they realise the real value of their wages has fallen? What do they demand, and what effect does that have on firms\' costs?',
      'So workers demand higher nominal wages, firms\' costs rise, and output falls back. What does this tell you about whether demand stimulus can permanently raise output? If output always returns to the same level regardless of AD, what shape must the long-run AS curve take — and why?',
      'Given what you have just worked out — that the LRAS is vertical — why does the SRAS still slope upward? In the short run, one important thing is assumed to be fixed that is flexible in the long run. What is it, and why does that single difference change the shape of the curve?'
    ],
    answer:'The LRAS is vertical at the economy\'s potential output — the level of real GDP consistent with all factors of production being fully and efficiently employed. In the long run, wages and prices are fully flexible, so any increase in AD simply raises the price level without permanently raising output — the economy self-corrects back to potential. The LRAS shifts right only through real supply-side improvements: more capital, better technology, improved human capital, institutional quality, or increased labour supply. The SRAS slopes upward because wages are sticky in the short run — firms can temporarily increase output as prices rise before workers renegotiate wages.',
    diagramHints:[
      'You are looking at an AD/AS diagram with a vertical LRAS line. Point at the vertical line itself — why is it vertical rather than sloping? What does the position of that line on the horizontal axis represent?',
      'Now look at where the AD curve intersects the SRAS. If AD shifts right and crosses SRAS to the right of the LRAS, what label would economists give to that zone — and what pressure does it create?',
      'Trace what happens over time when AD is to the right of LRAS. SRAS eventually shifts left. Where does equilibrium end up — at higher output, or back at the LRAS with just a higher price level? What does that tell you about the long-run effect of demand stimulus?',
      'Finally: what would make the vertical LRAS line itself shift rightward? Give two real-world policies that could move it, and explain the mechanism for each.'
    ]
  },

  // ── MACRO: AD COMPONENTS AND SHIFTS ─────────────────────
  { id:'adshifts', tag:'macro', tagLabel:'AD / AS — Aggregate Demand',
    keys:['aggregate demand','what shifts ad','ad curve','components of ad','ad formula','consumption spending','investment spending','government spending ad','net exports ad','movement along ad','ad slopes downward','why ad slopes','wealth effect ad','interest rate effect ad'],
    synonyms:['what causes aggregate demand to change','what moves the ad curve','why does ad shift right','factors affecting ad','difference between shift and movement along ad','what increases aggregate demand'],
    hints:[
      'The formula is AD = C + I + G + (X − M). Before we look at what shifts AD, make sure you can answer this: what is the difference between a <em>movement along</em> the AD curve and a <em>shift</em> of it? What single thing causes a movement along — and what kind of things cause a shift?',
      'Focus on C — household consumption. This is the largest component of AD at around 60% in the UK. What non-price factors determine how much households want to spend? Think about confidence, real incomes, interest rates, house prices, and credit availability.',
      'Now think about I — investment by firms. Interest rates matter, but Keynes argued investment is also driven by "animal spirits" — expectations about future profits. Why does this make investment particularly volatile, and what does it imply for the stability of AD?',
      'Finally, trace what happens to AD when the exchange rate depreciates. What happens to export prices in foreign currency? What happens to import prices for UK consumers? Which component(s) of the AD formula are affected, and in which direction?'
    ],
    answer:'AD = C + I + G + (X−M). Shifts occur when components change due to non-price factors: rising consumer confidence, lower interest rates, or higher asset prices boost C; improved profit expectations or lower borrowing costs raise I; expansionary fiscal policy raises G; depreciation or rising global demand increases (X−M). A movement along the AD curve is caused by a change in the price level — the wealth effect, interest rate effect, and international competitiveness effect explain the negative slope.',
    diagramHints:[
      `You are looking at an AD/AS diagram. The AD curve slopes downward. Point to a specific position on that curve. If the price level rises, what happens — do you move to a new position on the same curve, or does the whole curve shift? What is the difference between those two things?`,
      `Now think about a shift. The whole AD curve moves rightward. What would cause that? Identify which component of AD = C + I + G + (X−M) has changed, and explain specifically what happened to that component.`,
      `Look at where AD intersects SRAS. When AD shifts right, trace the new equilibrium: does the price level rise, does real output rise, or both? And does your answer depend on where on the SRAS curve the intersection happens?`,
      `Finally, identify a rightward shift versus an upward movement along AD in your head: one changes the price level, one changes a component of spending. Which is which — and why does it matter for how you draw and label the diagram?`
    ]
  },

  // ── MACRO: ECONOMIC GROWTH / OUTPUT GAP ─────────────────
  { id:'growth', tag:'macro', tagLabel:'Economic Growth',
    keys:['economic growth','actual growth','potential growth','output gap','positive output gap','negative output gap','trend rate of growth','productive capacity growth','gdp growth','real gdp','harrod domar','productivity puzzle','short run growth','long run growth','ppf growth'],
    synonyms:['difference between actual and potential growth','what is an output gap','how does the economy grow','what causes long run economic growth','why does the economy fluctuate','business cycle economics','what shifts the ppf outward'],
    hints:[
      'Start by distinguishing two types of economic growth. <em>Actual</em> growth is a rise in real GDP — the economy producing more. <em>Potential</em> growth is an increase in what the economy <em>could</em> produce. How would you show each on an AD/AS diagram?',
      'Actual growth can occur by using spare capacity — moving AD rightward within the existing LRAS boundary. Potential growth requires the LRAS itself to shift. What kinds of changes shift LRAS rightward, permanently raising the economy\'s productive capacity?',
      'Now think about the output gap. If actual GDP is <em>above</em> potential output, what pressures does this create? If it is <em>below</em>, what happens to unemployment and inflation?',
      'Finally, consider why sustained long-run growth is difficult. The Harrod-Domar model links growth to savings and investment. What is the basic relationship, and what does it imply for developing economies with low savings rates?'
    ],
    answer:'Actual growth is a rise in real GDP — using existing capacity, shown as a rightward AD shift within LRAS. Potential growth is an outward shift of LRAS (and the PPF) via more or better factors of production, technology, or institutions. A positive output gap (actual GDP > potential) creates inflationary pressure; a negative gap creates unemployment and spare capacity. The Harrod-Domar model argues growth rate = savings rate ÷ capital-output ratio — highlighting that investment funded by savings is the engine of growth.',
    diagramHints:[
      `You are looking at an AD/AS diagram. Find the current equilibrium — where AD crosses SRAS. Now imagine AD shifts rightward but stays to the left of the LRAS. What happens to real output and the price level? What type of growth does this show?`,
      `Now find the LRAS vertical line. If it shifts rightward, what has changed about the economy — not just output, but the underlying capacity? Give one specific thing that could cause that shift.`,
      `The output gap is the horizontal distance between actual GDP and potential GDP (LRAS). If AD is to the right of LRAS, is the output gap positive or negative? What does that mean in plain language for the economy?`,
      `Finally, sketch the PPF version of the same idea. Actual growth is moving from inside the frontier to the boundary. Potential growth is the boundary itself moving outward. Which type of growth is more important for long-run living standards, and why?`
    ]
  },

  // ── MACRO: NATIONAL INCOME / CIRCULAR FLOW / MULTIPLIER ─
  { id:'multiplier', tag:'macro', tagLabel:'National Income & the Multiplier',
    keys:['multiplier','mpc','mps','mpm','mpt','circular flow','national income','injections withdrawals','keynesian multiplier','fiscal multiplier','marginal propensity','leakages circular','national output','equilibrium national income'],
    synonyms:['how does the multiplier work','why does an injection increase income by more','what is the multiplier effect','calculate the multiplier','multiplier formula','injections and withdrawals economics','circular flow of income','why does government spending have a multiplied effect'],
    hints:[
      'Imagine the government spends an extra £1 billion on infrastructure. The workers who build it earn £1bn in wages. Do they spend all of it, or only part?',
      'The fraction they spend becomes income for someone else — a retailer, a landlord, a supplier — who also spends a fraction of their new income. This process continues in rounds. Why does the final increase in national income end up being <em>larger</em> than the original £1bn injection?',
      'Formalise it. If the marginal propensity to consume (MPC) is 0.8, how much of each extra £100 of income gets spent? And how much of the next round? The formula is k = 1 ÷ (1 − MPC). What would the multiplier be with MPC = 0.8?',
      'Why does a larger marginal propensity to import reduce the multiplier? Think about what happens to each round of spending when more of it leaks out of the domestic circular flow. What does this imply about the effectiveness of fiscal stimulus in a very open economy like the UK?'
    ],
    answer:'The multiplier amplifies any injection into the circular flow. Each round of spending becomes income for others, who spend a fraction of it (MPC), generating further rounds. k = 1/(1−MPC) = 1/MPW where MPW = MPS + MPT + MPM. A £10bn injection with k=2.5 raises national income by £25bn. The multiplier is smaller when leakages — saving, taxation, and imports — are large, as more of each round exits the domestic economy before circulating further.',
    diagramHints:[
      `You are looking at a circular flow of income diagram. Trace the flow from households to firms and back. Where do injections enter the flow — point to each one? Where do leakages exit — point to each one?`,
      `Now an injection of £10bn enters. On the diagram, follow the first round of spending. Households earn £10bn, spend 80% — that £8bn becomes income for someone else. What happens in round two? Why does each round shrink?`,
      `Find where the leakages — saving, tax, imports — appear on the circular flow. The larger those leakages, the less recirculates. How does the size of the multiplier on an AD/AS diagram relate to the size of the leakages in the circular flow?`,
      `On the AD/AS diagram, the multiplier effect means AD shifts by more than the initial injection. If the government spends £10bn and k=2, mark AD₁ and AD₂ on the diagram. The gap between them is £20bn. Now show what happens to that shift if MPC falls — does AD₂ move closer to or further from AD₁?`
    ]
  },

  // ── MACRO: INFLATION ────────────────────────────────────
  { id:'inflation', tag:'macro', tagLabel:'Inflation & the Price Level',
    keys:['demand pull inflation','cost push inflation','stagflation','cpi inflation','rpi inflation','inflation rate','wage price spiral','inflationary expectations','quantity theory of money','mv=pt','disinflation','deflation','hyperinflation','benign deflation','malevolent deflation','fisher equation money'],
    synonyms:['what causes inflation','why does inflation happen','difference between demand pull and cost push','how does cost push cause stagflation','why is stagflation difficult to fix','consequences of inflation','what is deflation','why is deflation dangerous','debt deflation'],
    hints:[
      'There are two fundamentally different origins of inflation. One starts with <em>too much demand</em>. Can you trace the chain from, say, a large cut in interest rates all the way through to rising prices — using an AD/AS diagram in your head?',
      'The other starts on the supply side. When energy prices spike or wages are pushed up, which curve shifts on an AD/AS diagram? What happens simultaneously to the price level <em>and</em> to real output?',
      'That combination — rising prices alongside falling output — is stagflation. Why does it create a genuine policy dilemma? If the government uses contractionary policy to bring inflation down, what happens to output and unemployment?',
      'Now bring in expectations. If workers see prices rising and demand higher nominal wages to keep up, what happens to firms\' costs? And then to prices? What is this self-reinforcing process called, and why is central bank credibility so important in breaking it?'
    ],
    answer:'Demand-pull inflation: excess AD pulls prices up — AD shifts right along an upward SRAS. Cost-push: rising input costs shift SRAS left — prices rise and output falls simultaneously (stagflation). Stagflation creates a dilemma: tightening policy controls inflation but deepens the output loss; easing policy supports output but worsens inflation. The wage-price spiral can entrench either type as expected inflation is built into wage demands and pricing — central bank credibility and anchored expectations are critical to prevention.',
    diagramHints:[
      `You are looking at an AD/AS diagram. For demand-pull inflation, which curve shifts — and in which direction? Point to the new equilibrium. What has happened to both the price level and real output?`,
      `Now draw cost-push inflation. An oil price spike hits. Which curve shifts, and in which direction? What happens simultaneously to the price level and to real output? Why is this combination called stagflation?`,
      `Look at the two scenarios side by side. In demand-pull, the government could use contractionary policy to push AD left and reduce inflation. On the diagram, what happens to output when it does that? Now apply the same policy to cost-push — what is the additional problem?`,
      `Finally, mark where the LRAS sits on your diagram. In the long run, what happens to the price level and output after a demand-pull shock if wages are fully flexible? Does the economy self-correct — and if so, how does the diagram show that?`
    ]
  },

  // ── MACRO: UNEMPLOYMENT ─────────────────────────────────
  { id:'unemployment', tag:'macro', tagLabel:'Unemployment',
    keys:['cyclical unemployment','structural unemployment','frictional unemployment','real wage unemployment','demand deficient unemployment','natural rate of unemployment','nru','nairu','involuntary unemployment','voluntary unemployment','hysteresis unemployment','claimant count','labour force survey','underemployment','full employment'],
    synonyms:['types of unemployment','what causes unemployment','difference between structural and cyclical unemployment','why is there always some unemployment','how to reduce the natural rate of unemployment','what is hysteresis in unemployment','ilo unemployment measure'],
    hints:[
      'Start with the most important distinction: voluntary versus involuntary unemployment. A worker between jobs by choice is fundamentally different from one who cannot find work at the prevailing wage. Which type of unemployment is demand-deficient, and which type makes up the NRU?',
      'Cyclical unemployment rises during recessions because AD is insufficient. Structural unemployment persists even during booms — why? Think about what happens when an entire industry declines: even if there are vacancies elsewhere, why might workers remain unemployed?',
      'Supply-side policies aim to reduce the NRU — the minimum level of unemployment consistent with stable inflation. Can you identify two supply-side policies that would improve labour market matching, and explain the mechanism through which each works?',

// MATCHING ENGINE — pattern-scored, built from real student
// question language. Scores all patterns against the input,
// returns highest-scoring topic.
// ═══════════════════════════════════════════════════════════
function norm(s){
  return s.toLowerCase()
    .replace(/['''""]/g,"'")
    .replace(/don\'t/g,'dont')
    .replace(/doesn\'t/g,'doesnt')
    .replace(/isn\'t/g,'isnt')
    .replace(/won\'t/g,'wont')
    .replace(/[^a-z0-9\s'-]/g,' ')
    .replace(/\s+/g,' ')
    .replace(/\bmonopolies\b/g,'monopoly')
    .replace(/\boligopolies\b/g,'oligopoly')
    .replace(/\bfirms\b/g,'firm')
    .replace(/\bmarkets\b/g,'market')
    .replace(/\bworkers\b/g,'worker')
    .replace(/\bconsumers\b/g,'consumer')
    .replace(/\bprices\b/g,'price')
    .replace(/\bcosts\b/g,'cost')
    .replace(/\bwages\b/g,'wage')
    .replace(/\bpolicies\b/g,'policy')
    .replace(/\beffects\b/g,'effect')
    .replace(/\bshifts\b/g,'shift')
    .replace(/\bcurves\b/g,'curve')
    .replace(/\bbarriers\b/g,'barrier')
    .replace(/\bsubstitutes\b/g,'substitute')
    .replace(/\bcomplements\b/g,'complement')
    .replace(/\belasticities\b/g,'elasticity')
    .trim();
}

function matchTopic(input){
  const q = norm(input);
  const allTopics = [...KB, EXAM_TOPIC];

  // ── Step 1: Term index — O(n) scan of known concept names ──
  // Longer terms checked first so "marginal revenue product"
  // beats "marginal" and "revenue" separately.
  const sortedTerms = Object.keys(TERMS).sort((a,b) => b.length - a.length);
  for(const term of sortedTerms){
    if(q.includes(term)){
      const topic = allTopics.find(t => t.id === TERMS[term]);
      if(topic) return {topic, conf:'exact', score:10};
    }
  }

  // ── Step 2: Pattern scoring — real student question fragments ──
  // Skip object-style entries (entry-point records) — only process [fragment, id, weight] arrays
  const scores = {};
  for(const entry of PATTERNS){
    if(!Array.isArray(entry)) continue;
    const [fragment, topicId, weight] = entry;
    if(q.includes(fragment)){
      scores[topicId] = (scores[topicId] || 0) + weight;
    }
  }

  if(Object.keys(scores).length === 0) return null;

  let bestId = null, bestScore = 0;
  for(const [id, score] of Object.entries(scores)){
    if(score > bestScore){ bestScore = score; bestId = id; }
  }

  const topic = allTopics.find(t => t.id === bestId);
  if(!topic) return null;

  const conf = bestScore >= 9 ? 'exact' : bestScore >= 6 ? 'synonym' : 'fuzzy';
  return {topic, conf, score: bestScore};
}

  'price elasticity of demand':`PED = percentage change in Qd divided by percentage change in price. Elastic (above 1): price rise reduces TR. Inelastic (below 1): price rise raises TR`,
  'elasticity of demand':`see price elasticity of demand`,

  'comparative advantage':`a country has comparative advantage where its opportunity cost of production is lower than other countries — the basis for mutually beneficial trade`,
  'natural rate of unemployment':`(NRU) the unemployment rate consistent with stable inflation — frictional plus structural unemployment. Cannot be reduced by demand-side policy in the long run`,

  'lorenz curve':`a graph of cumulative income share against cumulative population share — bowing below the 45-degree line shows inequality`,
  'gini coefficient':`a measure of income inequality from 0 (perfect equality) to 1 (perfect inequality) — calculated as Area A divided by (A plus B) on the Lorenz diagram`,
  'behavioural economics':`a field showing how bounded rationality and cognitive biases cause systematic departures from the rational economic agent assumption`,
  'bounded rationality':`Herbert Simon's concept that decisions are limited by imperfect information, cognitive constraints, and time pressure — people satisfice rather than optimise`,
  'nudge':`a change to choice architecture that alters behaviour without restricting freedom of choice — the key tool of libertarian paternalism`,
  'gdp':`Gross Domestic Product — the total market value of all goods and services produced within an economy in a year. Real GDP adjusts for inflation; GDP per capita divides by population. The most widely used measure of economic output`,
  'gnp':`Gross National Product — GDP plus net income earned abroad by UK residents. Differs from GDP when a country has significant overseas investments or migrant worker remittances`,
  'inflation':`a sustained rise in the general price level, measured by CPI or RPI. Caused by demand-pull (excess AD), cost-push (rising input costs), or inflationary expectations. Target in the UK is 2% CPI`,
  'unemployment':`people actively seeking work but unable to find it — measured by the ILO definition. Types include cyclical, structural, frictional, and seasonal`,
  'economic growth':`a rise in real GDP — either actual growth (using spare capacity) or potential growth (shifting LRAS right by increasing productive capacity)`,
  'price discrimination':`charging different prices to different consumers for the same good or service, based on differences in willingness to pay — requires market power, ability to separate markets, and prevent resale. First degree (perfect), second degree (quantity), third degree (by group)`,
  'trade creation':`when joining a free trade area shifts consumers from high-cost domestic production to lower-cost imports from member countries — increases allocative efficiency`,
  'trade diversion':`when joining a free trade area shifts consumers from low-cost non-member imports to higher-cost member imports — reduces allocative efficiency`,
  'infant industry':`a newly established domestic industry that cannot yet compete with established foreign rivals — used to justify temporary protection until it achieves economies of scale`,

  'dynamic efficiency':`improvement in productive techniques and products over time through innovation and R&D — monopolies may achieve this if protected profits fund investment`,
  'x-inefficiency':`the tendency of firms without competitive pressure (especially monopolies) to allow costs to rise above the minimum possible — identified by Leibenstein`,
  'backwards bending supply curve':`the labour supply curve that eventually bends backwards — at higher wages, the income effect (workers feel rich enough to buy more leisure) dominates the substitution effect (work is more rewarding), so labour supply falls as wages rise further`,

  'static efficiency':`efficiency achieved at a given point in time — includes allocative efficiency (P = MC, resources go to highest-value use) and productive efficiency (production at minimum average cost). Contrasts with dynamic efficiency over time`,
  'nairu':`the Non-Accelerating Inflation Rate of Unemployment — equivalent to the NRU; the unemployment rate at which inflation is stable. Below this rate, inflation accelerates; above it, inflation decelerates`,
  'purchasing power parity':`(PPP) the exchange rate at which two currencies would buy the same basket of goods. Used to compare real living standards across countries more accurately than market exchange rates alone`,
  'transfer pricing':`the practice of multinational firms setting prices for transactions between their own subsidiaries to shift profits to low-tax jurisdictions — a source of tax avoidance and a reason for the race to the bottom in corporate tax rates`,
  'demand supply and equilibrium':`in a free market, prices coordinate decisions — when price rises, quantity demanded falls (demand curve slopes down) and quantity supplied rises (supply curve slopes up). The equilibrium price clears the market where the two curves intersect`,
  'pricemechanism':`the system by which prices coordinate decisions in a free market — rising prices signal scarcity and attract new supply; falling prices signal surplus and reduce supply. Also called the price mechanism or market mechanism`,
  'ad as supply side':`the AD/AS model shows how the economy reaches short-run and long-run equilibrium. The LRAS is vertical at potential output; the SRAS slopes upward; AD slopes downward`,
  'aggregate demand ad':`AD = C + I + G + (X − M) — total spending in the economy. Shifts right when any component rises`,
  'national income multiplier':`each pound of new spending generates more than a pound of new income through successive rounds — the multiplier = 1/(1−MPC)`,
  'market failure externalities':`when free markets misallocate resources because private costs or benefits diverge from social costs or benefits — includes negative externalities, positive externalities, public goods, and information failures`,
  'price controls intervention':`government-imposed price ceilings (maximum prices below equilibrium, creating shortages) or price floors (minimum prices above equilibrium, creating surpluses)`,
  'development economics':`the study of how low-income countries can achieve sustained growth and improvements in living standards — encompasses GDP growth, HDI, poverty traps, aid, FDI, and trade`,
  'supply side policy':`policies to increase the productive potential of the economy — shift LRAS rightward. Includes education, training, infrastructure (interventionist) and tax cuts, deregulation, privatisation (free-market)`,
  'international trade':`the exchange of goods and services across national borders. Justified by comparative advantage — each country specialises where its opportunity cost is lowest, raising world output. Governments sometimes restrict trade through tariffs and quotas`,
  'inequality poverty':`unequal distribution of income and wealth across individuals — measured by the Lorenz curve and Gini coefficient. Causes include differential MRP, barriers to entry to high-wage occupations, and inheritance. Policy responses include progressive taxation and benefits`,
  'labour markets':`markets where firms demand labour and workers supply it, determining equilibrium wages. Wages differ across occupations due to differences in MRP, labour supply, and non-wage characteristics`,
  'exchange rates current account':`the price of one currency in terms of another — determined by supply and demand for the currency from trade flows and hot money. Affects competitiveness of exports and imports`,
  'balance of payments':`a record of all economic transactions between a country and the rest of the world — must sum to zero. The current account (trade in goods and services) is offset by the financial account (capital flows)`,
  'government failure':`when government intervention makes resource allocation worse rather than better — causes include imperfect information, unintended consequences, regulatory capture, and political myopia`,
  'market structures':`the characteristics that determine how competitive a market is — number of firms, nature of product, barriers to entry, and information. Ranges from perfect competition to monopoly`,
  'natural monopoly regulation':`a market where one firm can serve all demand at lower average cost than two firms — due to high fixed costs and economies of scale. Requires regulation to prevent exploitation`,
  'economic growth development':`long-run growth requires rightward shifts of LRAS — through investment in human and physical capital, technology, and institutions. Development is broader than growth, encompassing health, education, and distribution`,
  'ad as aggregate demand':`total spending in the economy: C + I + G + (X minus M). Shifts right when spending rises. Determines short-run equilibrium output with SRAS`,
  'demand and supply':`the forces that determine prices and quantities in free markets. The demand curve slopes downward (higher price → lower quantity demanded); the supply curve slopes upward (higher price → higher quantity supplied). Equilibrium is where they intersect`,
  'supply and demand':`see demand and supply`,
  'adverse selection':`a form of information failure where one party has better information than the other before a transaction — e.g. unhealthy people are more likely to buy health insurance, raising premiums for everyone. Leads to market failure`,

  'automatic stabiliser':`a feature of fiscal policy that automatically reduces the size of economic fluctuations without discretionary action — tax revenues fall and benefit spending rises in recessions, cushioning the fall in AD`,

  'choice architecture':`the way in which options are presented to decision-makers — the design of choice architecture (defaults, ordering, framing) powerfully influences behaviour without restricting freedom of choice`,
  'circular flow':`the model of the economy showing income and expenditure flowing between households and firms, with injections (I, G, X) and leakages (S, T, M) from the main flow`,

  'cross elasticity of demand':`XED = % change in Qd of good A ÷ % change in price of good B. Positive XED: substitutes (price of Pepsi rises → more Coke demanded). Negative XED: complements (price of printers rises → less ink demanded)`,
  'current account deficit':`when a country imports more goods, services, and income than it exports — must be financed by a financial account surplus (borrowing or selling assets to foreigners)`,

  'cyclical unemployment':`unemployment caused by a fall in aggregate demand during a recession — involuntary, temporary, and reducible by demand-side policy`,
  'demerit good':`a good that is over-consumed relative to the social optimum because consumers underestimate the harm to themselves or others — e.g. tobacco, alcohol. Justifies taxation, regulation, or nudges`,

  'human development index':`(HDI) the UN measure combining life expectancy, education (mean and expected years of schooling), and GNI per capita into a single index from 0 to 1 — captures development beyond GDP`,
  'income elasticity of demand':`YED = % change in Qd ÷ % change in income. Positive YED: normal good (more bought as income rises). Negative YED: inferior good. YED > 1: luxury good (demand rises faster than income)`,

  'merit good':`a good that is under-consumed relative to the social optimum because consumers underestimate its benefits — e.g. education, healthcare. Justifies subsidies or direct provision`,

function isDefinitionRequest(input){
  const q=norm(input);
  // Explicit definition patterns
  const defPatterns=[
    /^what is (a |an |the )?\w/,
    /^what are (a |an |the )?\w/,
    /^define /,
    /^what does .+ mean/,
    /^what is meant by/,
    /^explain what .+ means/,
    /^what\'s (a |an |the )?\w/,
  ];
  if(defPatterns.some(p=>p.test(q))) return true;
  // Short question ending in ? — but ONLY if it starts with a question word
  // This prevents "because they lack funds?" from being treated as a definition request
  const QUESTION_STARTERS = ['what','why','how','when','where','which','who','is','are','does','do','can','could','would','should'];
  if(input.trim().endsWith('?') &&
     input.trim().split(/\s+/).length<=7 &&
     QUESTION_STARTERS.some(w=>input.trim().toLowerCase().startsWith(w+' '))){
    return true;
  }
  return false;
}

// Get rephrase for current topic/hint, or fall back to generic
function getRephrase(topicId, hintIndex){
  const bank=REPHRASE_BANK[topicId];
  if(bank&&bank[hintIndex]) return bank[hintIndex];
  // Generic fallback: break the question into its smallest piece
  return null;
}

function isClarificationRequest(input){
  const q=norm(input);
  if(CLARIFY_PHRASES.some(p=>q.includes(p))) return true;
  // Mid-flow: if we have an active topic and student asks a definition, treat as clarification
  if(S.topic && isDefinitionRequest(input)) return true;
  return false;
}

// Note: we deliberately removed the old 'short ? question' heuristic
// (ends with ? AND <=7 words) because it caused false positives when
// students hedge their answers with a question mark ("because lack funds?").
// isDefinitionRequest() handles genuine short "what is X?" questions.

// Detect when a student's answer mentions a topic clearly different from the current one.
// Returns the matched topic if the input scores strongly for a different topic.
function detectTopicMismatch(input){
  if(!S.topic) return null;
  const match=matchTopic(input);
  if(!match) return null;
  // Only flag as mismatch if the other topic scores clearly AND is different from current
  if(match.topic.id !== S.topic.id && match.score >= 8){
    return match.topic;
  }
  return null;
}

function findGlossaryTerm(input){
  const q=norm(input);
  // Sort by key length descending — longest match wins
  // e.g. 'price discrimination' beats 'price' for "what is price discrimination"
  const entries=Object.entries(TERM_GLOSSARY).sort((a,b)=>b[0].length-a[0].length);
  for(const [term,def] of entries){
    if(q.includes(term)) return {term,def};
  }
  return null;
}

function handleClarification(input){
  const glossary=findGlossaryTerm(input);
  const q=norm(input);
  const ignoredPhrases=['you did not answer','you haven','you havent','that doesnt answer',
    'that doesn t answer','you ignored','you didnt answer','you didn t answer',
    'answer my question','not answered'];
  const isIgnored=ignoredPhrases.some(p=>q.includes(p));

  if(isIgnored){
    addMsg('bot',
      `<p>You are right — I moved on without addressing what you asked. I am sorry about that.</p>
      <p>What specifically were you unsure about? Tell me the word or idea that was not clear and I will explain it before we continue.</p>`,
      'warn',"My mistake — let's go back");
    // Keep awaitingAnswer=true — we are still mid-topic, just addressing the complaint
    S.awaitingAnswer = !!S.topic;
    return;
  }
  if(glossary){
    // Only re-ask the current hint if we are genuinely mid-sequence (awaitingAnswer=true).
    // If awaitingAnswer=false (between conversations), serve a clean standalone definition
    // and do NOT lock the student back into the old topic.
    const midFlow = S.awaitingAnswer && S.topic && S.hint > 0;
    const reask = midFlow
      ? `<p style="margin-top:0.6rem;font-size:0.8rem;color:var(--muted);">With that clear: ${S.topic.hints[S.hint-1]}</p>` : '';
    const preamble = midFlow
      ? `<p>Good question to clarify before we go further.</p>`
      : `<p>Here is a quick definition.</p>`;
    addMsg('bot',
      `${preamble}
       <p><strong>${glossary.term.charAt(0).toUpperCase()+glossary.term.slice(1)}</strong>: ${glossary.def}.</p>${reask}`,
      S.topic?(S.topic.tag==='macro'?'macro':'micro'):'neutral',"Definition — "+glossary.term);
    // Only keep the topic lock if we were mid-sequence
    if(midFlow) S.awaitingAnswer=true;
    // else: leave awaitingAnswer as false — student is free to ask anything next
    return;
  }
  // Topic mismatch: student's input scores for a different topic — offer to switch
  const mismatch=detectTopicMismatch(input);
  if(mismatch){
    const cls=S.topic?(S.topic.tag==='macro'?'macro':'micro'):'neutral';
    addMsg('bot',
      `<p>It sounds like you want to ask about <strong>${mismatch.tagLabel}</strong> rather than continuing with ${S.topic?S.topic.tagLabel:'this topic'}.</p>
       <p style="font-size:0.8rem;color:var(--muted);margin-top:0.3rem;">Which would you like?</p>
       <div style="display:flex;gap:0.6rem;margin-top:0.5rem;flex-wrap:wrap;">
         <button class="tp ${mismatch.tag==='macro'?'m':'u'}" onclick="switchToTopic('${mismatch.id}',true)">Switch to ${mismatch.tagLabel}</button>
         <button class="tp ${S.topic?(S.topic.tag==='macro'?'m':'u'):'u'}" onclick="switchToTopic('${S.topic?S.topic.id:''}',false)">Stay on ${S.topic?S.topic.tagLabel:'current topic'}</button>
       </div>`,
      cls,'Did you want to switch topic?');
    S.awaitingAnswer=true;
    return;
  }

  // No glossary match — rephrase the current hint in simpler terms
  const termGuess=extractSubject(input);
  if(termGuess){
    const reask=S.topic&&S.hint>0
      ?`<p style="margin-top:0.55rem;font-size:0.8rem;color:var(--muted);">Once we have cleared that up, come back to: ${S.topic.hints[S.hint-1]}</p>`:''
    addMsg('bot',
      `<p>Before I explain, have a go yourself — what do you think <strong>${termGuess}</strong> means, even roughly? Your instinct is a better starting point than my definition.</p>${reask}`,
      S.topic?(S.topic.tag==='macro'?'macro':'micro'):'neutral',"What do you think?");
    S.awaitingAnswer=true; // Still mid-topic — do not release the lock
    return;
  }
  // Use REPHRASE_BANK for a genuinely different angle on the same question
  if(S.topic && S.hint>0){
    const hintAsked = S.hint-1;
    const rephrase = getRephrase(S.topic.id, hintAsked);
    const cls = S.topic.tag==='macro'?'macro':'micro';
    if(rephrase){
      addMsg('bot',
        `<p style="font-size:0.79rem;color:var(--muted);margin-bottom:0.4rem;">Let me come at that from a different angle.</p>
         <div class="hint-q">${rephrase}</div>`,
        cls, S.topic.tagLabel);
    } else {
      // No rephrase available — break it into its smallest piece
      addMsg('bot',
        `<p>Fair — let me break that down further.</p>
         <p style="margin-top:0.4rem;">Rather than answering the full question, just tell me: in one sentence, what do you think this topic is fundamentally about? That is often enough to unlock the rest.</p>`,
        cls, S.topic.tagLabel);
    }
  } else {
    addMsg('bot',
      `<p>Which part is blocking you? Try to name the specific word or idea — even a rough guess is fine.</p>`,
      'neutral','Let me rephrase');
  }
  S.awaitingAnswer=true;
}

// Extract the subject of a "what is X?" question
function extractSubject(input){
  const q=input.trim().toLowerCase().replace(/[?]/g,'');
  const patterns=[
    /^what is (?:a |an |the )?(.+)$/,
    /^what are (?:a |an |the )?(.+)$/,
    /^define (.+)$/,
    /^what does (.+) mean$/,
    /^what is meant by (.+)$/,
  ];
  for(const p of patterns){
    const m=q.match(p);
    if(m) return m[1].trim();
  }
  return null;
}

// API FALLBACK CLASSIFIER
// Called when classifyAnswer() returns null —
// i.e. topic has no rule-based classifier.
// Sends to the Cloudflare Worker proxy which
// holds the API key and forwards to Anthropic.
// ═══════════════════════════════════════════════

// Set this to your deployed Worker URL after running `wrangler deploy`
// Leave as null to disable API fallback (rule-based only)
const API_PROXY_URL = null; // e.g. 'https://bot-omics-proxy.YOUR-SUBDOMAIN.workers.dev/classify'

async function classifyAnswerAPI(input, topic, hintIndex){
  if(!API_PROXY_URL) return null;
  // Don't call API for very short inputs — blank handler already covers these
  if(input.trim().split(/\s+/).length < 3) return null;

  const hintBank = topic.hints;
  const hintText = hintBank[hintIndex] || '';

  try {
    const res = await fetch(API_PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        studentAnswer: input,
        topicId:       topic.id,
        hintIndex:     hintIndex,
        hintText:      hintText.replace(/<[^>]+>/g,''), // strip HTML tags
        topicLabel:    topic.tagLabel,
      })
    });
    if(!res.ok) return null; // proxy error — fall back silently
    const data = await res.json();
    if(data.error) return null;
    if(!data.verdict) return null;
    return { verdict: data.verdict, followup: data.followup };
  } catch(e) {
    // Network error — fail silently, fall back to hint sequence
    return null;
  }
}

function scrollB(){
  const cw=document.getElementById('chat-window');
  setTimeout(()=>{cw.scrollTop=cw.scrollHeight;},40);
}
function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
  document.getElementById('send-btn').disabled=el.value.trim().length===0;
}
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}
function addMsg(role,html,tagClass,tagText){
  const cw=document.getElementById('chat-window');
  const div=document.createElement('div');
  div.className='msg '+role;
  const av=document.createElement('div');
  av.className='av';
  av.textContent=role==='bot'?'B':'S';
  const bub=document.createElement('div');
  bub.className='bubble';
  bub.innerHTML=(tagText?`<div class="tag ${tagClass}">${tagText}</div>`:'') + html;
  if(role==='bot'){div.appendChild(av);div.appendChild(bub);}
  else{div.appendChild(bub);div.appendChild(av);}
  cw.appendChild(div);
  scrollB();
  document.getElementById('reveal-btn').disabled=false;
}
function showThinking(){
  const cw=document.getElementById('chat-window');
  const div=document.createElement('div');
  div.className='thinking';div.id='think';
  const av=document.createElement('div');av.className='av';av.textContent='B';
  const dots=document.createElement('div');dots.className='dots';
  dots.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(av);div.appendChild(dots);
  cw.appendChild(div);scrollB();
}
function rmThinking(){const t=document.getElementById('think');if(t)t.remove();}

function topicPicker(){
  const btns=[...KB,EXAM_TOPIC].map(t=>`<button class="tp ${t.tag==='macro'?'m':'u'}" onclick="pickTopic('${t.id}')">${t.tagLabel}</button>`).join('');
  return `<p>I can see you have a question, but I want to make sure I guide you on the right concept. <strong>Which topic area does it fall under?</strong></p><div class="tpicker">${btns}</div>`;
}
// Switch topic mid-conversation — either start fresh on new topic,
// or resume current topic
function switchToTopic(id, fresh){
  if(fresh){
    // Start a new thread on the requested topic
    const t=[...KB,EXAM_TOPIC].find(x=>x.id===id);
    if(!t) return;
    newQuestion(); // inserts divider
    S.topic=t; S.hint=0; S.rephrase=false; S.awaitingAnswer=false;
    S._diagramMode=false; S._evalMode=false;
    addMsg('bot',`<div class="hint-q">${t.hints[0]}</div>`,
      t.tag==='macro'?'macro':'micro',t.tagLabel);
    S.hint=1; S.awaitingAnswer=true;
  } else {
    // Resume current topic — re-ask the current hint
    if(!S.topic) return;
    const t=S.topic;
    const hintBank=(S._evalMode&&t.evalHints)?t.evalHints:(S._diagramMode&&t.diagramHints)?t.diagramHints:t.hints;
    const current=S.hint>0?S.hint-1:0;
    addMsg('bot',`<div class="hint-q">${hintBank[current]}</div>`,
      t.tag==='macro'?'macro':'micro',t.tagLabel);
    S.awaitingAnswer=true;
  }
}

function pickTopic(id){
  const t=[...KB,EXAM_TOPIC].find(x=>x.id===id);
  if(!t)return;
  S.topic=t; S.hint=0; S.rephrase=false; S.awaitingAnswer=false;
  addMsg('bot',`<div class="hint-q">${t.hints[0]}</div>`,t.tag==='macro'?'macro':'micro',t.tagLabel);
  S.hint=1; S.awaitingAnswer=true;
}

const LOW_ENTRY = {
  lras: 'No problem — let\'s build from zero. Forget the diagram for a moment. In the long run, an economy has a maximum amount it can produce — its productive capacity. If the government tried to boost demand beyond that limit, what do you think would happen to prices? Would the economy just keep producing more forever?',
  adshifts: 'Let\'s start simple. AD is just total spending in the economy. Think about the four groups who do the spending — households, firms, government, and the rest of the world (exports minus imports). If households suddenly feel less confident about the future, what do they do to their spending? And what does that do to total demand?',
  inflation: 'Let\'s strip it right back. Inflation means prices are rising generally. There are really only two ways that happens: either people are trying to buy more than the economy can supply, or it\'s costing firms more to produce things. Which of those sounds like "too much money chasing too few goods" — and which sounds like it starts on the cost side?',
  unemployment: 'Start from the simplest possible idea. Unemployment happens when people who want jobs can\'t find them. But not all unemployment has the same cause. Think about someone who was just made redundant in a recession — is that the same kind of problem as someone whose factory closed because robots replaced their job? Why might one be easier to fix than the other?',
  multiplier: 'Here is a very concrete starting point. Imagine the government builds a new hospital and pays construction workers £100m. Those workers now have more income. Do they spend all of it, or just some? If they spend £80m of it, that £80m becomes income for someone else — a shop, a supplier. And they spend 80% of that. Can you see where this is going?',
  kinked: 'Let\'s start with oligopoly itself. There are just a few big firms — think supermarkets or mobile phone providers. If Tesco cuts its prices, what do you think Asda does? And if Tesco raises prices, does Asda follow? The answer to those two questions is the whole key to understanding why prices barely move in these markets.',
  monopoly: 'Forget the diagram for now. A monopoly has no competitors. When you have no competitors, you don\'t have to charge a low price to keep customers. So you restrict how much you sell and charge more. Simple enough — but why is that a problem for society, not just for the consumer paying more?',
  ped: 'Think about your own behaviour. If petrol went up 20%, would you stop driving? Probably not much — you still need to get places. But if a particular coffee shop raised prices 20%, you\'d probably just go next door. That difference in how much you respond is exactly what price elasticity measures. Why do you think petrol is less responsive than coffee shop prices?',
  pricemechanism: 'Start with something you know. When something is popular and in short supply — say, concert tickets — what tends to happen to the price? And when something is not selling — maybe a style that\'s gone out of fashion — what happens? You have already understood the price mechanism. Now let\'s give it an economic name.',
  externalities: 'Think about a factory that pumps pollution into a river. The factory pays for its workers and raw materials — its private costs. But the people downstream suffer too. Who pays for that harm? The key question is: when the factory decides how much to produce, whose costs does it take into account — and whose does it ignore?',
  phillips: 'Start with a simple observation. When unemployment is very low, workers have more power to demand higher wages. Higher wages mean higher costs for firms. Higher costs get passed on as higher prices. So low unemployment tends to go with higher inflation. But — and this is the key — is that relationship stable over time?',
  costs: 'Think about a small café. Some costs stay the same no matter how many coffees they sell — rent, insurance. Other costs rise with every cup — milk, cups, staff hours. That\'s the fixed/variable split. Now if they sell one more coffee, what is the exact cost of producing just that one extra cup? That\'s marginal cost. Why does marginal cost matter more than average cost for a firm\'s decisions?',
  default: 'No problem — let\'s work through this together from the beginning. Before I ask you questions, I need to understand where you\'re starting from. In one sentence, can you tell me what you think this topic is broadly about? Even a rough idea is fine — it helps me know where to start the scaffolding.'
};

function getLowEntry(topicId) {
  return LOW_ENTRY[topicId] || LOW_ENTRY.default;
}

function isLowAbility(input) {
  const q = norm(input);
  return LOW_ABILITY_PHRASES.some(p => q.includes(p));
}

// Match input against ENTRY_POINTS and return { topic, hint, ack } or null
function matchEntryPoint(input){
  const q = norm(input);
  for(const ep of ENTRY_POINTS){
    if(ep.patterns.some(p => q.includes(p))){
      const t = [...KB, EXAM_TOPIC].find(x => x.id === ep.topic);
      if(t) return { topic: t, hint: ep.hint, ack: ep.ack };
    }
  }
  return null;
}

// ── TOPIC SWITCH SIGNALS ────────────────────────────────
// Student must use one of these to explicitly change topic
// while an answer is awaited. Everything else stays in-topic.
const TOPIC_SWITCH_SIGNALS=[
  'new question','different topic','switch to','can we move to',
  'can we switch','let us move on','move on to','now explain',
  'ok now','can you explain','what about','forget that',
  'actually','change topic','start again','new topic',
];

function isTopicSwitchSignal(input){
  const q=norm(input);
  return TOPIC_SWITCH_SIGNALS.some(p=>q.includes(p));
}

// ── EVALUATION MODE DETECTOR ────────────────────────────
// Recognises evaluative questions asking for exceptions,
// limitations, or conditions under which theory breaks down.
const EVAL_PHRASES=[
  'why might not','not always','does not always','might not always',
  'to what extent','how far','evaluate','assess','critically',
  'always be','always good','always bad','always true','always work',
  'always improve','always reduce','always increase','always cause',
  'always lead to','always result','always mean','always guarantee',
  'limitations of','weaknesses of','problems with','drawbacks of',
  'when might','under what conditions','in what circumstances',
  'exceptions to','challenge','question whether','is it always',
  'does it always','will it always','can it always','would it always',
  'argue against','argue for and against','both sides',
];

function isEvaluationQuestion(input){
  const q=norm(input);
  return EVAL_PHRASES.some(p=>q.includes(p));
}


function detectMisconception(input) {
  const q = norm(input);
  for (const m of MISCONCEPTIONS) {
    if (m.patterns.some(p => q.includes(p))) return m;
  }
  return null;
}

// ── DIAGRAM-FIRST DETECTOR ───────────────────────────────────
// When a student asks about a visual element, route to a
// diagram-anchored first hint rather than theory-first.
const DIAGRAM_PHRASES = [
  'why is that triangle','why is there a triangle','what is that triangle',
  'why is the shaded area','what does the shaded area','why is output lower',
  'why is price higher here','why does price rise here','why is quantity lower',
  'why does the curve shift','why is it leftward','why is it rightward',
  'what does the gap represent','what is the gap between','why is there a gap',
  'why does the curve kink','why does it bend','what is the deadweight',
  'why is consumer surplus','why is producer surplus','what is the welfare loss',
  'why is the line there','what does ar equal','why is mr below'
];

function isDiagramQuestion(input) {
  const q = norm(input);
  return DIAGRAM_PHRASES.some(p => q.includes(p));
}

function respond(input){
  showThinking();
  setTimeout(()=>{
    try{
    rmThinking();

    // ── STEP 0: CLARIFICATION CHECK ──────────────────────────
    // Always fires first — if the student is asking the BOT a
    // question, stop and address it before anything else.
    if(S.topic && isClarificationRequest(input)){
      handleClarification(input);
      return;
    }

    // ── TOPIC LOCK FAST PATH ─────────────────────────────────
    // When a topic is active and awaiting an answer, skip Steps
    // 1 and 2 entirely (low-ability and misconception detection)
    // unless the student signals a switch. This prevents mid-flow
    // re-routing via isLowAbility or detectMisconception.
    if(S.awaitingAnswer && S.topic && !isTopicSwitchSignal(input)){
      // Jump directly to Step 3
      const _t=S.topic;
      const _cls=_t.tag==='macro'?'macro':'micro';
      const _hintAsked=S.hint>0?S.hint-1:0;

      function applyVerdict(classification){
        const hintBank=(S._evalMode&&_t.evalHints)?_t.evalHints:(S._diagramMode&&_t.diagramHints)?_t.diagramHints:_t.hints;
        if(classification.verdict==='correct'){
          const badge=`<div class="tag" style="background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.25);margin-bottom:0.45rem;">Good thinking</div>`;
          // Entry-point boundary: stop after entry hint + 2
          if(S._entryHint!==null && S.hint>=S._entryHint+2){
            addMsg('bot',
              badge+`<p>Good — you have worked through that concept. Write a one-paragraph explanation of what you originally asked in your own words. Ask a follow-up if you want to go deeper.</p>`,
              _cls,_t.tagLabel);
            S._entryHint=null;
            S.awaitingAnswer=false;
            return;
          }
          if(S.hint<hintBank.length){
            const last=S.hint===hintBank.length-1;
            const suffix=last?`<p style="margin-top:0.55rem;font-size:0.79rem;color:var(--muted);">That is the last step. Can you now pull together a complete explanation in your own words?</p>`:'';
            addMsg('bot',badge+`<div class="hint-q">${classification.followup}</div>${suffix}`,_cls,_t.tagLabel);
            S.hint++;
          } else {
            addMsg('bot',badge+`<p>You have worked through every step. Write out a full explanation without looking — the reveal button is there when you want to check.</p>`,_cls,_t.tagLabel);
          }
        } else if(classification.verdict==='partial'){
          const badge=`<div class="tag" style="background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);margin-bottom:0.45rem;">Nearly there</div>`;
          addMsg('bot',badge+`<div class="hint-q">${classification.followup}</div>`,_cls,_t.tagLabel);
        } else if(classification.verdict==='wrong'){
          const badge=`<div class="tag warn" style="margin-bottom:0.45rem;">Not quite — think again</div>`;
          addMsg('bot',badge+`<div class="hint-q">${classification.followup}</div>`,_cls,_t.tagLabel);
        } else {
          addMsg('bot',`<div class="hint-q">${classification.followup}</div>`,_cls,_t.tagLabel);
        }
        S.awaitingAnswer=true;
      }

      function advanceHint(){
        const hintBank=(S._evalMode&&_t.evalHints)?_t.evalHints:(S._diagramMode&&_t.diagramHints)?_t.diagramHints:_t.hints;

        // Entry-point boundary: if student arrived via a specific sub-concept,
        // stop after 2 questions deep rather than running the full sequence.
        // S._entryHint records where they started; stop at _entryHint + 2.
        if(S._entryHint!==null && S.hint >= S._entryHint+2){
          addMsg('bot',
            `<p>You have worked through that concept. Try to write a one-paragraph explanation of <strong>${_t.tagLabel}</strong> — specifically the part you asked about — in your own words. Once that is solid you can ask a follow-up or move on.</p>`,
            _cls, _t.tagLabel);
          S._entryHint=null;  // release boundary — student can continue if they want
          S.awaitingAnswer=false;
          return;
        }

        if(S.hint<hintBank.length){
          const last=S.hint===hintBank.length-1;
          const suffix=last?`<p style="margin-top:0.55rem;font-size:0.79rem;color:var(--muted);">That is the last step. Can you now write a complete explanation in your own words?</p>`:'';
          addMsg('bot',`<div class="hint-q">${hintBank[S.hint]}</div>${suffix}`,_cls,_t.tagLabel);
          S.hint++;
        } else {
          addMsg('bot',`<p>You have worked through every step. Write out a full explanation without looking — that is where it becomes permanent. The reveal button is there when you want to compare.</p>`,_cls,_t.tagLabel);
        }
        S.awaitingAnswer=true;
      }

      const _rule=classifyAnswer(input,_t.id,_hintAsked);
      if(_rule){ applyVerdict(_rule); return; }
      if(API_PROXY_URL){
        showThinking();
        classifyAnswerAPI(input,_t,_hintAsked).then(api=>{
          rmThinking();
          if(api) applyVerdict(api); else advanceHint();
        }).catch(()=>{ rmThinking(); advanceHint(); });
        return;
      }
      advanceHint();
      return;
    }

    // ── STEP 0b: COLD DEFINITION REQUEST ───────────────────
    // When a student asks "what is X?" with no active topic,
    // serve a brief glossary definition + one Socratic question
    // rather than jumping straight into the analytical hint sequence.
    // This handles AO1 "what is X?" questions correctly.
    if(isDefinitionRequest(input)){
      // Extract the subject being asked about
      const subject=extractSubject(input);
      const match=matchTopic(input);

      // Case A: topic matched — serve topic definition + hint 0
      // GUARD: only serve topic definition if the student was actually asking about
      // the matched topic. Low-weight pattern matches (e.g. 'price' -> adshifts) can
      // produce false positives when student asks "what is price discrimination?".
      if(match && subject){
        const t=match.topic;
        const subjectLow=subject.toLowerCase();
        const topicIdLow=t.id.toLowerCase();
        const topicLabelLow=t.tagLabel.toLowerCase();
        const topicLabelWords=topicLabelLow.split(/\s+/).filter(w=>w.length>3);
        const subjectMatchesTopic=
          subjectLow.includes(topicIdLow) ||
          topicIdLow.includes(subjectLow) ||
          topicLabelLow.includes(subjectLow) ||
          subjectLow.includes(topicLabelLow) ||
          topicLabelWords.some(w=>subjectLow.includes(w)) ||
          match.score >= 9;
        if(subjectMatchesTopic){
          const cls=t.tag==='macro'?'macro':'micro';
          const topicTerms=[t.id, t.tagLabel.toLowerCase(),
            ...Object.keys(TERM_GLOSSARY).filter(k=>
              k.length > 8 && (
                k.includes(t.id.toLowerCase())
                || t.id.toLowerCase().includes(k)
                || t.tagLabel.toLowerCase().includes(k)
              )
            )
          ];
          let def=null;
          for(const term of topicTerms){
            if(TERM_GLOSSARY[term]){ def=TERM_GLOSSARY[term]; break; }
          }
          if(def){
            const firstQ=t.hints[0];
            addMsg('bot',
              `<p><strong>${t.tagLabel}</strong>: ${def}.</p>
               <p style="margin-top:0.6rem;font-size:0.8rem;color:var(--muted);">Now let me check your understanding with one question.</p>
               <div class="hint-q">${firstQ}</div>`,
              cls, t.tagLabel);
            S.topic=t; S.hint=1; S.awaitingAnswer=true;
            return;
          }
        }
        // Subject doesn't match the topic (spurious pattern hit) -- fall through to Case B
      }

      // Case B: no topic matched but subject found in glossary
      // e.g. "what is price discrimination?" — in glossary but not a KB topic
      if(subject){
        const subjectNorm=subject.toLowerCase().replace(/[^a-z0-9\s]/g,' ').trim();
        // Try exact and partial glossary lookup
        let defEntry=null;
        let defTerm=null;
        if(TERM_GLOSSARY[subjectNorm]){
          defEntry=TERM_GLOSSARY[subjectNorm]; defTerm=subjectNorm;
        } else {
          // Partial match — find closest glossary key
          const keys=Object.keys(TERM_GLOSSARY);
          const exact=keys.find(k=>k===subjectNorm);
          const contains=keys.find(k=>subjectNorm.includes(k)||k.includes(subjectNorm));
          if(exact){ defEntry=TERM_GLOSSARY[exact]; defTerm=exact; }
          else if(contains){ defEntry=TERM_GLOSSARY[contains]; defTerm=contains; }
        }
        if(defEntry){
          const displayTerm=defTerm.charAt(0).toUpperCase()+defTerm.slice(1);
          // Route follow-ups: if this glossary term maps to a KB topic via TERMS, set it
          // so the student can immediately ask follow-up questions without being told to rephrase.
          // Find related KB topic for follow-up routing.
          // Try TERMS first (direct mapping), then matchTopic on the subject itself.
          const relatedTopicId = TERMS[defTerm] || TERMS[subjectNorm] || null;
          let relatedTopic = relatedTopicId ? [...KB,EXAM_TOPIC].find(t=>t.id===relatedTopicId) : null;
          if(!relatedTopic){
            const subjectMatch = matchTopic(defTerm) || matchTopic(subjectNorm);
            if(subjectMatch && subjectMatch.score >= 6) relatedTopic = subjectMatch.topic;
          }
          if(relatedTopic){
            S.topic=relatedTopic; S.hint=0; S.awaitingAnswer=false;
          }
          addMsg('bot',
            `<p><strong>${displayTerm}</strong>: ${defEntry}.</p>
             <p style="margin-top:0.5rem;font-size:0.8rem;color:var(--muted);">If you want to explore this further, ask a follow-up — or I can guide you through the full concept step by step.</p>`,
            'neutral', 'Definition');
          return;
        }
      }
      // Nothing found — fall through to normal routing / fallback
    }

    // ── STEP 1: LOW-ABILITY ENTRY ────────────────────────────
    // Only runs when there is no active topic lock
    if(isLowAbility(input)){
      const match=matchTopic(input);
      if(match){
        S.topic=match.topic; S.hint=0; S.rephrase=false; S.awaitingAnswer=false;
        const t=match.topic;
        const cls=t.tag==='macro'?'macro':'micro';
        addMsg('bot',`<div class="hint-q">${getLowEntry(t.id)}</div>`,
          cls,t.tagLabel+' — starting from scratch');
        S.awaitingAnswer=true;
        return;
      }
      addMsg('bot',
        `<p>That is a completely fair place to be. Let us fix it.</p>
        <div class="hint-q">Tell me the topic or concept in just a word or two — for example "monopoly", "inflation", "exchange rates". Once I know which one, I can walk you through it from the very beginning.</div>`,
        'neutral',"Let's start from the beginning");
      return;
    }

    // ── STEP 2: MISCONCEPTION DETECTION ─────────────────────
    const misconception=detectMisconception(input);
    if(misconception){
      const redir=[...KB,EXAM_TOPIC].find(t=>t.id===misconception.redirect);
      if(redir){ S.topic=redir; S.hint=0; S.rephrase=false; }
      addMsg('bot',`<div class="hint-q">${misconception.challenge}</div>`,'warn','Check your reasoning');
      S.awaitingAnswer=true;
      return;
    }

    // ── STEP 3: TOPIC SWITCH RELEASE ───────────────────────
    // The fast path above already handled locked-topic answers.
    // This only runs if awaitingAnswer is false (no active lock).
    // Handle explicit topic-switch signals to reset state cleanly.
    if(S.topic && isTopicSwitchSignal(input)){
      S.awaitingAnswer=false;
      S.topic=null; S.hint=0; S.rephrase=false;
      S._diagramMode=false; S._evalMode=false;
    }

    const match=matchTopic(input);

    // ── STEP 4: DIAGRAM-FIRST MODE ───────────────────────────
    if(isDiagramQuestion(input)&&match){
      S.topic=match.topic; S.hint=0; S.rephrase=false;
      const t=match.topic;
      const cls=t.tag==='macro'?'macro':'micro';
      const firstQ=t.diagramHints?t.diagramHints[0]:t.hints[0];
      S._diagramMode=t.diagramHints?true:false;
      addMsg('bot',
        `<p style="font-size:0.79rem;color:var(--muted);margin-bottom:0.5rem;">You are looking at a diagram — let us work from what you can see.</p>
        <div class="hint-q">${firstQ}</div>`,
        cls,t.tagLabel+' — diagram');
      S.hint=1; S.awaitingAnswer=true;
      return;
    }

    // ── STEP 5: NEW TOPIC MATCHED ────────────────────────────
    if(match&&(!S.topic||match.topic.id!==S.topic.id)){
      S.topic=match.topic; S.hint=0; S.rephrase=false;
      const t=match.topic;
      const cls=t.tag==='macro'?'macro':'micro';
      const prefix=(match.conf==='fuzzy'||match.score<8)
        ?`<p style="font-size:0.79rem;color:var(--muted);margin-bottom:0.5rem;">It sounds like you are asking about <strong>${t.tagLabel}</strong> — let me know if I have misread that.</p>`:'';

      // ── OPTION C: Entry point detection ──────────────────
      // Check if the question maps to a specific sub-concept
      // within the topic. If so, acknowledge what was asked
      // and start at the right hint index rather than hint 0.
      const ep=matchEntryPoint(input);
      if(ep && ep.topic.id===t.id && ep.hint>0){
        S.hint=ep.hint;
        S._entryHint=ep.hint;   // bound the sequence: only go 2 deep from here
        const hintBank=t.hints;
        addMsg('bot',
          prefix+
          `<p style="font-size:0.8rem;color:var(--muted);margin-bottom:0.45rem;">${ep.ack}</p>`+
          `<div class="hint-q">${hintBank[ep.hint]}</div>`,
          cls,t.tagLabel);
        S.hint++; S.awaitingAnswer=true;
        return;
      }

      if(isEvaluationQuestion(input)&&t.evalHints){
        S._evalMode=true;
        addMsg('bot',
          prefix+`<p style="font-size:0.79rem;color:var(--muted);margin-bottom:0.5rem;">This is an evaluative question — you are being asked to go beyond the standard model and consider exceptions or limitations.</p>`+
          `<div class="hint-q">${t.evalHints[0]}</div>`,
          cls,t.tagLabel+' — evaluation');
        S.hint=1; S.awaitingAnswer=true;
        return;
      }
      addMsg('bot',prefix+`<div class="hint-q">${t.hints[0]}</div>`,cls,t.tagLabel);
      S.hint=1; S.awaitingAnswer=true;
      return;
    }

    // ── STEP 6: SAME TOPIC, NO ACTIVE LOCK ───────────────────
    if(S.topic){
      const t=S.topic;
      const cls=t.tag==='macro'?'macro':'micro';
      const hintBank=(S._evalMode&&t.evalHints)?t.evalHints
                    :(S._diagramMode&&t.diagramHints)?t.diagramHints
                    :t.hints;
      if(S.hint<hintBank.length){
        const last=S.hint===hintBank.length-1;
        const suffix=last?`<p style="margin-top:0.55rem;font-size:0.79rem;color:var(--muted);">That is the last step. Can you now write a complete explanation in your own words?</p>`:'';
        addMsg('bot',`<div class="hint-q">${hintBank[S.hint]}</div>${suffix}`,cls,t.tagLabel);
        S.hint++; S.awaitingAnswer=true;
      } else {
        addMsg('bot',`<p>You have worked through every step. Write out a full explanation without looking — that is where it becomes permanent. The reveal button is there when you want to compare.</p>`,cls,t.tagLabel);
      }
      return;
    }

    // ── STEP 7: FALLBACK ─────────────────────────────────────
    if(S.rephrase){
      S.rephrase=false;
      addMsg('bot',topicPicker(),'neutral','Select your topic');
      return;
    }
    S.rephrase=true;
    addMsg('bot',
      `<p>I want to guide you properly — but I need to know which concept this is about. Rephrase your question and include at least one economics term: a model, curve, market structure, or policy name.</p>
      <p style="font-size:0.79rem;color:var(--muted);margin-top:0.4rem;">If you are not sure what it is called, check your notes then come back. Naming the concept is often the first step.</p>`,
      'neutral',"Let's be more precise");
  } catch(err){
    rmThinking();
    addMsg('bot',`<p style="color:#ef4444;font-size:0.8rem;">Something went wrong: ${err.message}. Please refresh and try again.</p>`,"neutral","Error");
    console.error("BOT-OMICS respond() error:",err);
  }
  },500+Math.random()*300);
}

// REVEAL
// ═══════════════════════════════════════════════
function revealAnswer(){
  if(!S.topic){
    addMsg('bot','<p>Work through the guided questions first — the reveal button is there for when you have genuinely tried and want to check your reasoning.</p>','neutral','Not yet');
    return;
  }
  const t=S.topic;
  const cls=t.tag==='macro'?'macro':'micro';
  addMsg('bot',
    `<p style="font-size:0.79rem;color:var(--muted);margin-bottom:0.5rem;">Here is a model answer. Read it carefully, then cover it and try to reproduce the key points in your own words.</p>
    <div class="answer-box">${t.answer}</div>`
  ,cls,'Model answer — '+t.tagLabel);
  S.hint=t.hints.length;
}

// SEND & CLEAR
// ═══════════════════════════════════════════════
function sendMessage(){
  const inp=document.getElementById('user-input');
  const text=inp.value.trim();
  if(!text)return;
  addMsg('student','<p>'+text.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</p>');
  inp.value='';inp.style.height='auto';
  document.getElementById('send-btn').disabled=true;
  respond(text);
}
function clearChat(){
  document.getElementById('chat-window').innerHTML='';
  S={topic:null,hint:0,rephrase:false,awaitingAnswer:false,_diagramMode:false,_evalMode:false,_entryHint:null};
  document.getElementById('reveal-btn').disabled=true;
